<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Trabajadores - TalentHub</title>
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; height: 100vh; overflow: hidden; }
        #map { width: 100%; height: 100%; }

        /* Botón volver */
        .btn-back {
            position: absolute;
            top: 16px; left: 16px;
            z-index: 10;
            background: white;
            padding: 10px 18px;
            border-radius: 50px;
            text-decoration: none;
            color: #1e293b;
            font-weight: 600;
            font-size: 0.88rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            display: flex; align-items: center; gap: 6px;
        }
        .btn-back:hover { background: #f1f5f9; color: #1e293b; }

        /* Badge de estado */
        .status-badge {
            position: absolute;
            top: 16px; right: 16px;
            z-index: 10;
            background: white;
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.85rem;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
        }

        /* Panel de filtros */
        .filters-panel {
            position: absolute;
            bottom: 20px; left: 16px; right: 16px;
            background: white;
            padding: 16px 20px;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.15);
            z-index: 10;
        }
        .filters-content {
            display: grid;
            grid-template-columns: 1fr 1fr auto;
            gap: 12px;
            align-items: end;
        }
        .filter-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 0.78rem;
            font-weight: 600;
            color: #374151;
        }
        .filter-group input, .filter-group select {
            width: 100%;
            padding: 10px 12px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.88rem;
            outline: none;
        }
        .filter-group input:focus, .filter-group select:focus {
            border-color: #2563eb;
        }
        .btn-search {
            padding: 10px 20px;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.88rem;
            white-space: nowrap;
        }
        .btn-search:hover { opacity: 0.9; }

        /* Popup personalizado */
        .mapboxgl-popup-content {
            border-radius: 14px !important;
            padding: 0 !important;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2) !important;
            min-width: 230px;
        }
        .popup-inner {
            padding: 16px;
        }
        .popup-nombre {
            font-weight: 700;
            font-size: 1rem;
            color: #1e293b;
            margin-bottom: 8px;
        }
        .popup-info {
            font-size: 0.82rem;
            color: #475569;
            margin-bottom: 4px;
        }
        .popup-btns {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 12px;
        }
        .popup-btn {
            width: 100%;
            padding: 9px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.82rem;
            color: white;
        }
        .popup-btn.solicitar { background: #1e3a8a; }
        .popup-btn.whatsapp  { background: #25D366; }
        .popup-btn.llamar    { background: #2563eb; }

        /* Marcador usuario */
        .user-marker {
            width: 20px; height: 20px;
            background: #4285F4;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        /* Marcador trabajador */
        .worker-marker {
            width: 34px; height: 34px;
            background: linear-gradient(135deg, #10b981, #059669);
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            display: flex; align-items: center; justify-content: center;
            color: white; font-weight: 700; font-size: 0.85rem;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .filters-content { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<a href="/" class="btn-back">← Volver</a>
<div class="status-badge" id="statusBadge">🔍 Cargando...</div>
<div id="map"></div>

<div class="filters-panel">
    <div class="filters-content">
        <div class="filter-group">
            <label>📏 Radio (km)</label>
            <input type="number" id="radio" value="10" min="1" max="50">
        </div>
        <div class="filter-group">
            <label>🔧 Categoría</label>
            <select id="categoria">
                <option value="">Todas</option>
                <option value="Plomería">Plomería</option>
                <option value="Electricidad">Electricidad</option>
                <option value="Limpieza">Limpieza</option>
                <option value="Carpintería">Carpintería</option>
                <option value="Pintura">Pintura</option>
                <option value="Jardinería">Jardinería</option>
                <option value="Cerrajería">Cerrajería</option>
                <option value="Mudanza">Mudanza</option>
                <option value="Mecánica">Mecánica</option>
                <option value="Tecnología">Tecnología</option>
                <option value="Salud">Salud</option>
                <option value="Belleza">Belleza</option>
                <option value="Gastronomía">Gastronomía</option>
                <option value="Transporte">Transporte</option>
                <option value="Construcción">Construcción</option>
            </select>
        </div>
        <div>
            <button class="btn-search" onclick="buscarTrabajadores()">🔍 Buscar</button>
        </div>
    </div>
</div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>
<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiamhvbmllcmNlc3BlZGVzMTItIiwiYSI6ImNtb25qeGJ1dTBtNGoycnB2NWZtb3V1ZDcifQ.oWycZCkDrln9HOGRaWT8Xg';

    let map, userMarker;
    let workerMarkers = [];
    let userLat = 3.431608;
    let userLng = -76.522041;

    // Pre-cargar categoría desde URL
    const urlParams = new URLSearchParams(window.location.search);
    const categoriaURL = urlParams.get('categoria');

    // Inicializar mapa
    map = new mapboxgl.Map({
        container: 'map',
        style: 'mapbox://styles/mapbox/streets-v12',
        center: [userLng, userLat],
        zoom: 13
    });

    // Controles de navegación
    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    // Marcador del usuario
    const userEl = document.createElement('div');
    userEl.className = 'user-marker';
    userMarker = new mapboxgl.Marker({ element: userEl })
        .setLngLat([userLng, userLat])
        .setPopup(new mapboxgl.Popup().setHTML('<b>📍 Tu ubicación</b>'))
        .addTo(map);

    // Obtener ubicación real
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                userLat = pos.coords.latitude;
                userLng = pos.coords.longitude;
                map.flyTo({ center: [userLng, userLat], zoom: 13 });
                userMarker.setLngLat([userLng, userLat]);
                buscarTrabajadores();
            },
            () => buscarTrabajadores()
        );
    } else {
        buscarTrabajadores();
    }

    // Aplicar categoría de URL
    if (categoriaURL) {
        document.getElementById('categoria').value = categoriaURL;
    }

    function limpiarMarcadores() {
        workerMarkers.forEach(m => m.remove());
        workerMarkers = [];
    }

    function agregarMarcadoresTrabajadores(trabajadores) {
        limpiarMarcadores();

        trabajadores.forEach((t, i) => {
            const el = document.createElement('div');
            el.className = 'worker-marker';
            el.textContent = i + 1;

            const popup = new mapboxgl.Popup({ offset: 25 }).setHTML(`
                <div class="popup-inner">
                    <div class="popup-nombre">${t.nombre}</div>
                    <div class="popup-info">📍 ${t.distancia} km de distancia</div>
                    <div class="popup-info">📞 ${t.telefono}</div>
                    <div class="popup-info">⭐ ${t.experiencia} años de experiencia</div>
                    <div class="popup-info">🔧 ${t.categoria}</div>
                    <div class="popup-btns">
                        <button class="popup-btn solicitar" onclick="solicitarServicio(${t.id}, '${t.nombre}', '${t.categoria}')">
                            📋 Solicitar Servicio
                        </button>
                        <button class="popup-btn whatsapp" onclick="contactar('${t.telefono}', '${t.nombre}')">
                            💬 WhatsApp
                        </button>
                        <button class="popup-btn llamar" onclick="llamar('${t.telefono}')">
                            📞 Llamar
                        </button>
                    </div>
                </div>
            `);

            const marker = new mapboxgl.Marker({ element: el })
                .setLngLat([t.longitud, t.latitud])
                .setPopup(popup)
                .addTo(map);

            workerMarkers.push(marker);
        });

        if (trabajadores.length > 0) {
            const bounds = new mapboxgl.LngLatBounds();
            trabajadores.forEach(t => bounds.extend([t.longitud, t.latitud]));
            bounds.extend([userLng, userLat]);
            map.fitBounds(bounds, { padding: 80 });
        }
    }

    async function buscarTrabajadores() {
        const radio = document.getElementById('radio').value;
        const categoria = document.getElementById('categoria').value;
        document.getElementById('statusBadge').textContent = '🔍 Buscando...';

        try {
            const url = `/cliente/trabajadores-cercanos?lat=${userLat}&lng=${userLng}&radio=${radio}${categoria ? '&categoria=' + encodeURIComponent(categoria) : ''}`;
            const res = await fetch(url);
            const data = await res.json();

            if (data.trabajadores && data.trabajadores.length > 0) {
                agregarMarcadoresTrabajadores(data.trabajadores);
                document.getElementById('statusBadge').textContent = `✅ ${data.trabajadores.length} encontrados`;
            } else {
                limpiarMarcadores();
                document.getElementById('statusBadge').textContent = '❌ No hay trabajadores';
            }
        } catch (e) {
            document.getElementById('statusBadge').textContent = '❌ Error de conexión';
        }
    }

    function contactar(telefono, nombre) {
        const msg = encodeURIComponent(`Hola ${nombre}, vi tu perfil en TalentHub y me gustaría solicitar tus servicios.`);
        window.open(`https://wa.me/57${telefono}?text=${msg}`, '_blank');
    }

    function llamar(telefono) {
        window.location.href = `tel:+57${telefono}`;
    }

    function solicitarServicio(id, nombre, categoria) {
        const idCliente = localStorage.getItem('id_cliente') || 1;
        window.location.href = `/cliente/solicitar_servicio?id_cliente=${idCliente}&trabajador_id=${id}&trabajador_nombre=${encodeURIComponent(nombre)}&categoria=${encodeURIComponent(categoria)}`;
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva contraseña – TalentHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Inter',sans-serif;background:#0a0a0f;min-height:100vh;
             display:flex;align-items:center;justify-content:center;padding:20px}
        .bg{position:fixed;inset:0;z-index:0;pointer-events:none;
            background:radial-gradient(ellipse 70% 50% at 10% 20%,rgba(6,182,212,0.12) 0%,transparent 60%),
                        radial-gradient(ellipse 60% 50% at 90% 80%,rgba(16,185,129,0.1) 0%,transparent 60%)}
        .card{position:relative;z-index:1;background:#111118;border:1px solid rgba(255,255,255,0.08);
              border-radius:24px;padding:36px 28px;width:100%;max-width:400px;
              box-shadow:0 32px 64px rgba(0,0,0,0.5);animation:fadeUp .4s ease}
        @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
        .logo-wrap{text-align:center;margin-bottom:28px}
        .logo-icon{width:56px;height:56px;border-radius:16px;
                   background:linear-gradient(135deg,#0891b2,#059669);
                   display:flex;align-items:center;justify-content:center;
                   font-size:1.5rem;margin:0 auto 12px;
                   box-shadow:0 8px 24px rgba(6,182,212,0.3)}
        .logo-title{font-size:1.3rem;font-weight:800;color:#f1f5f9}
        .logo-sub{font-size:0.82rem;color:#64748b;margin-top:3px}
        .form-group{margin-bottom:14px}
        .form-label{display:block;font-size:0.78rem;font-weight:600;color:#94a3b8;
                    margin-bottom:7px;letter-spacing:0.5px}
        .input-wrap{position:relative}
        .input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);
                    color:#475569;font-size:0.95rem}
        input[type=password],input[type=text]{
            width:100%;padding:13px 42px 13px 40px;background:rgba(255,255,255,0.04);
            border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:#f1f5f9;
            font-size:0.92rem;font-family:'Inter',sans-serif;outline:none;transition:all 0.2s}
        input:focus{border-color:rgba(6,182,212,0.5);background:rgba(6,182,212,0.04);
                    box-shadow:0 0 0 3px rgba(6,182,212,0.1)}
        input::placeholder{color:#334155}
        .toggle-pw{position:absolute;right:12px;top:50%;transform:translateY(-50%);
                   background:none;border:none;color:#475569;cursor:pointer;font-size:0.95rem;padding:4px}
        .strength-bar{height:4px;border-radius:99px;background:rgba(255,255,255,0.06);
                      margin-top:8px;overflow:hidden}
        .strength-fill{height:100%;border-radius:99px;width:0;transition:all 0.3s}
        .strength-label{font-size:0.72rem;color:#64748b;margin-top:4px}
        .alert{padding:12px 14px;border-radius:10px;font-size:0.82rem;margin-bottom:14px;display:none}
        .alert.error  {background:rgba(239,68,68,0.1);color:#fca5a5;border:1px solid rgba(239,68,68,0.2)}
        .alert.success{background:rgba(16,185,129,0.1);color:#6ee7b7;border:1px solid rgba(16,185,129,0.2)}
        .alert.show{display:block}
        .btn{width:100%;padding:14px;background:linear-gradient(135deg,#0891b2,#059669);
             color:white;border:none;border-radius:12px;font-size:0.95rem;font-weight:700;
             font-family:'Inter',sans-serif;cursor:pointer;margin-top:6px;transition:all 0.2s;
             display:flex;align-items:center;justify-content:center;gap:8px;
             box-shadow:0 4px 16px rgba(6,182,212,0.25)}
        .btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(6,182,212,0.35)}
        .btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
        .back{display:block;text-align:center;margin-top:18px;color:#475569;
              font-size:0.82rem;text-decoration:none}
        .back:hover{color:#94a3b8}
    </style>
</head>
<body>
<div class="bg"></div>
<div class="card">
    <div class="logo-wrap">
        <div class="logo-icon"><i class="bi bi-shield-lock-fill" style="color:white"></i></div>
        <div class="logo-title">Nueva contraseña</div>
        <div class="logo-sub">Elige una contraseña segura</div>
    </div>

    <div id="alertBox" class="alert"></div>

    <form id="formNueva">
        <input type="hidden" name="token" value="{{ token }}">

        <div class="form-group">
            <label class="form-label">NUEVA CONTRASEÑA</label>
            <div class="input-wrap">
                <i class="bi bi-lock input-icon"></i>
                <input type="password" id="pw1" name="password"
                       placeholder="Mínimo 6 caracteres" required oninput="checkStrength(this.value)">
                <button type="button" class="toggle-pw" onclick="togglePw('pw1','eye1')">
                    <i class="bi bi-eye" id="eye1"></i>
                </button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-label" id="strengthLabel"></div>
        </div>

        <div class="form-group">
            <label class="form-label">CONFIRMAR CONTRASEÑA</label>
            <div class="input-wrap">
                <i class="bi bi-lock-fill input-icon"></i>
                <input type="password" id="pw2" name="confirmar_password"
                       placeholder="Repite la contraseña" required>
                <button type="button" class="toggle-pw" onclick="togglePw('pw2','eye2')">
                    <i class="bi bi-eye" id="eye2"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn" id="btnGuardar">
            <i class="bi bi-check-circle-fill"></i> Guardar contraseña
        </button>
    </form>
    <a href="/cliente/login" class="back">← Volver al inicio de sesión</a>
</div>

<script>
function togglePw(inputId, iconId) {
    const input = document.getElementById(inputId);
    const icon  = document.getElementById(iconId);
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    icon.className = isText ? 'bi bi-eye' : 'bi bi-eye-slash';
}

function checkStrength(val) {
    const fill  = document.getElementById('strengthFill');
    const label = document.getElementById('strengthLabel');
    let score = 0;
    if (val.length >= 6)  score++;
    if (val.length >= 10) score++;
    if (/[A-Z]/.test(val)) score++;
    if (/[0-9]/.test(val)) score++;
    if (/[^A-Za-z0-9]/.test(val)) score++;
    const levels = [
        { w: '20%', color: '#ef4444', text: 'Muy débil' },
        { w: '40%', color: '#f97316', text: 'Débil' },
        { w: '60%', color: '#eab308', text: 'Regular' },
        { w: '80%', color: '#22c55e', text: 'Fuerte' },
        { w: '100%', color: '#10b981', text: 'Muy fuerte' },
    ];
    const lvl = levels[Math.min(score - 1, 4)] || { w: '0', color: 'transparent', text: '' };
    fill.style.width = lvl.w;
    fill.style.background = lvl.color;
    label.textContent = lvl.text;
    label.style.color = lvl.color;
}

document.getElementById('formNueva').addEventListener('submit', async (e) => {
    e.preventDefault();
    const alertBox = document.getElementById('alertBox');
    const btn = document.getElementById('btnGuardar');

    if (document.getElementById('pw1').value !== document.getElementById('pw2').value) {
        alertBox.className = 'alert error show';
        alertBox.textContent = '❌ Las contraseñas no coinciden';
        return;
    }

    btn.disabled = true;
    btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Guardando...';

    const fd = new FormData(e.target);
    try {
        const res  = await fetch('/cliente/recuperar/nueva-password', { method: 'POST', body: fd });
        const data = await res.json();
        if (res.ok) {
            alertBox.className = 'alert success show';
            alertBox.textContent = '✅ ' + data.mensaje;
            setTimeout(() => window.location.href = data.redirect || '/cliente/login', 1500);
        } else {
            alertBox.className = 'alert error show';
            alertBox.textContent = '❌ ' + (data.error || 'Error al guardar');
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-check-circle-fill"></i> Guardar contraseña';
        }
    } catch {
        alertBox.className = 'alert error show';
        alertBox.textContent = '❌ Error de conexión';
        btn.disabled = false;
        btn.innerHTML = '<i class="bi bi-check-circle-fill"></i> Guardar contraseña';
    }
});
</script>
</body>
</html>

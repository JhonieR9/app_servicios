<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Cliente - TalentHub</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #8b5cf6 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            background: rgba(139, 92, 246, 0.15);
            border-radius: 50%;
            top: -250px;
            right: -250px;
            animation: float 6s ease-in-out infinite;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            width: 400px;
            height: 400px;
            background: rgba(37, 99, 235, 0.15);
            border-radius: 50%;
            bottom: -200px;
            left: -200px;
            animation: float 8s ease-in-out infinite reverse;
            z-index: 0;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(20px); }
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 25px 70px rgba(0,0,0,0.4);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }

        .header {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 50%, #8b5cf6 100%);
            color: white;
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 10px,
                rgba(255,255,255,0.03) 10px,
                rgba(255,255,255,0.03) 20px
            );
        }

        .header h1 {
            font-size: 28px;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }

        .header p {
            opacity: 0.95;
            font-size: 14px;
            position: relative;
            z-index: 1;
        }

        .content {
            padding: 30px;
        }

        .welcome {
            background: linear-gradient(135deg, #dbeafe 0%, #e0e7ff 100%);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 30px;
            border-left: 4px solid #2563eb;
        }

        .welcome h2 {
            color: #1e293b;
            font-size: 20px;
            margin-bottom: 5px;
        }

        .welcome p {
            color: #475569;
            font-size: 14px;
        }

        .section-title {
            font-size: 18px;
            color: #1e293b;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .button {
            display: block;
            width: 100%;
            padding: 18px;
            margin-bottom: 15px;
            background: #2563eb;
            color: white;
            text-align: center;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: all 0.3s;
            border: none;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .button:hover::before {
            width: 300px;
            height: 300px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
        }

        .button.primary {
            background: linear-gradient(135deg, #2563eb 0%, #3b82f6 100%);
        }

        .button.secondary {
            background: linear-gradient(135deg, #8b5cf6 0%, #a78bfa 100%);
        }

        .button.secondary:hover {
            box-shadow: 0 8px 25px rgba(139, 92, 246, 0.5);
        }

        .button.outline {
            background: white;
            color: #2563eb;
            border: 2px solid #2563eb;
        }

        .button.outline:hover {
            background: #eff6ff;
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.2);
        }

        .button.danger {
            background: white;
            color: #ef4444;
            border: 2px solid #ef4444;
        }

        .button.danger:hover {
            background: #fef2f2;
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.2);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #e2e8f0;
            transition: all 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(37, 99, 235, 0.15);
            border-color: #3b82f6;
        }

        .stat-card .number {
            font-size: 32px;
            font-weight: bold;
            background: linear-gradient(135deg, #2563eb 0%, #8b5cf6 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 5px;
        }

        .stat-card .label {
            font-size: 13px;
            color: #475569;
        }

        .divider {
            text-align: center;
            color: #94a3b8;
            margin: 25px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👤 Panel de Cliente</h1>
            <p>Bienvenido a TalentHub</p>
        </div>

        <div class="content">
            <div class="welcome">
                <h2>¡Hola! 👋</h2>
                <p>¿Qué servicio necesitas hoy?</p>
            </div>

            <div class="stats">
                <div class="stat-card">
                    <div class="number" id="totalSolicitudes">0</div>
                    <div class="label">Solicitudes</div>
                </div>
                <div class="stat-card">
                    <div class="number" id="trabajadoresDisponibles">-</div>
                    <div class="label">Trabajadores cerca</div>
                </div>
            </div>

            <div class="section-title">Acciones Rápidas</div>

            <a href="/cliente/mapa" class="button primary">
                🗺️ Ver Mapa de Trabajadores
            </a>

            <a href="/cliente/solicitar_servicio" class="button primary">
                🔍 Solicitar un Servicio
            </a>

            <a href="/cliente/mis_solicitudes" class="button secondary">
                📋 Mis Solicitudes
            </a>

            <div class="divider">───────</div>

            <a href="/cliente/logout" class="button danger">
                🚪 Cerrar Sesión
            </a>
        </div>
    </div>

    <script>
        // Obtener ID del cliente desde localStorage (se guarda en login)
        const idCliente = localStorage.getItem('id_cliente') || 1;
        
        // Actualizar enlaces con el ID del cliente
        document.querySelector('a[href="/cliente/mis_solicitudes"]').href = `/cliente/mis_solicitudes?id_cliente=${idCliente}`;
        document.querySelector('a[href="/cliente/solicitar_servicio"]').href = `/cliente/solicitar_servicio?id_cliente=${idCliente}`;

        // Cargar estadísticas
        async function cargarEstadisticas() {
            try {
                // Cargar número de solicitudes
                const respSolicitudes = await fetch(`/cliente/historial/${idCliente}`);
                const dataSolicitudes = await respSolicitudes.json();
                
                if (dataSolicitudes.historial) {
                    document.getElementById('totalSolicitudes').textContent = dataSolicitudes.historial.length;
                }

                // Obtener ubicación para contar trabajadores cercanos
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(async (position) => {
                        const lat = position.coords.latitude;
                        const lng = position.coords.longitude;

                        const respTrabajadores = await fetch(`/cliente/trabajadores-cercanos?lat=${lat}&lng=${lng}&radio=10`);
                        const dataTrabajadores = await respTrabajadores.json();

                        if (dataTrabajadores.trabajadores) {
                            document.getElementById('trabajadoresDisponibles').textContent = dataTrabajadores.trabajadores.length;
                        }
                    });
                }
            } catch (error) {
                console.error('Error cargando estadísticas:', error);
            }
        }

        window.onload = cargarEstadisticas;
    </script>
</body>
</html>

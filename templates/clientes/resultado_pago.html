<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado del pago - TalentHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family:'Segoe UI',sans-serif;
            background:linear-gradient(135deg,#667eea,#764ba2);
            min-height:100vh;
            display:flex;align-items:center;justify-content:center;
            padding:20px;
        }
        .card {
            background:white;border-radius:24px;
            padding:40px 32px;width:100%;max-width:420px;
            text-align:center;box-shadow:0 24px 64px rgba(0,0,0,0.25);
        }
        .icon { font-size:4rem;margin-bottom:16px;display:block; }
        h2 { font-size:1.4rem;font-weight:800;margin-bottom:8px;color:#0f172a; }
        p  { font-size:0.9rem;color:#64748b;margin-bottom:28px;line-height:1.6; }
        .btn {
            display:block;padding:14px;border-radius:12px;font-weight:700;
            font-size:0.95rem;text-decoration:none;margin-bottom:10px;
            transition:all .2s;
        }
        .btn-primary {
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white;box-shadow:0 4px 16px rgba(102,126,234,.4);
        }
        .btn-primary:hover { transform:translateY(-2px); }
        .btn-secondary {
            background:#f1f5f9;color:#64748b;
        }
        .loading { color:#94a3b8;font-size:0.9rem;margin:20px 0; }
    </style>
</head>
<body>
<div class="card" id="card">
    <div class="loading">⏳ Verificando pago...</div>
</div>

<script>
    const idSolicitud = {{ id_solicitud }};
    const urlParams   = new URLSearchParams(window.location.search);
    const txnId       = urlParams.get('id') || '';
    const txnStatus   = urlParams.get('transaction_status') || '';

    async function verificar() {
        const card = document.getElementById('card');

        // Wompi redirige con ?id=TXN_ID&transaction_status=APPROVED
        let estado = txnStatus.toUpperCase();

        // Si no viene en la URL, consultar el backend
        if (!estado) {
            try {
                const res  = await fetch('/pago/estado?id_solicitud=' + idSolicitud);
                const data = await res.json();
                estado = data.estado_wompi || 'UNKNOWN';
            } catch(e) { estado = 'UNKNOWN'; }
        }

        if (estado === 'APPROVED') {
            card.innerHTML = `
                <span class="icon">🎉</span>
                <h2>¡Pago exitoso!</h2>
                <p>Tu pago fue procesado correctamente. El profesional ya fue notificado y comenzará a atenderte.</p>
                <a href="/cliente/seguimiento?id=${idSolicitud}" class="btn btn-primary">
                    <i class="bi bi-arrow-right-circle"></i> Ver seguimiento
                </a>
                <a href="/cliente/panel" class="btn btn-secondary">Ir al panel</a>
            `;
        } else if (estado === 'DECLINED' || estado === 'VOIDED' || estado === 'ERROR') {
            card.innerHTML = `
                <span class="icon">❌</span>
                <h2>Pago rechazado</h2>
                <p>El pago no pudo procesarse. Puedes intentarlo de nuevo o elegir otro método de pago.</p>
                <a href="/cliente/seguimiento?id=${idSolicitud}" class="btn btn-primary">
                    <i class="bi bi-arrow-counterclockwise"></i> Intentar de nuevo
                </a>
                <a href="/cliente/panel" class="btn btn-secondary">Volver al panel</a>
            `;
        } else {
            card.innerHTML = `
                <span class="icon">⏳</span>
                <h2>Pago en proceso</h2>
                <p>Tu pago está siendo procesado. Te notificaremos cuando se confirme.</p>
                <a href="/cliente/seguimiento?id=${idSolicitud}" class="btn btn-primary">
                    Ver seguimiento
                </a>
                <a href="/cliente/panel" class="btn btn-secondary">Ir al panel</a>
            `;
        }
    }

    verificar();
</script>
</body>
</html>

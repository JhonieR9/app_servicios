<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel - TalentHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#f0f2f5; min-height:100vh; }
        .topbar { background:linear-gradient(135deg,#059669,#0891b2);color:white;padding:16px 20px;display:flex;align-items:center;justify-content:space-between; }
        .topbar h1 { font-size:1.1rem;font-weight:700; }
        .topbar small { opacity:0.8;font-size:0.8rem; }
        .logout-btn { background:rgba(255,255,255,0.15);border:none;color:white;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:0.82rem;text-decoration:none;display:flex;align-items:center;gap:6px; }
        .logout-btn:hover { background:rgba(255,255,255,0.25); }
        .content { max-width:600px;margin:0 auto;padding:20px 16px; }
        .profile-card { background:white;border-radius:16px;padding:24px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);display:flex;align-items:center;gap:16px; }
        .avatar { width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#059669,#0891b2);display:flex;align-items:center;justify-content:center;font-size:1.6rem;color:white;flex-shrink:0; }
        .profile-info h3 { font-size:1.1rem;font-weight:700;color:#0f172a; }
        .profile-info p { color:#64748b;font-size:0.85rem;margin-top:2px; }
        .section-title { font-size:0.8rem;font-weight:700;color:#94a3b8;text-transform:uppercase;letter-spacing:1px;margin:20px 0 10px; }
        .menu-grid { display:grid;grid-template-columns:1fr 1fr;gap:12px; }
        .menu-item { background:white;border-radius:14px;padding:20px 16px;text-align:center;text-decoration:none;color:#0f172a;box-shadow:0 2px 8px rgba(0,0,0,0.06);transition:all 0.2s;display:flex;flex-direction:column;align-items:center;gap:10px; }
        .menu-item:hover { transform:translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,0.1); }
        .menu-icon { width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem; }
        .menu-icon.green  { background:#dcfce7; }
        .menu-icon.blue   { background:#dbeafe; }
        .menu-icon.purple { background:#ede9fe; }
        .menu-icon.orange { background:#ffedd5; }
        .menu-label { font-size:0.85rem;font-weight:600; }
        .menu-sub   { font-size:0.75rem;color:#94a3b8; }
    </style>
</head>
<body>
<div class="topbar">
    <div>
        <h1>🔍 Mi Panel</h1>
        <small id="bienvenida">TalentHub</small>
    </div>
    <a href="/cliente/logout" class="logout-btn">
        <i class="bi bi-box-arrow-left"></i> Salir
    </a>
</div>

<div class="content">
    <div class="profile-card">
        <div class="avatar">👤</div>
        <div class="profile-info">
            <h3 id="nombreCliente">Cargando...</h3>
            <p id="correoCliente"></p>
        </div>
    </div>

    <div class="section-title">¿Qué necesitas?</div>
    <div class="menu-grid">
        <a href="/cliente/solicitar_servicio" class="menu-item">
            <div class="menu-icon green"><i class="bi bi-search" style="color:#16a34a"></i></div>
            <div><div class="menu-label">Solicitar Servicio</div><div class="menu-sub">Buscar profesional</div></div>
        </a>
        <a href="/cliente/mapa" class="menu-item">
            <div class="menu-icon blue"><i class="bi bi-map-fill" style="color:#2563eb"></i></div>
            <div><div class="menu-label">Ver Mapa</div><div class="menu-sub">Trabajadores cercanos</div></div>
        </a>
        <a href="/cliente/mis_solicitudes" class="menu-item" id="link-solicitudes-cliente">
            <div class="menu-icon purple"><i class="bi bi-list-check" style="color:#7c3aed"></i></div>
            <div><div class="menu-label">Mis Solicitudes</div><div class="menu-sub">Historial</div></div>
        </a>
        <a href="/cliente/logout" class="menu-item">
            <div class="menu-icon orange"><i class="bi bi-box-arrow-left" style="color:#ea580c"></i></div>
            <div><div class="menu-label">Cerrar Sesión</div><div class="menu-sub">Salir</div></div>
        </a>
    </div>
</div>

<script>
    async function cargarPerfil() {
        const params = new URLSearchParams(window.location.search);
        const nombre = params.get('nombre');
        const id = params.get('id');

        if (nombre) {
            document.getElementById('nombreCliente').textContent = nombre;
            document.getElementById('bienvenida').textContent = 'Bienvenido, ' + nombre.split(' ')[0];
            // Actualizar link de solicitar servicio con id_cliente
            if (id) {
                document.querySelector('a[href="/cliente/solicitar_servicio"]').href = '/cliente/solicitar_servicio?id_cliente=' + id;
                document.querySelector('a[href="/cliente/mapa"]').href = '/cliente/mapa?id_cliente=' + id;
            }
            if (id) {
            localStorage.setItem('id_cliente', id);
            const linkSol = document.getElementById('link-solicitudes-cliente');
            if (linkSol) linkSol.href = '/cliente/mis_solicitudes?id_cliente=' + id;
            const linkMapa = document.querySelector('a[href="/cliente/mapa"]');
            if (linkMapa) linkMapa.href = '/cliente/mapa?id_cliente=' + id;
            const linkSolicitar = document.querySelector('a[href="/cliente/solicitar_servicio"]');
            if (linkSolicitar) linkSolicitar.href = '/cliente/solicitar_servicio?id_cliente=' + id;
        }
        return;
        }
        try {
            const res = await fetch('/cliente/mi-perfil', { credentials: 'include' });
            if (!res.ok) { document.getElementById('nombreCliente').textContent = 'Cliente'; return; }
            const data = await res.json();
            document.getElementById('nombreCliente').textContent = data.nombre_completo || 'Cliente';
            document.getElementById('correoCliente').textContent = data.correo || '';
            document.getElementById('bienvenida').textContent = 'Bienvenido, ' + (data.nombre_completo || '').split(' ')[0];
        } catch(e) { document.getElementById('nombreCliente').textContent = 'Cliente'; }
    }
    cargarPerfil();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel - TalentHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/talenthub.css">
</head>
<body>
<div class="th-bg"></div>

<!-- Topbar -->
<div class="th-topbar">
    <div>
        <div class="th-topbar-title">🔍 Mi Panel</div>
        <div class="th-topbar-sub" id="bienvenida">TalentHub</div>
    </div>
    <a href="/cliente/logout" class="th-logout">
        <i class="bi bi-box-arrow-left"></i> Salir
    </a>
</div>

<div class="th-content" style="position:relative;z-index:1;padding-top:24px">

    <!-- Perfil -->
    <div class="th-profile-card">
        <div class="th-avatar th-avatar-cyan">👤</div>
        <div>
            <div style="font-weight:700;font-size:1rem" id="nombreCliente">Cargando...</div>
            <div style="font-size:0.8rem;color:var(--muted);margin-top:2px" id="correoCliente"></div>
            <span class="th-badge th-badge-cyan" style="margin-top:6px">✅ Cliente activo</span>
        </div>
    </div>

    <!-- Banner verificación de correo -->
    <div id="banner-verificacion" style="display:none;background:#fffbeb;border:1px solid #fcd34d;border-radius:12px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <span style="font-size:1.3rem">📧</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:0.85rem;font-weight:700;color:#92400e;">Verifica tu correo electrónico</div>
        <div style="font-size:0.78rem;color:#b45309;margin-top:2px;">Revisa tu bandeja de entrada y haz clic en el enlace que te enviamos.</div>
      </div>
      <button onclick="reenviarVerificacion(this)" style="background:#f59e0b;color:white;border:none;border-radius:8px;padding:7px 14px;font-size:0.78rem;font-weight:700;cursor:pointer;white-space:nowrap;">
        Reenviar correo
      </button>
    </div>

    <!-- Menú -->
    <div class="th-section-title"><i class="bi bi-grid-2x2-fill"></i> ¿Qué necesitas?</div>
    <div class="th-menu-grid">
        <a href="/cliente/solicitar_servicio" class="th-menu-item" id="link-solicitar">
            <div class="th-menu-icon th-menu-icon-green"><i class="bi bi-search" style="color:#10b981"></i></div>
            <div class="th-menu-label">Solicitar</div>
            <div class="th-menu-sub">Buscar profesional</div>
        </a>
        <a href="/cliente/mapa" class="th-menu-item" id="link-mapa">
            <div class="th-menu-icon th-menu-icon-purple"><i class="bi bi-map-fill" style="color:#6366f1"></i></div>
            <div class="th-menu-label">Ver Mapa</div>
            <div class="th-menu-sub">Trabajadores cerca</div>
        </a>
        <a href="/cliente/mis_solicitudes" class="th-menu-item" id="link-solicitudes-cliente">
            <div class="th-menu-icon th-menu-icon-cyan"><i class="bi bi-list-check" style="color:#06b6d4"></i></div>
            <div class="th-menu-label">Mis Solicitudes</div>
            <div class="th-menu-sub">Historial</div>
        </a>
        <a href="/cliente/logout" class="th-menu-item">
            <div class="th-menu-icon th-menu-icon-orange"><i class="bi bi-box-arrow-left" style="color:#f59e0b"></i></div>
            <div class="th-menu-label">Cerrar Sesión</div>
            <div class="th-menu-sub">Salir</div>
        </a>
    </div>

</div>

<script>
    async function cargarPerfil() {
        const params = new URLSearchParams(window.location.search);
        const nombre = params.get('nombre');
        const id = params.get('id');

        if (nombre) {
            document.getElementById('nombreCliente').textContent = nombre;
            document.getElementById('bienvenida').textContent = 'Bienvenido, ' + nombre.split(' ')[0];
            if (id) {
                localStorage.setItem('id_cliente', id);
                const linkSol = document.getElementById('link-solicitudes-cliente');
                if (linkSol) linkSol.href = '/cliente/mis_solicitudes?id_cliente=' + id;
                const linkMapa = document.getElementById('link-mapa');
                if (linkMapa) linkMapa.href = '/cliente/mapa?id_cliente=' + id;
                const linkSolicitar = document.getElementById('link-solicitar');
                if (linkSolicitar) linkSolicitar.href = '/cliente/solicitar_servicio?id_cliente=' + id;
            }
            return;
        }
        try {
            const res = await fetch('/cliente/mi-perfil', { credentials: 'include' });
            if (!res.ok) { document.getElementById('nombreCliente').textContent = 'Cliente'; return; }
            const data = await res.json();
            document.getElementById('nombreCliente').textContent = data.nombre_completo || 'Cliente';
            document.getElementById('correoCliente').textContent = data.correo || '';
            document.getElementById('bienvenida').textContent = 'Bienvenido, ' + (data.nombre_completo || '').split(' ')[0];
            // Mostrar banner si el correo no está verificado
            if (data.correo && data.email_verificado === false) {
                document.getElementById('banner-verificacion').style.display = 'flex';
            }
        } catch(e) { document.getElementById('nombreCliente').textContent = 'Cliente'; }
    }

    async function reenviarVerificacion(btn) {
        btn.disabled = true;
        btn.textContent = 'Enviando...';
        try {
            const res = await fetch('/cliente/reenviar-verificacion', {
                method: 'POST',
                credentials: 'include',
                headers: { 'Content-Type': 'application/json' },
                body: '{}'
            });
            const data = await res.json();
            if (data.mensaje) {
                btn.textContent = '✅ Enviado';
                btn.style.background = '#059669';
            } else {
                btn.textContent = '❌ ' + (data.error || 'Error');
                btn.disabled = false;
            }
        } catch(e) {
            btn.textContent = '❌ Error de red';
            btn.disabled = false;
        }
    }
    cargarPerfil();
</script>
</body>
</html>

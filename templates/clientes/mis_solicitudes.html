<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Solicitudes - TalentHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Lato:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Lato',sans-serif; background:#f0f2f5; min-height:100vh; padding-bottom:40px; }

        /* TOP BAR */
        .topbar {
            background: linear-gradient(135deg,#667eea,#764ba2);
            color:white; padding:16px 20px;
            display:flex; align-items:center; gap:12px;
            position:sticky; top:0; z-index:10;
            box-shadow:0 4px 16px rgba(102,126,234,0.3);
        }
        .back-btn {
            width:36px;height:36px;border-radius:50%;
            background:rgba(255,255,255,0.2);border:none;
            color:white;font-size:1rem;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            text-decoration:none; flex-shrink:0;
        }
        .topbar-title { font-family:'Playfair Display',serif; font-size:1.15rem;font-weight:700; }
        .topbar-sub { font-size:0.75rem;color:rgba(255,255,255,0.75);margin-top:1px; }

        /* TABS */
        .tabs {
            display:flex; background:white;
            border-bottom:2px solid #f0f2f5;
            position:sticky; top:68px; z-index:9;
        }
        .tab-btn {
            flex:1; padding:13px 8px;
            background:none; border:none; border-bottom:3px solid transparent;
            font-family:'Lato',sans-serif; font-size:0.82rem; font-weight:700;
            color:#94a3b8; cursor:pointer; margin-bottom:-2px;
            transition:all 0.2s; display:flex; align-items:center;
            justify-content:center; gap:6px;
        }
        .tab-btn.active { color:#667eea; border-bottom-color:#667eea; }
        .tab-badge {
            background:#ef4444; color:white;
            border-radius:99px; padding:1px 7px;
            font-size:0.68rem; font-weight:700; display:none;
        }
        .tab-badge.show { display:inline; }

        /* CONTENT */
        .content { max-width:600px;margin:0 auto;padding:16px; }

        /* EMPTY */
        .empty {
            text-align:center;padding:60px 20px;
            background:white;border-radius:20px;
            box-shadow:0 2px 8px rgba(0,0,0,0.06);
        }
        .empty-icon { font-size:3rem;margin-bottom:12px; }
        .empty p { color:#64748b;font-size:0.9rem; }
        .empty p.sub { font-size:0.78rem;margin-top:6px;color:#94a3b8; }
        .btn-nueva {
            display:inline-flex;align-items:center;gap:8px;
            margin-top:20px; padding:13px 28px;
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white;border-radius:14px;text-decoration:none;
            font-weight:700;font-size:0.9rem;
            box-shadow:0 4px 14px rgba(102,126,234,0.35);
            transition:all 0.2s;
        }
        .btn-nueva:hover { transform:translateY(-2px); }

        /* CARD ACTIVA (pendiente/aceptada/en_proceso) */
        .card-activa {
            background:white; border-radius:20px;
            margin-bottom:14px; overflow:hidden;
            box-shadow:0 4px 16px rgba(0,0,0,0.08);
            animation:cardIn 0.35s ease;
        }
        @keyframes cardIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

        .card-activa-header {
            padding:16px 18px 12px;
            display:flex; align-items:center; gap:12px;
        }
        .estado-dot-wrap {
            width:44px;height:44px;border-radius:14px;
            display:flex;align-items:center;justify-content:center;
            font-size:1.4rem;flex-shrink:0;
        }
        .estado-dot-wrap.pendiente  { background:#fef3c7; }
        .estado-dot-wrap.aceptada   { background:#dbeafe; }
        .estado-dot-wrap.en_proceso { background:#dcfce7; }

        .card-activa-titulo {
            font-family:'Playfair Display',serif;
            font-size:0.95rem;font-weight:700;color:#0f172a;
        }
        .card-activa-sub { font-size:0.75rem;color:#94a3b8;margin-top:2px; }

        .estado-pill {
            margin-left:auto; padding:5px 12px;
            border-radius:99px; font-size:0.72rem; font-weight:700;
            flex-shrink:0;
        }
        .estado-pill.pendiente  { background:#fef3c7;color:#d97706; }
        .estado-pill.aceptada   { background:#dbeafe;color:#2563eb; }
        .estado-pill.en_proceso { background:#dcfce7;color:#16a34a; }

        /* Barra de progreso de estado */
        .estado-progress {
            display:flex; align-items:center;
            padding:0 18px 14px; gap:0;
        }
        .prog-step {
            flex:1; display:flex; flex-direction:column;
            align-items:center; position:relative;
        }
        .prog-step:not(:last-child)::after {
            content:''; position:absolute;
            top:10px; left:50%; right:-50%;
            height:2px; background:#e2e8f0; z-index:0;
            transition:background 0.4s;
        }
        .prog-step.done:not(:last-child)::after { background:linear-gradient(90deg,#667eea,#764ba2); }
        .prog-dot {
            width:20px;height:20px;border-radius:50%;
            background:#e2e8f0;position:relative;z-index:1;
            display:flex;align-items:center;justify-content:center;
            font-size:0.6rem;color:#94a3b8;
            transition:all 0.3s;
        }
        .prog-step.done .prog-dot { background:linear-gradient(135deg,#667eea,#764ba2);color:white; }
        .prog-step.active .prog-dot {
            background:white;border:2px solid #667eea;color:#667eea;
            box-shadow:0 0 0 3px rgba(102,126,234,0.2);
        }
        .prog-label { font-size:0.6rem;color:#94a3b8;margin-top:4px;font-weight:600; }
        .prog-step.done .prog-label { color:#667eea; }
        .prog-step.active .prog-label { color:#667eea;font-weight:700; }

        .card-activa-btns {
            display:grid; grid-template-columns:1fr 1fr;
            gap:10px; padding:0 18px 18px;
        }
        .btn-seguimiento {
            padding:12px; border:none;
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white; border-radius:12px;
            font-weight:700; font-size:0.82rem; cursor:pointer;
            font-family:'Lato',sans-serif;
            display:flex;align-items:center;justify-content:center;gap:6px;
            text-decoration:none; transition:all 0.2s;
            box-shadow:0 4px 12px rgba(102,126,234,0.3);
        }
        .btn-seguimiento:hover { transform:translateY(-2px); }
        .btn-cancelar-card {
            padding:12px; border:2px solid #fee2e2;
            background:white; color:#dc2626;
            border-radius:12px; font-weight:700; font-size:0.82rem;
            cursor:pointer; font-family:'Lato',sans-serif;
            display:flex;align-items:center;justify-content:center;gap:6px;
            transition:background 0.2s;
        }
        .btn-cancelar-card:hover { background:#fef2f2; }

        /* CARD HISTORIAL */
        .card-hist {
            background:white; border-radius:16px;
            padding:16px 18px; margin-bottom:10px;
            box-shadow:0 2px 8px rgba(0,0,0,0.06);
            display:flex; align-items:center; gap:14px;
            animation:cardIn 0.3s ease;
        }
        .hist-emoji { font-size:1.6rem;flex-shrink:0; }
        .hist-info { flex:1;min-width:0; }
        .hist-titulo {
            font-size:0.88rem;font-weight:700;color:#0f172a;
            white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
        }
        .hist-meta { font-size:0.75rem;color:#94a3b8;margin-top:2px; }
        .hist-right { display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0; }
        .hist-badge { padding:4px 10px;border-radius:99px;font-size:0.72rem;font-weight:700; }
        .hist-badge.completada { background:#f3f0ff;color:#667eea; }
        .hist-badge.cancelada  { background:#fee2e2;color:#dc2626; }
        .btn-repetir {
            padding:6px 14px; border:none;
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white; border-radius:99px;
            font-size:0.72rem; font-weight:700; cursor:pointer;
            font-family:'Lato',sans-serif;
            transition:all 0.2s;
        }
        .btn-repetir:hover { transform:scale(1.05); }

        /* Sección label */
        .section-label {
            font-size:0.72rem;font-weight:700;color:#94a3b8;
            text-transform:uppercase;letter-spacing:1.5px;
            margin:16px 0 10px; display:flex; align-items:center; gap:8px;
        }
        .section-label::after { content:'';flex:1;height:1px;background:#e2e8f0; }

        .btn-completar {
            padding:12px; border:2px solid #dcfce7;
            background:white; color:#16a34a;
            border-radius:12px; font-weight:700; font-size:0.82rem;
            cursor:pointer; font-family:'Lato',sans-serif;
            display:flex;align-items:center;justify-content:center;gap:6px;
            transition:background 0.2s;
        }
        .btn-completar:hover { background:#f0fdf4; }

        /* FAB nueva solicitud */
        .fab {
            position:fixed; bottom:24px; right:20px;
            width:56px;height:56px;border-radius:50%;
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white; border:none; font-size:1.5rem;
            cursor:pointer; box-shadow:0 8px 24px rgba(102,126,234,0.45);
            display:flex;align-items:center;justify-content:center;
            transition:all 0.2s; text-decoration:none; z-index:100;
        }
        .fab:hover { transform:scale(1.1) rotate(15deg); }
    </style>
</head>
<body>

<div class="topbar">
    <a href="javascript:history.back()" class="back-btn"><i class="bi bi-arrow-left"></i></a>
    <div>
        <div class="topbar-title">Mis Solicitudes</div>
        <div class="topbar-sub" id="topSub">Cargando...</div>
    </div>
</div>

<!-- TABS -->
<div class="tabs">
    <button class="tab-btn active" id="tabActivas" onclick="mostrarTab('activas')">
        <i class="bi bi-clock"></i> En curso
        <span class="tab-badge" id="badgeActivas"></span>
    </button>
    <button class="tab-btn" id="tabHistorial" onclick="mostrarTab('historial')">
        <i class="bi bi-clock-history"></i> Historial
    </button>
</div>

<div class="content">
    <div id="contenidoActivas"></div>
    <div id="contenidoHistorial" style="display:none"></div>
</div>

<!-- FAB nueva solicitud -->
<a href="/cliente/solicitar_servicio" id="fabNueva" class="fab" title="Nueva solicitud">+</a>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    let idCliente = urlParams.get('id_cliente') || localStorage.getItem('id_cliente');
    let tabActual   = 'activas';

    async function obtenerIdClienteSesion() {
        try {
            const res = await fetch('/cliente/mi-perfil', { credentials: 'include' });
            if (res.status === 401) {
                // Sesión expirada — redirigir a login
                window.location.href = '/cliente/login?expired=1';
                return null;
            }
            if (res.ok) {
                const data = await res.json();
                if (data && data.id_cliente) {
                    localStorage.setItem('id_cliente', data.id_cliente);
                    return data.id_cliente;
                }
            }
        } catch (e) {}
        return null;
    }

    function abrirChat(idSolicitud, idTrabajador, nombreTrabajador, idCli) {
        window.location.href = `/chat/?id_solicitud=${idSolicitud}&tipo=cliente&id_usuario=${idCli}`;
    }

    const CAT_EMOJI = {
        'Plomería':'🔧','Electricidad':'⚡','Limpieza':'🧹','Carpintería':'🪚',
        'Pintura':'🎨','Jardinería':'🌱','Mecánica':'🔩','Tecnología':'💻',
        'Construcción':'🏗️','Educación':'📚','Salud':'💊','Belleza':'💇',
        'Gastronomía':'🍳','Transporte':'🚚'
    };

    const ESTADO_EMOJI = { pendiente:'⏳', aceptada:'✅', en_proceso:'🔧', completada:'🎉', cancelada:'❌' };
    const ESTADO_LABEL = { pendiente:'Buscando profesional', aceptada:'Profesional asignado', en_proceso:'En proceso', completada:'Completado', cancelada:'Cancelado' };

    const PROG_ESTADOS = ['pendiente','aceptada','en_proceso','completada'];

    function mostrarTab(tab) {
        tabActual = tab;
        ['activas','historial'].forEach(t => {
            document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.toggle('active', t === tab);
            document.getElementById('contenido' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = t === tab ? 'block' : 'none';
        });
    }

    function renderProgreso(estado) {
        const idx = PROG_ESTADOS.indexOf(estado);
        return `<div class="estado-progress">` +
            PROG_ESTADOS.map((e, i) => {
                let cls = i < idx ? 'done' : i === idx ? 'active' : '';
                const labels = { pendiente:'Enviado', aceptada:'Asignado', en_proceso:'En proceso', completada:'Listo' };
                return `<div class="prog-step ${cls}">
                    <div class="prog-dot">${i < idx ? '✓' : i+1}</div>
                    <div class="prog-label">${labels[e]}</div>
                </div>`;
            }).join('') +
        `</div>`;
    }

    function renderActiva(s) {
        const emoji = CAT_EMOJI[s.nombre_categoria] || '🔧';
        const estado = s.estado || 'pendiente';

        // Tarjeta del trabajador asignado
        let trabajadorHtml = '';
        if (s.id_trabajador && s.nombre_trabajador) {
            const iniciales = s.nombre_trabajador.split(' ').map(p=>p[0]).join('').substring(0,2).toUpperCase();
            const estrellas = s.calificacion_trabajador > 0
                ? `<span style="color:#f59e0b;font-size:0.75rem">★ ${s.calificacion_trabajador}</span>`
                : '';
            trabajadorHtml = `
            <div style="margin:0 18px 14px;background:#f8fafc;border-radius:14px;padding:14px;
                        display:flex;align-items:center;gap:12px;border:1px solid #e2e8f0">
                <div style="width:42px;height:42px;border-radius:50%;flex-shrink:0;
                            background:linear-gradient(135deg,#4f46e5,#7c3aed);
                            display:flex;align-items:center;justify-content:center;
                            font-size:0.9rem;font-weight:700;color:white">${iniciales}</div>
                <div style="flex:1;min-width:0">
                    <div style="font-size:0.88rem;font-weight:700;color:#0f172a">${s.nombre_trabajador}</div>
                    <div style="font-size:0.72rem;color:#64748b;margin-top:2px;display:flex;align-items:center;gap:6px">
                        <span>👷 Profesional asignado</span> ${estrellas}
                    </div>
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <a onclick="abrirChat(${s.id_solicitud}, ${s.id_trabajador || 0}, '${(s.nombre_trabajador||'').replace(/'/g,"\\'")}', idCliente)"
                       style="display:flex;align-items:center;justify-content:center;
                              width:34px;height:34px;border-radius:50%;
                              background:#ede9fe;color:#7c3aed;text-decoration:none;font-size:0.9rem;cursor:pointer"
                       title="Chat en TalentHub">
                        <i class="bi bi-chat-dots-fill"></i>
                    </a>
                </div>
            </div>`;
        } else if (estado === 'pendiente') {
            trabajadorHtml = `
            <div style="margin:0 18px 14px;background:#fef9c3;border-radius:14px;padding:12px 14px;
                        display:flex;align-items:center;gap:10px;border:1px solid #fde68a">
                <span style="font-size:1.2rem">🔍</span>
                <div>
                    <div style="font-size:0.82rem;font-weight:700;color:#92400e">Buscando profesional...</div>
                    <div style="font-size:0.72rem;color:#a16207;margin-top:1px">Te notificaremos cuando alguien acepte</div>
                </div>
            </div>`;
        }

        const cancelBtn = estado === 'pendiente'
            ? `<button class="btn-cancelar-card" onclick="cancelar(${s.id_solicitud})"><i class="bi bi-x-circle"></i> Cancelar</button>`
            : `<div></div>`;
        const completarBtn = (estado === 'en_proceso' || estado === 'aceptada')
            ? `<button class="btn-completar" onclick="completarServicio(${s.id_solicitud})"><i class="bi bi-check-circle-fill"></i> Completado</button>`
            : '';
        return `
        <div class="card-activa">
            <div class="card-activa-header">
                <div class="estado-dot-wrap ${estado}">${ESTADO_EMOJI[estado] || '⏳'}</div>
                <div style="flex:1;min-width:0">
                    <div class="card-activa-titulo">${s.titulo || s.nombre_categoria || 'Solicitud'}</div>
                    <div class="card-activa-sub">${ESTADO_LABEL[estado] || estado} · ${s.fecha_solicitud || ''}</div>
                </div>
                <span class="estado-pill ${estado}">${estado.replace('_',' ')}</span>
            </div>
            ${renderProgreso(estado)}
            ${trabajadorHtml}
            <div class="card-activa-btns">
                <a href="/chat/?id_solicitud=${s.id_solicitud}&tipo=cliente&id_usuario=${idCliente}"
                   class="btn-seguimiento" style="background:linear-gradient(135deg,#0ea5e9,#0284c7)">
                    <i class="bi bi-chat-dots-fill"></i> Chat
                    <span id="badge-${s.id_solicitud}" style="background:rgba(255,255,255,0.3);border-radius:99px;padding:1px 7px;font-size:0.7rem;display:none"></span>
                </a>
                ${completarBtn || cancelBtn}
            </div>
        </div>`;
    }

    function renderHistorialCard(s) {
        const emoji = CAT_EMOJI[s.nombre_categoria] || '🔧';
        const estado = s.estado || 'completada';
        const trabajadorInfo = s.nombre_trabajador
            ? `<div style="font-size:0.72rem;color:#64748b;margin-top:2px">
                   👷 ${s.nombre_trabajador}
               </div>`
            : '';
        return `
        <div class="card-hist">
            <div class="hist-emoji">${emoji}</div>
            <div class="hist-info">
                <div class="hist-titulo">${s.titulo || s.nombre_categoria || 'Solicitud'}</div>
                <div class="hist-meta">${s.ciudad || ''} ${s.departamento || ''} · ${s.fecha_solicitud || ''}</div>
                ${trabajadorInfo}
            </div>
            <div class="hist-right">
                <span class="hist-badge ${estado}">${estado}</span>
                ${estado === 'completada'
                    ? `<button class="btn-repetir" onclick="repetir('${encodeURIComponent(s.nombre_categoria||'')}')">↺ Repetir</button>`
                    : ''}
                ${estado === 'completada' && s.id_trabajador
                    ? `<button class="btn-repetir" style="background:linear-gradient(135deg,#f59e0b,#d97706)"
                               onclick="abrirCalificar(${s.id_solicitud},${s.id_trabajador},'${s.nombre_trabajador.replace(/'/g,"\\'")}')">
                           ⭐ Calificar
                       </button>`
                    : ''}
            </div>
        </div>`;
    }

    async function cargarSolicitudes() {
        try {
            if (!idCliente) {
                idCliente = await obtenerIdClienteSesion();
            }
            if (!idCliente) {
                document.getElementById('contenidoActivas').innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">⚠️</div>
                        <p>No se encontró tu sesión</p>
                        <p class="sub">Por favor inicia sesión de nuevo.</p>
                        <a href="/cliente/login" class="btn-nueva" style="margin-top:12px">
                            <i class="bi bi-box-arrow-in-right"></i> Iniciar sesión
                        </a>
                    </div>`;
                document.getElementById('contenidoHistorial').innerHTML = '';
                document.getElementById('topSub').textContent = 'No autenticado';
                return;
            }

            // Actualizar FAB con id_cliente correcto
            document.getElementById('fabNueva').href = '/cliente/solicitar_servicio?id_cliente=' + idCliente;

            const res  = await fetch(`/cliente/mis_solicitudes_api?id_cliente=${idCliente}`);
            const data = await res.json();
            const todas = data.solicitudes || [];

            const activas   = todas.filter(s => ['pendiente','aceptada','en_proceso'].includes(s.estado));
            const historial = todas.filter(s => ['completada','cancelada'].includes(s.estado));

            // Badges
            const ba = document.getElementById('badgeActivas');
            ba.textContent = activas.length;
            ba.classList.toggle('show', activas.length > 0);

            // Subtitle
            document.getElementById('topSub').textContent =
                activas.length > 0
                    ? `${activas.length} servicio${activas.length > 1 ? 's' : ''} en curso`
                    : `${historial.length} servicio${historial.length !== 1 ? 's' : ''} en historial`;

            // Activas
            const caEl = document.getElementById('contenidoActivas');
            if (!activas.length) {
                caEl.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">📭</div>
                        <p>No tienes servicios en curso</p>
                        <p class="sub">¿Necesitas algo? Solicita un servicio ahora</p>
                        <a href="/cliente/solicitar_servicio" class="btn-nueva">
                            <i class="bi bi-plus-circle"></i> Solicitar servicio
                        </a>
                    </div>`;
            } else {
                caEl.innerHTML = `<div class="section-label">En curso</div>` + activas.map(renderActiva).join('');
            }

            // Historial
            const chEl = document.getElementById('contenidoHistorial');
            if (!historial.length) {
                chEl.innerHTML = `
                    <div class="empty">
                        <div class="empty-icon">📋</div>
                        <p>Sin historial aún</p>
                        <p class="sub">Aquí aparecerán tus servicios completados</p>
                    </div>`;
            } else {
                chEl.innerHTML = `<div class="section-label">Completados · ${historial.length} servicios</div>` +
                    historial.map(renderHistorialCard).join('');
            }

        } catch(e) {
            document.getElementById('contenidoActivas').innerHTML = `
                <div class="empty">
                    <div class="empty-icon">⚠️</div>
                    <p>Error al cargar solicitudes</p>
                </div>`;
        }
    }

    async function cancelar(idSolicitud) {
        if (!confirm('¿Cancelar esta solicitud?')) return;
        const fd = new FormData();
        fd.append('id_solicitud', idSolicitud);
        fd.append('motivo', 'Cancelado por el cliente');
        const res = await fetch('/cliente/solicitud/cancelar', { method:'POST', body:fd });
        if (res.ok) { mostrarToast('Solicitud cancelada'); cargarSolicitudes(); }
    }

    async function completarServicio(idSolicitud) {
        if (!confirm('¿Confirmas que el servicio fue realizado correctamente?')) return;
        // Hora local del dispositivo del cliente
        const ahora = new Date();
        const fechaLocal = ahora.getFullYear() + '-' +
            String(ahora.getMonth()+1).padStart(2,'0') + '-' +
            String(ahora.getDate()).padStart(2,'0') + 'T' +
            String(ahora.getHours()).padStart(2,'0') + ':' +
            String(ahora.getMinutes()).padStart(2,'0') + ':' +
            String(ahora.getSeconds()).padStart(2,'0');
        const fd = new FormData();
        fd.append('id_solicitud', idSolicitud);
        fd.append('fecha_local', fechaLocal);
        const res = await fetch('/cliente/solicitud/completar', { method:'POST', body:fd });
        const data = await res.json();
        if (res.ok) {
            mostrarToast('✅ ' + data.mensaje);
            cargarSolicitudes();
        } else {
            mostrarToast('❌ ' + (data.error || 'Error al completar'));
        }
    }

    function repetir(categoria) {
        window.location.href = '/cliente/solicitar_servicio?categoria=' + categoria;
    }

    function abrirCalificar(idSolicitud, idTrabajador, nombreTrabajador) {
        let modal = document.getElementById('modalCalificar');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'modalCalificar';
            modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center';
            modal.innerHTML = `
                <div style="background:white;border-radius:24px 24px 0 0;width:100%;max-width:500px;padding:24px 20px 32px">
                    <div style="font-size:1rem;font-weight:800;color:#0f172a;margin-bottom:4px" id="calNombre"></div>
                    <div style="font-size:0.8rem;color:#64748b;margin-bottom:20px">¿Cómo fue tu experiencia?</div>
                    <div style="display:flex;gap:8px;justify-content:center;margin-bottom:20px" id="starsRow">
                        ${[1,2,3,4,5].map(n=>`<span onclick="selStar(${n})" id="star${n}"
                            style="font-size:2.2rem;cursor:pointer;transition:transform 0.15s">☆</span>`).join('')}
                    </div>
                    <textarea id="calComentario" rows="3" placeholder="Cuéntanos cómo te fue (opcional)..."
                        style="width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:12px;
                               font-family:'Lato',sans-serif;font-size:0.88rem;outline:none;resize:none;
                               margin-bottom:14px"
                        onfocus="this.style.borderColor='#667eea'" onblur="this.style.borderColor='#e2e8f0'"></textarea>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                        <button onclick="cerrarCalificar()"
                            style="padding:13px;border:2px solid #e2e8f0;background:white;color:#64748b;
                                   border-radius:12px;font-weight:700;cursor:pointer;font-family:'Lato',sans-serif">
                            Cancelar
                        </button>
                        <button id="btnEnviarCal" onclick="enviarCalificacion()"
                            style="padding:13px;background:linear-gradient(135deg,#f59e0b,#d97706);
                                   color:white;border:none;border-radius:12px;font-weight:700;
                                   cursor:pointer;font-family:'Lato',sans-serif">
                            ⭐ Enviar
                        </button>
                    </div>
                </div>`;
            document.body.appendChild(modal);
            modal.addEventListener('click', e => { if(e.target===modal) cerrarCalificar(); });
        }
        modal._idSolicitud  = idSolicitud;
        modal._idTrabajador = idTrabajador;
        modal._puntuacion   = 0;
        document.getElementById('calNombre').textContent = '⭐ Calificar a ' + nombreTrabajador;
        document.getElementById('calComentario').value = '';
        [1,2,3,4,5].forEach(n => { document.getElementById('star'+n).textContent = '☆'; });
        modal.style.display = 'flex';
    }

    function selStar(n) {
        const modal = document.getElementById('modalCalificar');
        modal._puntuacion = n;
        [1,2,3,4,5].forEach(i => {
            const s = document.getElementById('star'+i);
            s.textContent = i <= n ? '★' : '☆';
            s.style.color = i <= n ? '#f59e0b' : '#cbd5e1';
            s.style.transform = i === n ? 'scale(1.3)' : 'scale(1)';
        });
    }

    function cerrarCalificar() {
        const modal = document.getElementById('modalCalificar');
        if (modal) modal.style.display = 'none';
    }

    async function enviarCalificacion() {
        const modal = document.getElementById('modalCalificar');
        if (!modal._puntuacion) { mostrarToast('Selecciona una calificación'); return; }
        const btn = document.getElementById('btnEnviarCal');
        btn.disabled = true; btn.textContent = 'Enviando...';
        const fd = new FormData();
        fd.append('id_solicitud',  modal._idSolicitud);
        fd.append('id_cliente',    idCliente);
        fd.append('id_trabajador', modal._idTrabajador);
        fd.append('puntuacion',    modal._puntuacion);
        fd.append('comentario',    document.getElementById('calComentario').value);
        const res  = await fetch('/cliente/calificar', { method:'POST', body:fd });
        const data = await res.json();
        cerrarCalificar();
        mostrarToast(res.ok ? '✅ ' + data.mensaje : '❌ ' + (data.error || 'Error'));
        btn.disabled = false; btn.textContent = '⭐ Enviar';
    }

    function mostrarToast(msg) {
        const t = document.createElement('div');
        t.style.cssText = 'position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#667eea;color:white;padding:12px 24px;border-radius:99px;font-weight:700;font-size:0.88rem;z-index:9999;box-shadow:0 8px 24px rgba(0,0,0,0.2);white-space:nowrap;';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    cargarSolicitudes();
    // Polling cada 20s para actualizar estados y badges de chat
    setInterval(async () => {
        await cargarSolicitudes();
        // Actualizar badges de mensajes no leídos
        document.querySelectorAll('[id^="badge-"]').forEach(async badge => {
            const idSol = badge.id.replace('badge-', '');
            try {
                const res  = await fetch(`/chat/no-leidos?id_solicitud=${idSol}&tipo_receptor=cliente`);
                const data = await res.json();
                if (data.no_leidos > 0) {
                    badge.textContent = data.no_leidos;
                    badge.style.display = 'inline';
                } else {
                    badge.style.display = 'none';
                }
            } catch(e) {}
        });
    }, 20000);
</script>
</body>
</html>

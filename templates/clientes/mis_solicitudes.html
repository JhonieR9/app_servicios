<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Solicitudes - TalentHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#f0f2f5; min-height:100vh; }
        .topbar {
            background: linear-gradient(135deg, #059669, #0891b2);
            color: white; padding: 16px 20px;
            display: flex; align-items: center; gap: 12px;
        }
        .back-btn {
            width:36px;height:36px;border-radius:50%;
            background:rgba(255,255,255,0.2);border:none;
            color:white;font-size:1rem;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            text-decoration:none;
        }
        .topbar h1 { font-size:1.1rem;font-weight:700; }
        .content { max-width:600px;margin:0 auto;padding:20px 16px; }
        .empty {
            text-align:center;padding:60px 20px;
            background:white;border-radius:16px;
            box-shadow:0 2px 8px rgba(0,0,0,0.06);
        }
        .empty i { font-size:3rem;color:#cbd5e1;display:block;margin-bottom:12px; }
        .empty p { color:#64748b;font-size:0.9rem; }
        .btn-nueva {
            display:inline-block;margin-top:16px;
            padding:12px 24px;background:linear-gradient(135deg,#059669,#0891b2);
            color:white;border-radius:10px;text-decoration:none;font-weight:600;font-size:0.88rem;
        }
        .solicitud-card {
            background:white;border-radius:14px;
            padding:18px;margin-bottom:12px;
            box-shadow:0 2px 8px rgba(0,0,0,0.06);
        }
        .solicitud-header {
            display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;
        }
        .solicitud-titulo { font-weight:700;color:#0f172a;font-size:0.95rem; }
        .badge-estado { padding:4px 10px;border-radius:99px;font-size:0.75rem;font-weight:600; }
        .badge-pendiente  { background:#fef3c7;color:#d97706; }
        .badge-aceptada   { background:#dbeafe;color:#2563eb; }
        .badge-completada { background:#dcfce7;color:#16a34a; }
        .badge-cancelada  { background:#fee2e2;color:#dc2626; }
        .solicitud-info { font-size:0.82rem;color:#64748b;margin-bottom:4px; }
        .btn-cancelar {
            width:100%;padding:10px;margin-top:12px;
            background:#fee2e2;color:#dc2626;border:none;border-radius:10px;
            font-weight:600;font-size:0.85rem;cursor:pointer;
        }
    </style>
</head>
<body>
<div class="topbar">
    <a href="javascript:history.back()" class="back-btn"><i class="bi bi-arrow-left"></i></a>
    <h1>📋 Mis Solicitudes</h1>
</div>

<div class="content" id="contenido">
    <div class="empty">
        <i class="bi bi-hourglass-split"></i>
        <p>Cargando solicitudes...</p>
    </div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const idCliente = urlParams.get('id_cliente') || localStorage.getItem('id_cliente') || 1;

    async function cargarSolicitudes() {
        try {
            const res = await fetch(`/cliente/mis_solicitudes_api?id_cliente=${idCliente}`);
            const data = await res.json();
            const solicitudes = data.solicitudes || [];
            const contenido = document.getElementById('contenido');

            if (!solicitudes.length) {
                contenido.innerHTML = `
                    <div class="empty">
                        <i class="bi bi-inbox"></i>
                        <p>Aún no tienes solicitudes</p>
                        <a href="javascript:history.back()" class="btn-nueva">Solicitar Servicio</a>
                    </div>`;
                return;
            }

            contenido.innerHTML = solicitudes.map(s => `
                <div class="solicitud-card">
                    <div class="solicitud-header">
                        <div class="solicitud-titulo">${s.titulo || 'Solicitud de servicio'}</div>
                        <span class="badge-estado badge-${s.estado}">${s.estado}</span>
                    </div>
                    <div class="solicitud-info"><i class="bi bi-tools"></i> ${s.nombre_categoria || 'Servicio'}</div>
                    <div class="solicitud-info"><i class="bi bi-geo-alt"></i> ${s.ciudad || ''} ${s.departamento || ''}</div>
                    <div class="solicitud-info"><i class="bi bi-calendar"></i> ${s.fecha_solicitud || ''}</div>
                    ${s.descripcion ? `<div class="solicitud-info" style="margin-top:8px;color:#374151">${s.descripcion}</div>` : ''}
                    <a href="/cliente/seguimiento?id=${s.id_solicitud}"
                       style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:11px;margin-top:12px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border-radius:10px;font-weight:700;font-size:0.88rem;text-decoration:none;">
                        📍 Ver seguimiento
                    </a>
                    ${s.estado === 'pendiente' ? `
                        <button class="btn-cancelar" onclick="cancelar(${s.id_solicitud})">
                            ❌ Cancelar Solicitud
                        </button>` : ''}
                </div>
            `).join('');
        } catch(e) {
            document.getElementById('contenido').innerHTML = `
                <div class="empty">
                    <i class="bi bi-exclamation-circle"></i>
                    <p>Error al cargar solicitudes</p>
                </div>`;
        }
    }

    async function cancelar(idSolicitud) {
        if (!confirm('¿Cancelar esta solicitud?')) return;
        const fd = new FormData();
        fd.append('id_solicitud', idSolicitud);
        fd.append('motivo', 'Cancelado por el cliente');
        const res = await fetch('/cliente/solicitud/cancelar', { method:'POST', body:fd });
        if (res.ok) { alert('Solicitud cancelada'); cargarSolicitudes(); }
    }

    cargarSolicitudes();
</script>
</body>
</html>

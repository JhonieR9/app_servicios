<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - TalentHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Lato',sans-serif; background:#f0f2f5; height:100dvh; display:flex; flex-direction:column; }

        /* HEADER */
        .header {
            background:linear-gradient(135deg,#667eea,#764ba2);
            color:white; padding:14px 16px;
            display:flex; align-items:center; gap:12px;
            flex-shrink:0; box-shadow:0 2px 12px rgba(102,126,234,0.3);
        }
        .back-btn {
            width:36px;height:36px;border-radius:50%;
            background:rgba(255,255,255,0.2);border:none;
            color:white;font-size:1rem;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            text-decoration:none;flex-shrink:0;
        }
        .header-avatar {
            width:40px;height:40px;border-radius:50%;
            background:rgba(255,255,255,0.25);
            display:flex;align-items:center;justify-content:center;
            font-size:1.2rem;flex-shrink:0;
        }
        .header-info { flex:1;min-width:0; }
        .header-name { font-weight:700;font-size:0.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
        .header-sub  { font-size:0.72rem;opacity:0.8;margin-top:1px; }
        .header-estado {
            font-size:0.68rem;font-weight:700;padding:4px 10px;
            border-radius:99px;background:rgba(255,255,255,0.2);
            white-space:nowrap;flex-shrink:0;
        }

        /* MENSAJES */
        .messages-wrap {
            flex:1; overflow-y:auto; padding:16px 12px;
            display:flex; flex-direction:column; gap:8px;
        }
        .messages-wrap::-webkit-scrollbar { width:4px; }
        .messages-wrap::-webkit-scrollbar-thumb { background:#c7d2fe;border-radius:99px; }

        .msg {
            max-width:78%; display:flex; flex-direction:column; gap:2px;
        }
        .msg.mine   { align-self:flex-end; align-items:flex-end; }
        .msg.theirs { align-self:flex-start; align-items:flex-start; }

        .msg-bubble {
            padding:10px 14px; border-radius:18px;
            font-size:0.88rem; line-height:1.45; word-break:break-word;
        }
        .msg.mine   .msg-bubble { background:linear-gradient(135deg,#667eea,#764ba2); color:white; border-bottom-right-radius:4px; }
        .msg.theirs .msg-bubble { background:white; color:#0f172a; border-bottom-left-radius:4px; box-shadow:0 1px 4px rgba(0,0,0,0.08); }

        .msg-meta { font-size:0.65rem; color:#94a3b8; padding:0 4px; }
        .msg.mine .msg-meta { color:#a5b4fc; }

        .msg-sender { font-size:0.7rem; font-weight:700; color:#667eea; margin-bottom:2px; }
        .msg-sender.trabajador { color:#7c3aed; }
        .msg-sender.cliente    { color:#0891b2; }

        /* Fecha separador */
        .date-sep {
            text-align:center; font-size:0.7rem; color:#94a3b8;
            font-weight:600; margin:8px 0;
            display:flex;align-items:center;gap:8px;
        }
        .date-sep::before,.date-sep::after { content:'';flex:1;height:1px;background:#e2e8f0; }

        /* Sistema */
        .msg-sistema {
            text-align:center; font-size:0.75rem; color:#64748b;
            background:#f1f5f9; border-radius:99px;
            padding:6px 16px; align-self:center;
            max-width:90%;
        }

        /* Empty */
        .empty-chat {
            flex:1;display:flex;flex-direction:column;
            align-items:center;justify-content:center;
            color:#94a3b8;gap:10px;padding:40px;
        }
        .empty-chat i { font-size:3rem;opacity:0.4; }
        .empty-chat p { font-size:0.85rem;text-align:center; }

        /* INPUT */
        .input-area {
            background:white; padding:12px 12px;
            border-top:1px solid #e2e8f0;
            display:flex; align-items:flex-end; gap:10px;
            flex-shrink:0;
        }
        .input-box {
            flex:1; background:#f1f5f9; border-radius:24px;
            padding:10px 16px; border:none; outline:none;
            font-family:'Lato',sans-serif; font-size:0.9rem;
            color:#0f172a; resize:none; max-height:120px;
            line-height:1.4;
        }
        .input-box::placeholder { color:#94a3b8; }
        .btn-send {
            width:44px;height:44px;border-radius:50%;
            background:linear-gradient(135deg,#667eea,#764ba2);
            border:none;color:white;font-size:1.1rem;
            cursor:pointer;display:flex;align-items:center;
            justify-content:center;flex-shrink:0;
            transition:all 0.2s;box-shadow:0 4px 12px rgba(102,126,234,0.4);
        }
        .btn-send:hover { transform:scale(1.08); }
        .btn-send:disabled { opacity:0.5;cursor:not-allowed;transform:none; }

        /* Toast */
        .toast {
            position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
            background:#0f172a;color:white;padding:10px 20px;
            border-radius:99px;font-size:0.82rem;font-weight:600;
            z-index:999;white-space:nowrap;
            animation:toastIn 0.3s ease;
        }
        @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
        @keyframes msgIn { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }
    </style>
</head>
<body>

<div class="header">
    <a href="javascript:void(0)" class="back-btn" onclick="volverDelChat()"><i class="bi bi-arrow-left"></i></a>
    <div class="header-avatar" id="headerAvatar">👤</div>
    <div class="header-info">
        <div class="header-name" id="headerName">Cargando...</div>
        <div class="header-sub" id="headerSub"></div>
    </div>
    <div class="header-estado" id="headerEstado"></div>
</div>

<div class="messages-wrap" id="messagesWrap">
    <div class="empty-chat" id="emptyChat">
        <i class="bi bi-chat-dots"></i>
        <p>Aún no hay mensajes.<br>¡Inicia la conversación!</p>
    </div>
</div>

<div class="input-area">
    <label for="fotoInput" style="width:44px;height:44px;border-radius:50%;background:#f1f5f9;
           display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;
           color:#667eea;font-size:1.1rem;transition:all .2s;border:none;">
        <i class="bi bi-camera-fill"></i>
    </label>
    <input type="file" id="fotoInput" accept="image/*" capture="environment"
           style="display:none" onchange="enviarFoto(this)">
    <textarea class="input-box" id="inputMsg" placeholder="Escribe un mensaje..." rows="1"
              oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
    <button class="btn-send" id="btnSend" onclick="enviarMensaje()">
        <i class="bi bi-send-fill"></i>
    </button>
</div>

<script>
    const params      = new URLSearchParams(window.location.search);
    const idSolicitud = parseInt(params.get('id_solicitud') || 0);
    const tipoUsuario = params.get('tipo') || 'cliente';   // 'cliente' o 'trabajador'
    const idUsuario   = parseInt(params.get('id_usuario') || localStorage.getItem('id_cliente') || 0);

    let ultimoId = 0;
    let pollingTimer = null;

    function volverDelChat() {
        if (tipoUsuario === 'sistema') {
            window.location.href = '/chat/admin';
        } else if (tipoUsuario === 'trabajador') {
            window.location.href = '/trabajador/solicitudes_pendientes_panel?id=' + idUsuario;
        } else {
            window.location.href = '/cliente/mis_solicitudes';
        }
    }

    // ── Cargar info de la solicitud ──────────────────────────────
    async function cargarInfo() {
        if (!idSolicitud) return;
        try {
            const res  = await fetch(`/chat/info?id_solicitud=${idSolicitud}&tipo=${tipoUsuario}&id_usuario=${idUsuario}`);
            const data = await res.json();
            if (data.error) return;
            document.getElementById('headerName').textContent  = data.contraparte || 'Chat';
            document.getElementById('headerSub').textContent   = data.titulo      || '';
            document.getElementById('headerEstado').textContent = data.estado     || '';
            document.getElementById('headerAvatar').textContent = tipoUsuario === 'cliente' ? '👷' : '👤';
        } catch(e) {}
    }

    // ── Renderizar mensajes ──────────────────────────────────────
    function renderMensajes(mensajes) {
        const wrap = document.getElementById('messagesWrap');
        const empty = document.getElementById('emptyChat');

        if (!mensajes.length) { empty.style.display = 'flex'; return; }
        empty.style.display = 'none';

        let lastDate = '';
        let html = '';

        mensajes.forEach(m => {
            const esMio = (m.tipo_remitente === tipoUsuario && m.id_remitente === idUsuario);
            const fecha = m.fecha_envio ? m.fecha_envio.split(' ')[0] : '';
            const hora  = m.fecha_envio ? m.fecha_envio.split(' ')[1] || '' : '';

            if (fecha && fecha !== lastDate) {
                html += `<div class="date-sep">${formatFecha(fecha)}</div>`;
                lastDate = fecha;
            }

            if (m.tipo_remitente === 'sistema') {
                html += `<div class="msg-sistema">🔔 ${m.mensaje}</div>`;
            } else {
                const senderClass = m.tipo_remitente === 'trabajador' ? 'trabajador' : 'cliente';
                html += `<div class="msg ${esMio ? 'mine' : 'theirs'}">
                    ${!esMio ? `<div class="msg-sender ${senderClass}">${m.tipo_remitente === 'trabajador' ? '👷 ' : '👤 '}${m.nombre_remitente || ''}</div>` : ''}
                    <div class="msg-bubble">${escHtml(m.mensaje)}</div>
                    <div class="msg-meta">${hora} ${esMio ? (m.leido ? '✓✓' : '✓') : ''}</div>
                </div>`;
            }
        });

        wrap.innerHTML = html;
        wrap.scrollTop = wrap.scrollHeight;
    }

    function formatFecha(f) {
        if (!f) return '';
        const partes = f.split('-');
        if (partes.length !== 3) return f;
        const d = parseInt(partes[2]);
        const m = parseInt(partes[1]);
        const y = partes[0];
        const meses = ['','Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
        return `${d} ${meses[m] || ''} ${y}`;
    }

    function escHtml(s) {
        const text = String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
        // Detectar referencias a fotos [foto:ID]
        return text.replace(/\[foto:(\d+)\]/g, (match, id) => {
            return `<img src="/chat/foto/${id}" style="max-width:100%;border-radius:12px;margin-top:6px;cursor:pointer" onclick="window.open('/chat/foto/${id}','_blank')" loading="lazy">`;
        });
    }

    // ── Polling de mensajes ──────────────────────────────────────
    let todosLosMensajes = [];

    async function cargarMensajes(silencioso = false) {
        if (!idSolicitud) return;
        try {
            const res  = await fetch(`/chat/mensajes?id_solicitud=${idSolicitud}&desde_id=0`);
            const data = await res.json();
            const mensajes = data.mensajes || [];

            if (mensajes.length === 0 && !silencioso) {
                renderMensajes([]);
                return;
            }

            if (mensajes.length === 0) return;

            const nuevoUltimoId = mensajes[mensajes.length - 1].id_mensaje;

            // Siempre re-renderizar si hay cambios
            if (nuevoUltimoId !== ultimoId || ultimoId === 0) {
                const wasAtBottom = isAtBottom();
                todosLosMensajes = mensajes;
                renderMensajes(mensajes);
                ultimoId = nuevoUltimoId;
                if (wasAtBottom) {
                    document.getElementById('messagesWrap').scrollTop = document.getElementById('messagesWrap').scrollHeight;
                }
            }
        } catch(e) {
            console.warn('Error cargando mensajes:', e);
        }
    }

    function isAtBottom() {
        const wrap = document.getElementById('messagesWrap');
        return wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 80;
    }

    function agregarNuevosMensajes(nuevos) {
        const wrap  = document.getElementById('messagesWrap');
        const empty = document.getElementById('emptyChat');
        empty.style.display = 'none';
        const atBottom = wrap.scrollHeight - wrap.scrollTop - wrap.clientHeight < 80;

        nuevos.forEach(m => {
            const esMio = (m.tipo_remitente === tipoUsuario && m.id_remitente === idUsuario);
            const hora  = m.fecha_envio ? (m.fecha_envio.split(' ')[1] || '') : '';
            const div   = document.createElement('div');

            if (m.tipo_remitente === 'sistema') {
                div.className = 'msg-sistema';
                div.textContent = '🔔 ' + m.mensaje;
            } else {
                div.className = `msg ${esMio ? 'mine' : 'theirs'}`;
                const senderClass = m.tipo_remitente === 'trabajador' ? 'trabajador' : 'cliente';
                div.innerHTML = `
                    ${!esMio ? `<div class="msg-sender ${senderClass}">${m.tipo_remitente === 'trabajador' ? '👷 ' : '👤 '}${m.nombre_remitente || ''}</div>` : ''}
                    <div class="msg-bubble">${escHtml(m.mensaje)}</div>
                    <div class="msg-meta">${hora}</div>`;
            }

            // Animación de entrada para mensajes nuevos
            div.style.cssText = 'animation:msgIn 0.3s ease;';
            wrap.appendChild(div);

            // Si es mensaje del otro, vibrar y resaltar
            if (!esMio && m.tipo_remitente !== 'sistema') {
                div.querySelector('.msg-bubble').style.boxShadow = '0 0 0 3px rgba(102,126,234,0.3)';
                setTimeout(() => {
                    const bubble = div.querySelector('.msg-bubble');
                    if (bubble) bubble.style.boxShadow = '';
                }, 2000);
                if (navigator.vibrate) navigator.vibrate(100);
            }
        });

        // Scroll al final si estaba abajo
        if (atBottom) {
            wrap.scrollTo({ top: wrap.scrollHeight, behavior: 'smooth' });
        } else if (nuevos.some(m => m.tipo_remitente !== tipoUsuario)) {
            // Mostrar botón "nuevo mensaje" si no está al fondo
            mostrarBotonNuevoMsg();
        }
    }

    function mostrarBotonNuevoMsg() {
        if (document.getElementById('nuevoMsgBtn')) return;
        const btn = document.createElement('div');
        btn.id = 'nuevoMsgBtn';
        btn.style.cssText = `
            position:fixed;bottom:80px;left:50%;transform:translateX(-50%);
            background:#667eea;color:white;padding:8px 18px;
            border-radius:99px;font-size:0.82rem;font-weight:700;
            cursor:pointer;z-index:100;box-shadow:0 4px 12px rgba(102,126,234,0.4);
            animation:toastIn 0.3s ease;
        `;
        btn.textContent = '↓ Nuevo mensaje';
        btn.onclick = () => {
            document.getElementById('messagesWrap').scrollTo({ top: 99999, behavior: 'smooth' });
            btn.remove();
        };
        document.body.appendChild(btn);
        setTimeout(() => { if (btn.parentNode) btn.remove(); }, 5000);
    }

    // ── Enviar mensaje ───────────────────────────────────────────
    async function enviarMensaje() {
        const input = document.getElementById('inputMsg');
        const texto = input.value.trim();
        if (!texto || !idSolicitud) return;

        const btn = document.getElementById('btnSend');
        btn.disabled = true;
        input.value  = '';
        input.style.height = '';

        // Mostrar mensaje inmediatamente en el UI (optimistic update)
        const wrap  = document.getElementById('messagesWrap');
        const empty = document.getElementById('emptyChat');
        empty.style.display = 'none';
        const tempDiv = document.createElement('div');
        tempDiv.className = 'msg mine';
        tempDiv.style.cssText = 'animation:msgIn 0.3s ease;';
        const ahora = new Date();
        const horaStr = String(ahora.getHours()).padStart(2,'0') + ':' + String(ahora.getMinutes()).padStart(2,'0');
        tempDiv.innerHTML = `
            <div class="msg-bubble">${escHtml(texto)}</div>
            <div class="msg-meta">${horaStr} ✓</div>`;
        wrap.appendChild(tempDiv);
        wrap.scrollTo({ top: wrap.scrollHeight, behavior: 'smooth' });

        const fd = new FormData();
        fd.append('id_solicitud',  idSolicitud);
        fd.append('tipo_remitente', tipoUsuario);
        fd.append('id_remitente',  idUsuario);
        fd.append('mensaje',       texto);

        try {
            const res  = await fetch('/chat/enviar', { method:'POST', body:fd });
            const data = await res.json();
            if (!res.ok) {
                mostrarToast('❌ ' + (data.error || 'Error al enviar'));
                tempDiv.remove(); // quitar el mensaje optimista si falló
            } else {
                // Recargar para sincronizar IDs reales
                setTimeout(() => cargarMensajes(true), 500);
            }
        } catch(e) {
            mostrarToast('❌ Error de conexión');
            tempDiv.remove();
        } finally {
            btn.disabled = false;
            input.focus();
        }
    }

    function handleKey(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensaje(); }
    }

    async function enviarFoto(input) {
        const file = input.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) { mostrarToast('❌ La foto no puede pesar más de 5MB'); return; }

        mostrarToast('📷 Subiendo foto...');
        const fd = new FormData();
        fd.append('id_solicitud', idSolicitud);
        fd.append('id_usuario', idUsuario);
        fd.append('tipo_usuario', tipoUsuario);
        fd.append('tipo_foto', 'progreso');
        fd.append('foto', file);

        try {
            const res = await fetch('/chat/foto/subir', { method: 'POST', body: fd });
            const data = await res.json();
            if (res.ok) {
                setTimeout(() => cargarMensajes(true), 500);
            } else {
                mostrarToast('❌ ' + (data.error || 'Error al subir'));
            }
        } catch(e) {
            mostrarToast('❌ Error de conexión');
        }
        input.value = ''; // reset input
    }

    function autoResize(el) {
        el.style.height = 'auto';
        el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    function mostrarToast(msg) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // ── Iniciar ──────────────────────────────────────────────────
    if (!idSolicitud) {
        document.getElementById('headerName').textContent = 'Error';
        document.getElementById('messagesWrap').innerHTML =
            '<div class="empty-chat"><i class="bi bi-exclamation-triangle"></i><p>No se especificó la solicitud</p></div>';
    } else {
        cargarInfo();
        cargarMensajes();
        // Marcar como leídos al abrir (solo si no es admin)
        if (tipoUsuario !== 'sistema') {
            const fdLeer = new FormData();
            fdLeer.append('id_solicitud', idSolicitud);
            fdLeer.append('tipo_receptor', tipoUsuario);
            fetch('/chat/leer', { method:'POST', body:fdLeer }).catch(()=>{});
        }
        // Ocultar input si es admin observador
        if (tipoUsuario === 'sistema') {
            document.querySelector('.input-area').style.display = 'none';
            document.querySelector('.header').style.background = 'linear-gradient(135deg,#1e293b,#334155)';
            // Badge de admin
            const badge = document.createElement('div');
            badge.style.cssText = 'background:rgba(245,158,11,0.2);color:#fcd34d;border:1px solid rgba(245,158,11,0.3);padding:4px 12px;border-radius:99px;font-size:0.7rem;font-weight:700;flex-shrink:0';
            badge.textContent = '👁 Modo Admin';
            document.querySelector('.header').appendChild(badge);
        }
        // Polling cada 4 segundos (balance entre fluidez y carga al server)
        pollingTimer = setInterval(() => {
            cargarMensajes(true);
            if (tipoUsuario !== 'sistema') {
                const fd = new FormData();
                fd.append('id_solicitud', idSolicitud);
                fd.append('tipo_receptor', tipoUsuario);
                fetch('/chat/leer', { method:'POST', body:fd }).catch(()=>{});
            }
        }, 4000);
    }

    // Limpiar polling al salir
    window.addEventListener('beforeunload', () => clearInterval(pollingTimer));
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Cliente - TalentHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#0f172a; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .card { background:white; border-radius:20px; padding:36px 28px; width:100%; max-width:420px; box-shadow:0 24px 64px rgba(0,0,0,0.4); animation:fadeUp 0.4s ease; }
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .logo { text-align:center; margin-bottom:24px; }
        .logo-icon { width:56px;height:56px;background:linear-gradient(135deg,#059669,#0891b2);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;margin:0 auto 10px; }
        .logo h2 { font-size:1.3rem;font-weight:700;color:#0f172a; }
        .logo p { color:#64748b;font-size:0.82rem;margin-top:3px; }
        .form-group { margin-bottom:14px; }
        label { display:block;font-size:0.8rem;font-weight:600;color:#374151;margin-bottom:5px; }
        .input-wrap { position:relative; }
        .input-wrap i { position:absolute;left:11px;top:50%;transform:translateY(-50%);color:#94a3b8;font-size:0.95rem; }
        input { width:100%;padding:11px 14px 11px 36px;border:2px solid #e2e8f0;border-radius:10px;font-size:0.9rem;outline:none;transition:border-color 0.2s;font-family:inherit; }
        input:focus { border-color:#059669; }
        .toggle-pw { position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:#94a3b8;cursor:pointer;font-size:0.95rem; }
        .alert { padding:11px 13px;border-radius:10px;font-size:0.83rem;margin-bottom:14px;display:none; }
        .alert.error   { background:#fef2f2;color:#dc2626;border:1px solid #fecaca; }
        .alert.success { background:#f0fdf4;color:#16a34a;border:1px solid #bbf7d0; }
        .btn { width:100%;padding:13px;background:linear-gradient(135deg,#059669,#0891b2);color:white;border:none;border-radius:12px;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:8px;margin-top:6px; }
        .btn:hover { transform:translateY(-2px);box-shadow:0 8px 24px rgba(5,150,105,0.35); }
        .btn:disabled { opacity:0.6;cursor:not-allowed;transform:none; }
        .links { margin-top:18px;text-align:center;font-size:0.8rem;color:#64748b; }
        .links a { color:#059669;text-decoration:none;font-weight:600; }
        hr { border:none;border-top:1px solid #f1f5f9;margin:18px 0; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">
        <div class="logo-icon">🔍</div>
        <h2>Crear Cuenta</h2>
        <p>Regístrate para solicitar servicios</p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="formRegistro">
        <div class="form-group">
            <label>Nombre Completo *</label>
            <div class="input-wrap">
                <i class="bi bi-person"></i>
                <input type="text" name="nombre_completo" placeholder="Tu nombre completo" required>
            </div>
        </div>
        <div class="form-group">
            <label>Correo Electrónico *</label>
            <div class="input-wrap">
                <i class="bi bi-envelope"></i>
                <input type="email" name="correo" placeholder="tu@correo.com" required>
            </div>
        </div>
        <div class="form-group">
            <label>Teléfono *</label>
            <div class="input-wrap">
                <i class="bi bi-phone"></i>
                <input type="tel" name="telefono" placeholder="3001234567" required>
            </div>
        </div>
        <div class="form-group">
            <label>Contraseña *</label>
            <div class="input-wrap">
                <i class="bi bi-lock"></i>
                <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required>
                <button type="button" class="toggle-pw" onclick="togglePw('password',this)"><i class="bi bi-eye"></i></button>
            </div>
        </div>
        <div class="form-group">
            <label>Confirmar Contraseña *</label>
            <div class="input-wrap">
                <i class="bi bi-lock-fill"></i>
                <input type="password" id="confirmar" name="confirmar_password" placeholder="Repite tu contraseña" required>
                <button type="button" class="toggle-pw" onclick="togglePw('confirmar',this)"><i class="bi bi-eye"></i></button>
            </div>
        </div>

        <button type="submit" class="btn" id="btnReg">
            <i class="bi bi-person-plus"></i> Crear Cuenta
        </button>
    </form>

    <hr>
    <div class="links">
        ¿Ya tienes cuenta? <a href="/cliente/login">Inicia sesión</a><br><br>
        <a href="/">← Volver al inicio</a>
    </div>
</div>

<script>
    function togglePw(id, btn) {
        const input = document.getElementById(id);
        const isText = input.type === 'text';
        input.type = isText ? 'password' : 'text';
        btn.innerHTML = isText ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
    }

    const alertEl = document.getElementById('alert');

    document.getElementById('formRegistro').addEventListener('submit', async (e) => {
        e.preventDefault();
        const pw = document.getElementById('password').value;
        const conf = document.getElementById('confirmar').value;
        if (pw !== conf) {
            alertEl.className = 'alert error';
            alertEl.textContent = '❌ Las contraseñas no coinciden';
            alertEl.style.display = 'block';
            return;
        }
        const btn = document.getElementById('btnReg');
        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Creando cuenta...';

        const fd = new FormData(e.target);
        const res = await fetch('/cliente/registro', { method: 'POST', body: fd });
        const data = await res.json();

        if (res.ok) {
            alertEl.className = 'alert success';
            alertEl.textContent = '✅ Cuenta creada. Entrando...';
            alertEl.style.display = 'block';
            // Guardar id en localStorage y redirigir al panel
            if (data.id_cliente) localStorage.setItem('id_cliente', data.id_cliente);
            setTimeout(() => window.location.href = data.redirect || '/cliente/panel', 1000);
        } else {
            alertEl.className = 'alert error';
            alertEl.textContent = '❌ ' + (data.error || 'Error al crear cuenta');
            alertEl.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-person-plus"></i> Crear Cuenta';
        }
    });
</script>
</body>
</html>

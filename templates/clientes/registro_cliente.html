<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Cliente - TalentHub</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .container{
            background: white;
            width: 100%;
            max-width: 450px;
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .back-button {
            display: inline-block;
            color: #666;
            text-decoration: none;
            margin-bottom: 20px;
            font-size: 14px;
            -webkit-tap-highlight-color: transparent;
        }

        .back-button:hover {
            color: #4CAF50;
        }

        h2{
            text-align: center;
            color: #2e7d32;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }

        h3{
            margin-top: 25px;
            margin-bottom: 10px;
            font-size: 16px;
            color: #333;
            font-weight: 600;
        }

        input{
            width: 100%;
            padding: 12px;
            margin-bottom: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
            transition: border 0.3s;
            -webkit-appearance: none;
        }

        input:focus {
            outline: none;
            border-color: #4CAF50;
        }

        button{
            width: 100%;
            padding: 14px;
            margin-top: 20px;
            background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            -webkit-tap-highlight-color: transparent;
        }

        button:active {
            transform: scale(0.98);
        }

        button:hover{
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(76, 175, 80, 0.4);
        }

        .alert {
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .alert.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        /* Responsive para móviles pequeños */
        @media (max-width: 380px) {
            .container {
                padding: 20px;
            }

            h2 {
                font-size: 22px;
            }

            h3 {
                font-size: 15px;
            }

            input {
                padding: 11px;
                font-size: 13px;
            }

            button {
                padding: 13px;
                font-size: 15px;
            }
        }

        /* Responsive para tablets y desktop */
        @media (min-width: 768px) {
            body {
                padding: 30px;
            }

            .container {
                max-width: 500px;
                padding: 35px;
            }

            h2 {
                font-size: 28px;
            }

            h3 {
                font-size: 17px;
            }

            input {
                padding: 14px;
                font-size: 15px;
            }

            button {
                padding: 16px;
                font-size: 17px;
            }
        }

        /* Mejoras para touch devices */
        @media (hover: none) and (pointer: coarse) {
            input {
                padding: 14px;
                font-size: 16px;
            }

            button {
                padding: 16px;
                font-size: 17px;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <a href="/" class="back-button">← Volver al inicio</a>
    
    <h2>Registro Cliente</h2>
    <p class="subtitle">Completa tus datos para comenzar</p>

    <div id="alert" class="alert"></div>

    <form id="formRegistro" action="/crear_cliente" method="post">

        <h3>📋 Información Personal</h3>

        <input type="text" name="nombre_completo" placeholder="Nombre completo" required>
        <input type="text" name="numero_documento" placeholder="Número de documento" required>
        <input type="text" name="pais" placeholder="País" value="Colombia" required>
        <input type="text" name="departamento" placeholder="Departamento" required>
        <input type="text" name="ciudad" placeholder="Ciudad" required>

        <h3>📞 Contacto</h3>

        <input type="email" name="correo" placeholder="Correo electrónico" required>
        <input type="tel" name="telefono" placeholder="Teléfono celular" required>

        <h3>📍 Dirección</h3>

        <input type="text" name="direccion_completa" placeholder="Dirección completa" required>
        <input type="text" name="codigo_postal" placeholder="Código postal (opcional)">

        <button type="submit">Crear mi cuenta</button>

    </form>
</div>

<script>
    const form = document.getElementById('formRegistro');
    const alert = document.getElementById('alert');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const formData = new FormData(form);
        
        try {
            const response = await fetch('/cliente/crear', {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            
            if (response.ok) {
                alert.className = 'alert success';
                alert.textContent = '✅ ' + data.mensaje + ' - Redirigiendo...';
                alert.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = '/cliente/solicitar_servicio';
                }, 2000);
            } else {
                alert.className = 'alert error';
                alert.textContent = '❌ Error: ' + (data.error || 'No se pudo crear el cliente');
                alert.style.display = 'block';
            }
        } catch (error) {
            alert.className = 'alert error';
            alert.textContent = '❌ Error de conexión. Intenta nuevamente.';
            alert.style.display = 'block';
        }
    });
</script>

</body>
</html>

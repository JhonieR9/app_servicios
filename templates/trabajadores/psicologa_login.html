<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Psicología - TalentHub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #a78bfa 0%, #7c3aed 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            padding: 50px 40px;
            border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.15);
            width: 100%;
            max-width: 420px;
            text-align: center;
        }
        .logo i {
            font-size: 3.5rem;
            color: #7c3aed;
            margin-bottom: 15px;
        }
        h1 { color: #1e293b; margin-bottom: 8px; font-size: 1.8rem; }
        .subtitle { color: #64748b; margin-bottom: 35px; font-size: 1rem; }
        .input-group { margin-bottom: 25px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #374151; font-size: 0.9rem; }
        input[type="password"] {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s;
        }
        input[type="password"]:focus {
            outline: none;
            border-color: #7c3aed;
            box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
        }
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #a78bfa, #7c3aed);
            color: white;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
        }
        .login-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 20px rgba(124,58,237,0.3); }
        .error-msg {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.88rem;
            display: none;
        }
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #7c3aed;
            text-decoration: none;
            font-size: 0.88rem;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <i class="fas fa-brain"></i>
            <h1>Psicología</h1>
            <p class="subtitle">Revisión de Hojas de Vida</p>
        </div>

        <div class="error-msg" id="errorMsg"></div>

        <form onsubmit="login(event)">
            <div class="input-group">
                <label>Contraseña</label>
                <input type="password" id="password" placeholder="Ingrese su contraseña" required>
            </div>
            <button type="submit" class="login-btn" id="btnLogin">
                <i class="fas fa-sign-in-alt"></i> Ingresar
            </button>
        </form>

        <a href="/" class="back-link"><i class="fas fa-arrow-left"></i> Volver al inicio</a>
    </div>

    <script>
    async function login(e) {
        e.preventDefault();
        const btn = document.getElementById('btnLogin');
        const errEl = document.getElementById('errorMsg');
        btn.disabled = true; btn.textContent = 'Verificando...';
        errEl.style.display = 'none';

        const fd = new FormData();
        fd.append('password', document.getElementById('password').value);

        try {
            const res = await fetch('/psicologa/login', { method: 'POST', body: fd });
            const data = await res.json();
            if (data.success) {
                window.location.href = '/psicologa/panel';
            } else {
                errEl.textContent = data.error || 'Contraseña incorrecta';
                errEl.style.display = 'block';
            }
        } catch(e) {
            errEl.textContent = 'Error de conexión';
            errEl.style.display = 'block';
        }
        btn.disabled = false; btn.textContent = 'Ingresar';
    }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - TalentHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Segoe UI',sans-serif; background:#f0f2f5; min-height:100vh; }
        .topbar {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white; padding: 16px 20px;
            display: flex; align-items: center; gap: 12px;
        }
        .back-btn {
            width:36px;height:36px;border-radius:50%;
            background:rgba(255,255,255,0.2);border:none;
            color:white;font-size:1rem;cursor:pointer;
            display:flex;align-items:center;justify-content:center;
            text-decoration:none;
        }
        .topbar h1 { font-size:1.1rem;font-weight:700; }
        .content { max-width:600px;margin:0 auto;padding:20px 16px; }

        .avatar-card {
            background:white;border-radius:16px;padding:28px;
            text-align:center;margin-bottom:16px;
            box-shadow:0 2px 8px rgba(0,0,0,0.06);
        }
        .avatar {
            width:80px;height:80px;border-radius:50%;
            background:linear-gradient(135deg,#1e3a8a,#2563eb);
            display:flex;align-items:center;justify-content:center;
            font-size:2rem;color:white;margin:0 auto 14px;
        }
        .nombre { font-size:1.2rem;font-weight:700;color:#0f172a; }
        .doc { color:#64748b;font-size:0.85rem;margin-top:4px; }
        .badge-activo {
            display:inline-block;margin-top:8px;
            padding:4px 12px;background:#dcfce7;color:#16a34a;
            border-radius:99px;font-size:0.78rem;font-weight:600;
        }

        .info-card {
            background:white;border-radius:16px;padding:20px;
            margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,0.06);
        }
        .info-card h3 {
            font-size:0.82rem;font-weight:700;color:#94a3b8;
            text-transform:uppercase;letter-spacing:1px;margin-bottom:14px;
        }
        .info-row {
            display:flex;justify-content:space-between;align-items:center;
            padding:10px 0;border-bottom:1px solid #f1f5f9;
        }
        .info-row:last-child { border-bottom:none; }
        .info-label { font-size:0.82rem;color:#64748b; }
        .info-value { font-size:0.88rem;font-weight:600;color:#0f172a;text-align:right;max-width:60%; }

        .servicio-chip {
            display:inline-block;padding:4px 12px;
            background:#dbeafe;color:#1d4ed8;
            border-radius:99px;font-size:0.78rem;font-weight:600;
            margin:3px;
        }
        .loading { text-align:center;padding:40px;color:#94a3b8; }
        .info-input {
            border:1px solid #e2e8f0;border-radius:8px;
            padding:8px 12px;font-size:0.88rem;color:#0f172a;
            text-align:right;width:55%;outline:none;
            font-family:'Segoe UI',sans-serif;
            transition:border-color .2s;
        }
        .info-input:focus { border-color:#2563eb;box-shadow:0 0 0 2px rgba(37,99,235,.1); }
    </style>
</head>
<body>
<div class="topbar">
    <a href="javascript:history.back()" class="back-btn"><i class="bi bi-arrow-left"></i></a>
    <h1>👤 Mi Perfil</h1>
</div>

<div class="content" id="contenido">
    <div class="loading"><i class="bi bi-hourglass-split"></i> Cargando perfil...</div>
</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const idTrabajador = urlParams.get('id') || localStorage.getItem('id_trabajador') || 1;

    async function cargarPerfil() {
        try {
            const res = await fetch(`/trabajador/perfil_completo?id=${idTrabajador}`);
            const data = await res.json();
            if (data.error) throw new Error(data.error);
            renderPerfil(data);
        } catch(e) {
            document.getElementById('contenido').innerHTML = `
                <div class="loading"><i class="bi bi-exclamation-circle"></i> Error al cargar perfil</div>`;
        }
    }

    function renderPerfil(d) {
        const serviciosHtml = (d.servicios || []).map(s =>
            `<span class="servicio-chip">${s.categoria}</span>`
        ).join('');

        document.getElementById('contenido').innerHTML = `
            <div class="avatar-card">
                <div class="avatar">👤</div>
                <div class="nombre">${d.nombre_completo || '-'}</div>
                <div class="doc">Doc: ${d.numero_documento || '-'}</div>
                <span class="badge-activo">✅ Activo</span>
            </div>

            <div class="info-card">
                <h3>Información Personal</h3>
                <div class="info-row">
                    <span class="info-label">Ciudad</span>
                    <input class="info-input" id="edit_ciudad" value="${d.ciudad || ''}">
                </div>
                <div class="info-row">
                    <span class="info-label">Departamento</span>
                    <input class="info-input" id="edit_departamento" value="${d.departamento || ''}">
                </div>
                <div class="info-row">
                    <span class="info-label">Nacionalidad</span>
                    <input class="info-input" id="edit_nacionalidad" value="${d.nacionalidad || ''}">
                </div>
                <div class="info-row">
                    <span class="info-label">Fecha Nac.</span>
                    <span class="info-value">${d.fecha_nacimiento || '-'}</span>
                </div>
            </div>

            <div class="info-card">
                <h3>Contacto</h3>
                <div class="info-row">
                    <span class="info-label">Teléfono</span>
                    <input class="info-input" id="edit_telefono" value="${d.telefono || ''}" type="tel">
                </div>
                <div class="info-row">
                    <span class="info-label">Correo</span>
                    <input class="info-input" id="edit_correo" value="${d.correo || ''}" type="email">
                </div>
            </div>

            ${serviciosHtml ? `
            <div class="info-card">
                <h3>🔧 Mis Servicios</h3>
                <div style="padding:4px 0">${serviciosHtml}</div>
            </div>` : ''}

            <!-- Sección Documentos -->
            <div class="info-card">
                <h3>📍 Ciudades donde presto servicio</h3>
                <div id="listaCiudadesServicio" style="margin-bottom:12px">Cargando...</div>
                <div style="display:flex;gap:8px">
                    <input type="text" id="nuevaCiudadServicio" placeholder="Ej: Cali"
                        style="flex:1;padding:10px 14px;border:1px solid #e2e8f0;border-radius:10px;font-size:0.88rem;outline:none">
                    <button onclick="agregarCiudadServicio()"
                        style="padding:10px 18px;background:linear-gradient(135deg,#4f46e5,#7c3aed);
                               color:white;border:none;border-radius:10px;font-weight:700;font-size:0.82rem;
                               cursor:pointer;white-space:nowrap">
                        + Agregar
                    </button>
                </div>
            </div>

            <!-- Sección Documentos -->
            <div class="info-card">
                <h3>📄 Mis Documentos</h3>
                <div style="display:grid;gap:12px">
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:#f8fafc;border-radius:12px;border:1px solid #e2e8f0">
                        <div>
                            <div style="font-size:0.82rem;font-weight:700;color:#0f172a">📷 Foto de identificación</div>
                            <div style="font-size:0.72rem;color:#64748b">Cédula o documento de identidad</div>
                        </div>
                        <label style="padding:8px 14px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border-radius:10px;font-size:0.75rem;font-weight:700;cursor:pointer">
                            Actualizar
                            <input type="file" accept="image/*" style="display:none" onchange="actualizarDocumento('foto_identificacion', this)">
                        </label>
                    </div>
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:#f8fafc;border-radius:12px;border:1px solid #e2e8f0">
                        <div>
                            <div style="font-size:0.82rem;font-weight:700;color:#0f172a">📋 Antecedentes</div>
                            <div style="font-size:0.72rem;color:#64748b">Documento de antecedentes disciplinarios</div>
                        </div>
                        <label style="padding:8px 14px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border-radius:10px;font-size:0.75rem;font-weight:700;cursor:pointer">
                            Actualizar
                            <input type="file" accept="image/*,.pdf" style="display:none" onchange="actualizarDocumento('foto_antecedentes', this)">
                        </label>
                    </div>
                    <div style="display:flex;align-items:center;justify-content:space-between;padding:12px;background:#f8fafc;border-radius:12px;border:1px solid #e2e8f0">
                        <div>
                            <div style="font-size:0.82rem;font-weight:700;color:#0f172a">📝 Recomendaciones</div>
                            <div style="font-size:0.72rem;color:#64748b">Carta de recomendación o certificado</div>
                        </div>
                        <label style="padding:8px 14px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border-radius:10px;font-size:0.75rem;font-weight:700;cursor:pointer">
                            Actualizar
                            <input type="file" accept="image/*,.pdf" style="display:none" onchange="actualizarDocumento('recomendaciones_archivo', this)">
                        </label>
                    </div>
                </div>
                <div id="msgDocumento" style="display:none;margin-top:10px;padding:10px;border-radius:10px;text-align:center;font-size:0.82rem;font-weight:600"></div>
            </div>

            <!-- Sección Especialidades -->
            <div class="info-card" id="seccionEspecialidades">
                <h3>⭐ Mis Especialidades</h3>
                <div id="listaEspecialidades" style="margin-bottom:12px">Cargando...</div>
                <button onclick="abrirModalEspecialidad()"
                    style="width:100%;padding:12px;background:linear-gradient(135deg,#f59e0b,#d97706);
                           color:white;border:none;border-radius:12px;font-weight:700;font-size:0.88rem;
                           cursor:pointer">
                    + Agregar especialidad
                </button>
            </div>

            <!-- Agregar nuevo servicio -->
            <div class="info-card">
                <h3>➕ Agregar Servicio</h3>
                <select id="nuevaCategoria" style="width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:8px;font-size:0.88rem">
                    <option value="">Seleccionar categoría...</option>
                </select>
                <input id="nuevaDescripcion" placeholder="Descripción del servicio" style="width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:8px;font-size:0.88rem">
                <div style="display:flex;gap:8px;margin-bottom:8px">
                    <input id="nuevaTarifa" type="number" placeholder="Tarifa/hora" min="5000" step="1000" style="flex:1;padding:10px;border:1px solid #e2e8f0;border-radius:10px;font-size:0.88rem">
                    <input id="nuevaExp" type="number" placeholder="Años exp." min="0" max="50" step="0.5" style="width:100px;padding:10px;border:1px solid #e2e8f0;border-radius:10px;font-size:0.88rem">
                </div>
                <button onclick="agregarServicio()"
                    style="width:100%;padding:12px;background:linear-gradient(135deg,#10b981,#059669);
                           color:white;border:none;border-radius:12px;font-weight:700;font-size:0.88rem;
                           cursor:pointer">
                    ✅ Agregar servicio
                </button>
            </div>

            <button onclick="guardarPerfil()" id="btnGuardar"
                style="width:100%;padding:15px;background:linear-gradient(135deg,#1e3a8a,#2563eb);
                       color:white;border:none;border-radius:14px;font-weight:700;font-size:0.95rem;
                       cursor:pointer;margin-top:8px;transition:all .2s;
                       box-shadow:0 4px 16px rgba(30,58,138,0.3)">
                <i class="bi bi-check-circle"></i> Guardar cambios
            </button>
            <div id="msgGuardar" style="display:none;text-align:center;margin-top:10px;
                 padding:10px;border-radius:10px;font-size:0.85rem;font-weight:600"></div>
        `;
    }

    async function guardarPerfil() {
        const btn = document.getElementById('btnGuardar');
        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Guardando...';

        const fd = new FormData();
        fd.append('id_persona', idTrabajador);
        fd.append('ciudad', document.getElementById('edit_ciudad').value);
        fd.append('departamento', document.getElementById('edit_departamento').value);
        fd.append('nacionalidad', document.getElementById('edit_nacionalidad').value);
        fd.append('telefono', document.getElementById('edit_telefono').value);
        fd.append('correo', document.getElementById('edit_correo').value);

        try {
            const res = await fetch('/trabajador/perfil/editar', { method:'POST', body:fd });
            const data = await res.json();
            if (res.ok) {
                mostrarToastPerfil('✅ ¡Datos actualizados correctamente!', true);
            } else {
                mostrarToastPerfil('❌ ' + (data.error || 'Error al guardar'), false);
            }
        } catch(e) {
            mostrarToastPerfil('❌ Error de conexión', false);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-check-circle"></i> Guardar cambios';
        }
    }

    function mostrarToastPerfil(msg, ok) {
        const viejo = document.getElementById('toastPerfil');
        if (viejo) viejo.remove();

        const t = document.createElement('div');
        t.id = 'toastPerfil';
        t.style.cssText = `
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 9999;
            background: ${ok ? 'linear-gradient(135deg,#10b981,#059669)' : 'linear-gradient(135deg,#ef4444,#dc2626)'};
            color: white;
            padding: 16px 32px;
            border-radius: 16px;
            font-size: 1.05rem;
            font-weight: 800;
            box-shadow: 0 8px 32px rgba(0,0,0,0.25);
            animation: slideDown 0.4s ease;
            white-space: nowrap;
        `;
        t.innerHTML = `<style>@keyframes slideDown{from{opacity:0;transform:translateX(-50%) translateY(-20px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}</style>${msg}`;
        document.body.appendChild(t);
        setTimeout(() => {
            t.style.transition = 'opacity 0.4s';
            t.style.opacity = '0';
            setTimeout(() => t.remove(), 400);
        }, 3500);
    }

    // ── CIUDADES DE SERVICIO ─────────────────────────────────
    async function cargarCiudadesServicio() {
        try {
            const res = await fetch('/trabajador/ciudades-servicio/mis?id_persona=' + idTrabajador);
            const data = await res.json();
            const lista = data.ciudades || [];
            const el = document.getElementById('listaCiudadesServicio');
            if (!el) return;
            if (lista.length === 0) {
                el.innerHTML = '<div style="color:#94a3b8;font-size:0.82rem;text-align:center;padding:10px">No has registrado ciudades de servicio</div>';
                return;
            }
            el.innerHTML = lista.map(c =>
                `<div style="display:inline-flex;align-items:center;gap:6px;background:#ede9fe;border:1px solid #c4b5fd;
                             border-radius:99px;padding:6px 14px;margin:3px;font-size:0.8rem;font-weight:600;color:#5b21b6">
                    📍 ${c.ciudad}
                    <button onclick="eliminarCiudadServicio(${c.id})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:0.9rem;padding:0 2px">✕</button>
                </div>`
            ).join('');
        } catch(e) {}
    }

    async function agregarCiudadServicio() {
        const input = document.getElementById('nuevaCiudadServicio');
        const ciudad = input.value.trim();
        if (!ciudad) { mostrarToastPerfil('❌ Escribe una ciudad', false); return; }

        const fd = new FormData();
        fd.append('id_persona', idTrabajador);
        fd.append('ciudad', ciudad);
        const res = await fetch('/trabajador/ciudades-servicio/agregar', { method:'POST', body:fd });
        const data = await res.json();
        if (res.ok && data.ok) {
            input.value = '';
            mostrarToastPerfil(data.mensaje, true);
            cargarCiudadesServicio();
        } else {
            mostrarToastPerfil('❌ ' + (data.error || 'Error'), false);
        }
    }

    async function eliminarCiudadServicio(id) {
        const fd = new FormData();
        fd.append('id', id);
        await fetch('/trabajador/ciudades-servicio/eliminar', { method:'POST', body:fd });
        cargarCiudadesServicio();
    }

    // ── ACTUALIZAR DOCUMENTO ─────────────────────────────────
    async function actualizarDocumento(tipoDoc, inputEl) {
        const file = inputEl.files[0];
        if (!file) return;
        if (file.size > 5 * 1024 * 1024) {
            mostrarToastPerfil('❌ El archivo no puede pesar más de 5MB', false);
            return;
        }

        const fd = new FormData();
        fd.append('id_persona', idTrabajador);
        fd.append('tipo_documento', tipoDoc);
        fd.append('archivo', file);

        try {
            const res = await fetch('/trabajador/documentos/actualizar', { method:'POST', body:fd });
            const data = await res.json();
            if (res.ok && data.ok) {
                mostrarToastPerfil('✅ Documento actualizado', true);
            } else {
                mostrarToastPerfil('❌ ' + (data.error || 'Error al subir'), false);
            }
        } catch(e) {
            mostrarToastPerfil('❌ Error de conexión', false);
        }
        inputEl.value = '';
    }

    // ── ESPECIALIDADES ──────────────────────────────────────
    async function cargarEspecialidades() {
        try {
            const res = await fetch('/trabajador/especialidades/mis?id_persona=' + idTrabajador);
            const data = await res.json();
            const lista = data.especialidades || [];
            const el = document.getElementById('listaEspecialidades');
            if (!el) return;
            if (lista.length === 0) {
                el.innerHTML = '<div style="color:#94a3b8;font-size:0.82rem;text-align:center;padding:10px">Aún no has agregado especialidades</div>';
                return;
            }
            el.innerHTML = lista.map(e =>
                `<div style="display:inline-flex;align-items:center;gap:6px;background:#f0f4ff;border:1px solid #c7d2fe;
                             border-radius:99px;padding:6px 14px;margin:3px;font-size:0.8rem;font-weight:600;color:#4f46e5">
                    ${e.especialidad}
                    <button onclick="eliminarEspecialidad(${e.id})" style="background:none;border:none;color:#ef4444;cursor:pointer;font-size:0.9rem;padding:0 2px">✕</button>
                </div>`
            ).join('');
        } catch(e) {}
    }

    async function eliminarEspecialidad(id) {
        const fd = new FormData();
        fd.append('id', id);
        await fetch('/trabajador/especialidades/eliminar', { method:'POST', body:fd });
        cargarEspecialidades();
    }

    async function abrirModalEspecialidad() {
        // Obtener categorías del trabajador
        const resSrv = await fetch('/trabajador/perfil_completo?id=' + idTrabajador);
        const dataSrv = await resSrv.json();
        const cats = (dataSrv.servicios || []).map(s => s.categoria);

        if (cats.length === 0) {
            mostrarToastPerfil('❌ Primero agrega un servicio', false);
            return;
        }

        const viejo = document.getElementById('modalEsp');
        if (viejo) viejo.remove();

        const modal = document.createElement('div');
        modal.id = 'modalEsp';
        modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:20px;';
        modal.innerHTML = `
            <div style="background:white;border-radius:20px;padding:24px;width:100%;max-width:420px;max-height:80vh;overflow-y:auto">
                <h3 style="margin:0 0 16px;font-size:1.1rem">⭐ Agregar Especialidades</h3>
                <label style="font-size:0.78rem;font-weight:700;color:#374151;display:block;margin-bottom:6px">Categoría:</label>
                <select id="espCategoria" onchange="cargarChipsEsp()"
                    style="width:100%;padding:10px;border:1px solid #e2e8f0;border-radius:10px;margin-bottom:14px;font-size:0.88rem">
                    ${cats.map(c => `<option value="${c}">${c}</option>`).join('')}
                </select>
                <div id="chipsEsp" style="margin-bottom:14px">Cargando...</div>
                <div style="display:flex;gap:10px">
                    <button onclick="guardarEspecialidades()"
                        style="flex:1;padding:12px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:white;border:none;border-radius:12px;font-weight:700;cursor:pointer">
                        ✅ Guardar
                    </button>
                    <button onclick="document.getElementById('modalEsp').remove()"
                        style="padding:12px 18px;background:#f1f5f9;border:none;border-radius:12px;color:#64748b;font-weight:600;cursor:pointer">
                        Cancelar
                    </button>
                </div>
            </div>`;
        document.body.appendChild(modal);
        modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
        cargarChipsEsp();
    }

    async function cargarChipsEsp() {
        const cat = document.getElementById('espCategoria').value;
        const res = await fetch('/trabajador/especialidades/catalogo?categoria=' + encodeURIComponent(cat));
        const data = await res.json();
        const lista = data.especialidades || [];

        // Obtener ya seleccionadas
        const resMis = await fetch('/trabajador/especialidades/mis?id_persona=' + idTrabajador);
        const dataMis = await resMis.json();
        const yaSeleccionadas = (dataMis.especialidades || []).filter(e => e.categoria === cat).map(e => e.especialidad);

        const el = document.getElementById('chipsEsp');
        if (lista.length === 0) {
            el.innerHTML = '<div style="color:#94a3b8;font-size:0.82rem">No hay especialidades predefinidas para esta categoría</div>';
            return;
        }
        el.innerHTML = lista.map(esp => {
            const sel = yaSeleccionadas.includes(esp);
            return `<label style="display:inline-flex;align-items:center;gap:6px;background:${sel?'#ede9fe':'#f8fafc'};
                           border:1px solid ${sel?'#7c3aed':'#e2e8f0'};border-radius:99px;padding:8px 14px;margin:3px;
                           cursor:pointer;font-size:0.82rem;font-weight:600;color:${sel?'#4f46e5':'#374151'};transition:all .15s">
                <input type="checkbox" class="espCheck" value="${esp}" ${sel?'checked':''} style="display:none">
                ${esp}
            </label>`;
        }).join('');
    }

    async function guardarEspecialidades() {
        const cat = document.getElementById('espCategoria').value;
        const checks = document.querySelectorAll('.espCheck:checked');
        const seleccionadas = Array.from(checks).map(c => c.value);

        const fd = new FormData();
        fd.append('id_persona', idTrabajador);
        fd.append('categoria', cat);
        fd.append('especialidades', JSON.stringify(seleccionadas));
        const res = await fetch('/trabajador/especialidades/guardar', { method:'POST', body:fd });
        const data = await res.json();
        if (data.ok) {
            document.getElementById('modalEsp').remove();
            mostrarToastPerfil(data.mensaje, true);
            cargarEspecialidades();
        } else {
            mostrarToastPerfil('❌ ' + (data.error || 'Error'), false);
        }
    }

    // ── AGREGAR SERVICIO ────────────────────────────────────
    async function agregarServicio() {
        const cat  = document.getElementById('nuevaCategoria').value;
        const desc = document.getElementById('nuevaDescripcion').value.trim();
        const tar  = parseFloat(document.getElementById('nuevaTarifa').value) || 0;
        const exp  = parseFloat(document.getElementById('nuevaExp').value) || 0;

        if (!cat) { mostrarToastPerfil('❌ Selecciona una categoría', false); return; }
        if (!desc) { mostrarToastPerfil('❌ Ingresa una descripción', false); return; }

        const fd = new FormData();
        fd.append('id_persona', idTrabajador);
        fd.append('categoria', cat);
        fd.append('descripcion', desc);
        fd.append('valor_hora', tar);
        fd.append('experiencia', exp);
        const res = await fetch('/trabajador/servicios/agregar', { method:'POST', body:fd });
        const data = await res.json();
        if (data.ok) {
            mostrarToastPerfil(data.mensaje, true);
            cargarPerfil(); // recargar todo
        } else {
            mostrarToastPerfil('❌ ' + (data.error || 'Error'), false);
        }
    }

    // Cargar categorías en el select de agregar servicio
    async function cargarCategorias() {
        try {
            const res = await fetch('/cliente/categorias');
            const data = await res.json();
            const sel = document.getElementById('nuevaCategoria');
            if (!sel) return;
            (data.categorias || []).forEach(c => {
                const opt = document.createElement('option');
                opt.value = c.nombre_categoria;
                opt.textContent = c.nombre_categoria;
                sel.appendChild(opt);
            });
        } catch(e) {}
    }

    cargarPerfil();
    setTimeout(() => { cargarEspecialidades(); cargarCategorias(); cargarCiudadesServicio(); }, 500);
</script>
</body>
</html>

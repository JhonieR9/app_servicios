<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Panel - TalentHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="/static/css/talenthub.css">
</head>
<body>
<div class="th-bg"></div>

<!-- Topbar -->
<div class="th-topbar">
    <div>
        <div class="th-topbar-title">💼 Mi Panel</div>
        <div class="th-topbar-sub" id="bienvenida">TalentHub</div>
    </div>
    <a href="/trabajador/logout" class="th-logout">
        <i class="bi bi-box-arrow-left"></i> Salir
    </a>
</div>

<div class="th-content" style="position:relative;z-index:1;padding-top:24px">

    <!-- Perfil -->
    <div class="th-profile-card">
        <div class="th-avatar th-avatar-purple">👤</div>
        <div>
            <div style="font-weight:700;font-size:1rem" id="nombreTrabajador">Cargando...</div>
            <div style="font-size:0.8rem;color:var(--muted);margin-top:2px" id="docTrabajador"></div>
            <span class="th-badge th-badge-green" style="margin-top:6px">✅ Activo</span>
        </div>
    </div>

    <!-- Disponibilidad -->
    <div class="th-section-title"><i class="bi bi-circle-fill"></i> Estado</div>
    <div class="th-card" style="padding:18px;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
        <div>
            <div style="font-weight:700;font-size:0.92rem">Disponibilidad</div>
            <div style="font-size:0.78rem;color:var(--muted);margin-top:3px" id="estadoDisp">Activa para recibir solicitudes</div>
        </div>
        <label class="th-toggle">
            <input type="checkbox" id="toggleDisp" onchange="cambiarDisponibilidad()">
            <span class="th-toggle-slider"></span>
        </label>
    </div>

    <!-- Menú -->
    <div class="th-section-title"><i class="bi bi-grid-2x2-fill"></i> Opciones</div>
    <div class="th-menu-grid">
        <a href="/trabajador/disponibilidad" class="th-menu-item" id="link-ubicacion">
            <div class="th-menu-icon th-menu-icon-green"><i class="bi bi-geo-alt-fill" style="color:#10b981"></i></div>
            <div class="th-menu-label">Mi Ubicación</div>
            <div class="th-menu-sub">Activar GPS</div>
        </a>
        <a href="#" class="th-menu-item" id="link-perfil">
            <div class="th-menu-icon th-menu-icon-purple"><i class="bi bi-person-fill" style="color:#6366f1"></i></div>
            <div class="th-menu-label">Mi Perfil</div>
            <div class="th-menu-sub">Ver mis datos</div>
        </a>
        <a href="/trabajador/solicitudes_pendientes_panel" class="th-menu-item" id="link-solicitudes">
            <div class="th-menu-icon th-menu-icon-cyan"><i class="bi bi-briefcase-fill" style="color:#06b6d4"></i></div>
            <div class="th-menu-label">Solicitudes</div>
            <div class="th-menu-sub">Ver trabajos</div>
        </a>
        <a href="/trabajador/logout" class="th-menu-item">
            <div class="th-menu-icon th-menu-icon-orange"><i class="bi bi-box-arrow-left" style="color:#f59e0b"></i></div>
            <div class="th-menu-label">Cerrar Sesión</div>
            <div class="th-menu-sub">Salir</div>
        </a>
    </div>

</div>

<script>
    async function cargarPerfil() {
        const params = new URLSearchParams(window.location.search);
        const nombre = params.get('nombre');
        const doc = params.get('doc');
        const id = params.get('id');

        if (nombre) {
            document.getElementById('nombreTrabajador').textContent = nombre;
            document.getElementById('docTrabajador').textContent = 'Doc: ' + (doc || '');
            document.getElementById('bienvenida').textContent = 'Bienvenido, ' + nombre.split(' ')[0];
            if (id) {
                localStorage.setItem('id_trabajador', id);
                const linkUbicacion = document.getElementById('link-ubicacion');
                if (linkUbicacion) linkUbicacion.href = '/trabajador/disponibilidad?id=' + id;
                const linkSolicitudes = document.getElementById('link-solicitudes');
                if (linkSolicitudes) linkSolicitudes.href = '/trabajador/solicitudes_pendientes_panel?id=' + id;
                const linkPerfil = document.getElementById('link-perfil');
                if (linkPerfil) linkPerfil.href = '/trabajador/mi_perfil_page?id=' + id;
            }
            return;
        }
        try {
            const res = await fetch('/trabajador/mi-perfil', { credentials: 'include' });
            if (!res.ok) { document.getElementById('nombreTrabajador').textContent = 'Trabajador'; return; }
            const data = await res.json();
            document.getElementById('nombreTrabajador').textContent = data.nombre_completo || 'Trabajador';
            document.getElementById('docTrabajador').textContent = 'Doc: ' + (data.numero_documento || '');
            document.getElementById('bienvenida').textContent = 'Bienvenido, ' + (data.nombre_completo || '').split(' ')[0];
        } catch(e) { document.getElementById('nombreTrabajador').textContent = 'Trabajador'; }
    }

    function cambiarDisponibilidad() {
        const activo = document.getElementById('toggleDisp').checked;
        document.getElementById('estadoDisp').textContent = activo
            ? '🟢 Visible para clientes cercanos'
            : 'Activa para recibir solicitudes';
    }

    cargarPerfil();
</script>
</body>
</html>

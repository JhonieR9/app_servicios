<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes - TalentHub Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; }
        .page-header {
            background: white; padding: 20px 24px; margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-radius: 12px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .page-header h1 { font-size: 1.4rem; font-weight: 700; color: #0f172a; margin: 0; }
        .stat-badge {
            background: #dbeafe; color: #1d4ed8;
            padding: 6px 16px; border-radius: 99px;
            font-weight: 700; font-size: 0.9rem;
        }
        .table-card {
            background: white; border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow: hidden;
        }
        .table th { font-size: 0.78rem; color: #64748b; font-weight: 600; border: none; background: #f8fafc; padding: 12px 16px; }
        .table td { font-size: 0.88rem; vertical-align: middle; padding: 12px 16px; border-color: #f1f5f9; }
        .badge-activo { background: #dcfce7; color: #16a34a; padding: 4px 10px; border-radius: 99px; font-size: 0.75rem; font-weight: 600; }
        .search-box { max-width: 300px; }
        .btn-back { background: #f1f5f9; border: none; color: #374151; padding: 8px 16px; border-radius: 8px; text-decoration: none; font-size: 0.85rem; }
        .btn-back:hover { background: #e2e8f0; color: #374151; }
        .empty { text-align: center; padding: 60px; color: #94a3b8; }
        .empty i { font-size: 3rem; display: block; margin-bottom: 12px; }
    </style>
</head>
<body>
<div class="container-fluid p-4">

    <div class="page-header">
        <div class="d-flex align-items-center gap-3">
            <a href="/trabajador/dashboard" class="btn-back"><i class="bi bi-arrow-left"></i> Dashboard</a>
            <h1><i class="bi bi-people-fill me-2" style="color:#2563eb"></i>Clientes Registrados</h1>
        </div>
        <span class="stat-badge" id="totalBadge">Cargando...</span>
    </div>

    <!-- Búsqueda -->
    <div class="mb-3">
        <input type="text" class="form-control search-box" id="searchInput" placeholder="🔍 Buscar por nombre, correo o teléfono..." oninput="filtrar()">
    </div>

    <!-- Tabla -->
    <div class="table-card">
        <div class="table-responsive">
            <table class="table table-hover mb-0">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>NOMBRE</th>
                        <th>CORREO</th>
                        <th>TELÉFONO</th>
                        <th>ESTADO</th>
                        <th>FECHA REGISTRO</th>
                    </tr>
                </thead>
                <tbody id="tablaClientes">
                    <tr><td colspan="6" class="text-center py-4"><div class="spinner-border spinner-border-sm text-primary"></div> Cargando...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="noResultados" class="empty" style="display:none">
        <i class="bi bi-emoji-frown"></i>
        No se encontraron clientes
    </div>
</div>

{% include "trabajadores/_sidebar.html" %}

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    let todosLosClientes = [];

    async function cargarClientes() {
        const res = await fetch('/trabajador/clientes/listar');
        const data = await res.json();
        todosLosClientes = data.clientes || [];
        document.getElementById('totalBadge').textContent = `${data.total} clientes`;
        renderizar(todosLosClientes);
    }

    function renderizar(clientes) {
        const tbody = document.getElementById('tablaClientes');
        const noRes = document.getElementById('noResultados');

        if (!clientes.length) {
            tbody.innerHTML = '';
            noRes.style.display = 'block';
            return;
        }
        noRes.style.display = 'none';
        tbody.innerHTML = clientes.map(c => `
            <tr>
                <td><span class="badge bg-light text-dark">#${c.id_cliente}</span></td>
                <td><strong>${c.nombre_completo || '-'}</strong></td>
                <td>${c.correo || '<span class="text-muted">Sin correo</span>'}</td>
                <td>${c.telefono || '<span class="text-muted">Sin teléfono</span>'}</td>
                <td><span class="badge-activo">✅ Activo</span></td>
                <td><small class="text-muted">${c.fecha_registro || '-'}</small></td>
            </tr>
        `).join('');
    }

    function filtrar() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const filtrados = todosLosClientes.filter(c =>
            (c.nombre_completo || '').toLowerCase().includes(q) ||
            (c.correo || '').toLowerCase().includes(q) ||
            (c.telefono || '').includes(q)
        );
        renderizar(filtrados);
    }

    cargarClientes();
</script>
</body>
</html>

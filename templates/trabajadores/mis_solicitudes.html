<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Solicitudes - TalentHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #8b5cf6 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 600px; margin: 0 auto; }

        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 { color: #1e3a8a; font-size: 22px; }

        .back-btn {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .tabs {
            display: flex;
            background: white;
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            gap: 5px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: #666;
            transition: all 0.3s;
            border: none;
            background: transparent;
        }

        .tab.active {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
        }

        .solicitud-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 4px solid #3b82f6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .solicitud-card.urgente { border-left-color: #ef4444; }
        .solicitud-card.aceptada { border-left-color: #22c55e; }
        .solicitud-card.completada { border-left-color: #8b5cf6; }

        .solicitud-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .solicitud-titulo {
            font-size: 17px;
            font-weight: 700;
            color: #1e293b;
            flex: 1;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .badge-pendiente { background: #fef3c7; color: #92400e; }
        .badge-aceptada { background: #d1fae5; color: #065f46; }
        .badge-en_proceso { background: #dbeafe; color: #1e40af; }
        .badge-completada { background: #ede9fe; color: #5b21b6; }
        .badge-cancelada { background: #fee2e2; color: #991b1b; }

        .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            color: #475569;
        }

        .info-row strong { color: #1e293b; }

        .descripcion {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #475569;
            margin: 12px 0;
            line-height: 1.5;
        }

        .acciones {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 120px;
        }

        .btn-aceptar {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
        }

        .btn-aceptar:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(34,197,94,0.4); }

        .btn-rechazar {
            background: white;
            color: #ef4444;
            border: 2px solid #ef4444;
        }

        .btn-rechazar:hover { background: #fee2e2; }

        .btn-completar {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }

        .btn-completar:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(139,92,246,0.4); }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: white;
        }

        .btn-llamar {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
        }

        .empty-state {
            background: white;
            border-radius: 15px;
            padding: 50px 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .empty-icon { font-size: 60px; margin-bottom: 15px; }
        .empty-text { color: #64748b; font-size: 16px; }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .refresh-btn {
            background: white;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
            cursor: pointer;
            color: #1e3a8a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nueva-badge {
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 5px;
        }

        .cliente-info {
            background: #eff6ff;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .tiempo {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div>
            <h2>📋 Mis Solicitudes</h2>
            <p style="color:#64748b;font-size:13px">Gestiona los servicios que te solicitan</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
            <a href="/trabajador/panel" id="btnVolver"
               style="background:white;border:1px solid #e2e8f0;border-radius:10px;padding:8px 14px;
                      font-weight:600;color:#1e3a8a;text-decoration:none;font-size:13px;
                      display:flex;align-items:center;gap:6px;">
                ← Panel
            </a>
            <button class="refresh-btn" onclick="cargarSolicitudes()">
                🔄 Actualizar
            </button>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" onclick="cambiarTab('pendiente', this)">
            🔔 Nuevas <span id="countPendiente" class="nueva-badge" style="display:none">0</span>
        </button>
        <button class="tab" onclick="cambiarTab('aceptada', this)">
            ✅ Aceptadas
        </button>
        <button class="tab" onclick="cambiarTab('completada', this)">
            🏆 Completadas
        </button>
    </div>

    <div id="loading" class="loading">⏳ Cargando solicitudes...</div>
    <div id="solicitudesContainer"></div>

</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const idTrabajador = urlParams.get('id') || localStorage.getItem('id_trabajador') || 1;
    let tabActual = 'pendiente';
    let todasLasSolicitudes = [];

    async function cargarSolicitudes() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('solicitudesContainer').innerHTML = '';

        try {
            const response = await fetch(`/trabajador/mis_solicitudes_api?id_trabajador=${idTrabajador}`);
            const data = await response.json();

            todasLasSolicitudes = data.solicitudes || [];
            document.getElementById('loading').style.display = 'none';

            // Contar pendientes
            const pendientes = todasLasSolicitudes.filter(s => s.estado === 'pendiente').length;
            const badge = document.getElementById('countPendiente');
            if (pendientes > 0) {
                badge.textContent = pendientes;
                badge.style.display = 'inline-flex';
            } else {
                badge.style.display = 'none';
            }

            renderizarSolicitudes(tabActual);

        } catch (error) {
            document.getElementById('loading').innerHTML = '❌ Error al cargar. <button onclick="cargarSolicitudes()" style="background:#3b82f6;color:white;border:none;padding:8px 15px;border-radius:8px;cursor:pointer">Reintentar</button>';
        }
    }

    function cambiarTab(tab, btn) {
        tabActual = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        renderizarSolicitudes(tab);
    }

    function renderizarSolicitudes(estado) {
        const container = document.getElementById('solicitudesContainer');
        const filtradas = todasLasSolicitudes.filter(s => s.estado === estado);

        if (filtradas.length === 0) {
            const mensajes = {
                'pendiente': { icon: '🔔', texto: 'No tienes solicitudes nuevas', sub: 'Activa tu disponibilidad para recibir solicitudes' },
                'aceptada': { icon: '✅', texto: 'No tienes servicios en curso', sub: 'Acepta solicitudes pendientes para verlas aquí' },
                'completada': { icon: '🏆', texto: 'Aún no has completado servicios', sub: 'Los servicios completados aparecerán aquí' }
            };
            const m = mensajes[estado];
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">${m.icon}</div>
                    <p class="empty-text"><strong>${m.texto}</strong></p>
                    <p style="color:#94a3b8;font-size:14px;margin-top:8px">${m.sub}</p>
                </div>
            `;
            return;
        }

        container.innerHTML = filtradas.map(s => crearCard(s)).join('');
    }

    function crearCard(s) {
        const fecha = new Date(s.fecha_solicitud).toLocaleDateString('es-CO', {
            day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
        });

        const acciones = {
            'pendiente': `
                <button class="btn btn-aceptar" onclick="cambiarEstado(${s.id_solicitud}, 'aceptada')">
                    ✅ Aceptar
                </button>
                <button class="btn btn-rechazar" onclick="cambiarEstado(${s.id_solicitud}, 'cancelada')">
                    ❌ Rechazar
                </button>
            `,
            'aceptada': `
                <a href="/chat/?id_solicitud=${s.id_solicitud}&tipo=trabajador&id_usuario=${idTrabajador}"
                   class="btn btn-llamar" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;">
                    💬 Chat con cliente
                    <span id="badge-chat-${s.id_solicitud}" style="background:rgba(255,255,255,0.35);border-radius:99px;padding:1px 7px;font-size:0.7rem;display:none"></span>
                </a>
            `,
            'en_proceso': `
                <a href="/chat/?id_solicitud=${s.id_solicitud}&tipo=trabajador&id_usuario=${idTrabajador}"
                   class="btn btn-llamar" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;">
                    💬 Chat con cliente
                    <span id="badge-chat-${s.id_solicitud}" style="background:rgba(255,255,255,0.35);border-radius:99px;padding:1px 7px;font-size:0.7rem;display:none"></span>
                </a>
            `,
            'completada': `
                <a href="/chat/?id_solicitud=${s.id_solicitud}&tipo=trabajador&id_usuario=${idTrabajador}"
                   class="btn" style="background:#f1f5f9;color:#64748b;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;">
                    💬 Ver conversación
                </a>
            `
        };

        return `
            <div class="solicitud-card ${s.estado}">
                <div class="solicitud-header">
                    <div class="solicitud-titulo">${s.titulo}</div>
                    <span class="badge badge-${s.estado}">${s.estado.replace('_', ' ')}</span>
                </div>

                <div class="info-row">
                    🏷️ <strong>Categoría:</strong> ${s.nombre_categoria || s.categoria || 'General'}
                </div>

                <div class="info-row">
                    📍 <strong>Dirección:</strong> ${s.direccion_servicio || 'No especificada'}, ${s.ciudad || ''}
                </div>

                ${s.nombre_cliente ? `
                <div class="cliente-info">
                    <div class="info-row" style="margin:0">
                        👤 <strong>Cliente:</strong> ${s.nombre_cliente}
                    </div>
                    ${s.telefono_cliente ? `
                    <div class="info-row" style="margin:4px 0 0 0">
                        📞 <strong>Teléfono:</strong> ${s.telefono_cliente}
                    </div>` : ''}
                </div>` : ''}

                <div class="descripcion">
                    📝 ${s.descripcion || 'Sin descripción'}
                </div>

                <div class="tiempo">📅 ${fecha}</div>

                ${acciones[s.estado] ? `<div class="acciones">${acciones[s.estado]}</div>` : ''}
            </div>
        `;
    }

    async function cambiarEstado(idSolicitud, nuevoEstado) {
        const mensajes = {
            'aceptada': '¿Aceptar esta solicitud?',
            'cancelada': '¿Rechazar esta solicitud?',
            'completada': '¿Marcar como completada?'
        };

        if (!confirm(mensajes[nuevoEstado])) return;

        try {
            const formData = new FormData();
            formData.append('id_solicitud', idSolicitud);
            formData.append('estado', nuevoEstado);
            formData.append('id_trabajador', idTrabajador);

            const response = await fetch('/trabajador/solicitud/actualizar', {
                method: 'POST',
                body: formData
            });

            if (response.ok) {
                const msg = {
                    'aceptada': '✅ ¡Solicitud aceptada! El cliente será notificado.',
                    'cancelada': '❌ Solicitud rechazada.',
                    'completada': '🏆 ¡Servicio completado!'
                };
                alert(msg[nuevoEstado]);
                cargarSolicitudes();
            } else {
                const data = await response.json();
                alert('Error: ' + (data.error || 'No se pudo actualizar'));
            }
        } catch (error) {
            alert('Error de conexión');
        }
    }

    function contactarCliente(telefono, nombre) {
        const msg = encodeURIComponent(`Hola ${nombre}, soy el trabajador de TalentHub. Acabo de aceptar tu solicitud de servicio. ¿Cuándo podemos coordinar?`);
        window.open(`https://wa.me/57${telefono}?text=${msg}`, '_blank');
    }

    // Cargar al iniciar
    cargarSolicitudes();

    // Auto-actualizar cada 30 segundos + badges de chat
    setInterval(async () => {
        await cargarSolicitudes();
        // Actualizar badges de mensajes no leídos
        document.querySelectorAll('[id^="badge-chat-"]').forEach(async badge => {
            const idSol = badge.id.replace('badge-chat-', '');
            try {
                const res  = await fetch(`/chat/no-leidos?id_solicitud=${idSol}&tipo_receptor=trabajador`);
                const data = await res.json();
                if (data.no_leidos > 0) {
                    badge.textContent = data.no_leidos;
                    badge.style.display = 'inline';
                } else {
                    badge.style.display = 'none';
                }
            } catch(e) {}
        });
    }, 30000);

    // Cargar badges inmediatamente al inicio
    setTimeout(async () => {
        document.querySelectorAll('[id^="badge-chat-"]').forEach(async badge => {
            const idSol = badge.id.replace('badge-chat-', '');
            try {
                const res  = await fetch(`/chat/no-leidos?id_solicitud=${idSol}&tipo_receptor=trabajador`);
                const data = await res.json();
                if (data.no_leidos > 0) {
                    badge.textContent = data.no_leidos;
                    badge.style.display = 'inline';
                }
            } catch(e) {}
        });
    }, 1500);
</script>
</body>
</html>

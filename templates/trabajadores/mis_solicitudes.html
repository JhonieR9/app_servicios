<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Solicitudes - TalentHub</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #8b5cf6 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 600px; margin: 0 auto; }

        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 { color: #1e3a8a; font-size: 22px; }

        .back-btn {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .tabs {
            display: flex;
            background: white;
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            gap: 5px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: #666;
            transition: all 0.3s;
            border: none;
            background: transparent;
        }

        .tab.active {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
        }

        .solicitud-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 4px solid #3b82f6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .solicitud-card.urgente { border-left-color: #ef4444; }
        .solicitud-card.aceptada { border-left-color: #22c55e; }
        .solicitud-card.completada { border-left-color: #8b5cf6; }

        .solicitud-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .solicitud-titulo {
            font-size: 17px;
            font-weight: 700;
            color: #1e293b;
            flex: 1;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .badge-pendiente { background: #fef3c7; color: #92400e; }
        .badge-aceptada { background: #d1fae5; color: #065f46; }
        .badge-en_proceso { background: #dbeafe; color: #1e40af; }
        .badge-completada { background: #ede9fe; color: #5b21b6; }
        .badge-cancelada { background: #fee2e2; color: #991b1b; }

        .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            color: #475569;
        }

        .info-row strong { color: #1e293b; }

        .descripcion {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #475569;
            margin: 12px 0;
            line-height: 1.5;
        }

        .acciones {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 120px;
        }

        .btn-aceptar {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
        }

        .btn-aceptar:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(34,197,94,0.4); }

        .btn-rechazar {
            background: white;
            color: #ef4444;
            border: 2px solid #ef4444;
        }

        .btn-rechazar:hover { background: #fee2e2; }

        .btn-completar {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }

        .btn-completar:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(139,92,246,0.4); }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: white;
        }

        .btn-llamar {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
        }

        .empty-state {
            background: white;
            border-radius: 15px;
            padding: 50px 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .empty-icon { font-size: 60px; margin-bottom: 15px; }
        .empty-text { color: #64748b; font-size: 16px; }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .refresh-btn {
            background: white;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
            cursor: pointer;
            color: #1e3a8a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nueva-badge {
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 5px;
        }

        .cliente-info {
            background: #eff6ff;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .tiempo {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div>
            <h2>📋 Mis Solicitudes</h2>
            <p style="color:#64748b;font-size:13px">Gestiona los servicios que te solicitan</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
            <a href="/trabajador/panel" id="btnVolver"
               style="background:white;border:1px solid #e2e8f0;border-radius:10px;padding:8px 14px;
                      font-weight:600;color:#1e3a8a;text-decoration:none;font-size:13px;
                      display:flex;align-items:center;gap:6px;">
                ← Panel
            </a>
            <button class="refresh-btn" onclick="cargarSolicitudes()">
                🔄 Actualizar
            </button>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" onclick="cambiarTab('pendiente', this)">
            🔔 Nuevas <span id="countPendiente" class="nueva-badge" style="display:none">0</span>
        </button>
        <button class="tab" onclick="cambiarTab('aceptada', this)">
            ✅ Aceptadas
        </button>
        <button class="tab" onclick="cambiarTab('completada', this)">
            🏆 Completadas
        </button>
    </div>

    <div id="loading" class="loading">⏳ Cargando solicitudes...</div>
    <div id="solicitudesContainer"></div>

</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const idTrabajador = urlParams.get('id') || localStorage.getItem('id_trabajador') || 1;
    let tabActual = 'pendiente';
    let todasLasSolicitudes = [];

    async function cargarSolicitudes() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('solicitudesContainer').innerHTML = '';

        try {
            const response = await fetch(`/trabajador/mis_solicitudes_api?id_trabajador=${idTrabajador}`);
            const data = await response.json();

            todasLasSolicitudes = data.solicitudes || [];
            document.getElementById('loading').style.display = 'none';

            // Contar pendientes
            const pendientes = todasLasSolicitudes.filter(s => s.estado === 'pendiente').length;
            const badge = document.getElementById('countPendiente');
            if (pendientes > 0) {
                badge.textContent = pendientes;
                badge.style.display = 'inline-flex';
            } else {
                badge.style.display = 'none';
            }

            renderizarSolicitudes(tabActual);

        } catch (error) {
            document.getElementById('loading').innerHTML = '❌ Error al cargar. <button onclick="cargarSolicitudes()" style="background:#3b82f6;color:white;border:none;padding:8px 15px;border-radius:8px;cursor:pointer">Reintentar</button>';
        }
    }

    function cambiarTab(tab, btn) {
        tabActual = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        renderizarSolicitudes(tab);
    }

    function renderizarSolicitudes(estado) {
        const container = document.getElementById('solicitudesContainer');
        // "aceptada" muestra también en_proceso
        const filtradas = todasLasSolicitudes.filter(s =>
            estado === 'aceptada'
                ? (s.estado === 'aceptada' || s.estado === 'en_proceso')
                : s.estado === estado
        );

        if (filtradas.length === 0) {
            const mensajes = {
                'pendiente': { icon: '🔔', texto: 'No tienes solicitudes nuevas', sub: 'Activa tu disponibilidad para recibir solicitudes' },
                'aceptada': { icon: '✅', texto: 'No tienes servicios en curso', sub: 'Acepta solicitudes pendientes para verlas aquí' },
                'completada': { icon: '🏆', texto: 'Aún no has completado servicios', sub: 'Los servicios completados aparecerán aquí' }
            };
            const m = mensajes[estado];
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">${m.icon}</div>
                    <p class="empty-text"><strong>${m.texto}</strong></p>
                    <p style="color:#94a3b8;font-size:14px;margin-top:8px">${m.sub}</p>
                </div>
            `;
            return;
        }

        container.innerHTML = filtradas.map(s => crearCard(s)).join('');
    }

    function crearCard(s) {
        const fecha = new Date(s.fecha_solicitud).toLocaleDateString('es-CO', {
            day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
        });

        const acciones = {
            'pendiente': `
                <button class="btn btn-aceptar" onclick="cambiarEstado(${s.id_solicitud}, 'aceptada')">
                    ✅ Aceptar
                </button>
                <button class="btn btn-rechazar" onclick="cambiarEstado(${s.id_solicitud}, 'cancelada')">
                    ❌ Rechazar
                </button>
            `,
            'aceptada': `
                <button class="btn btn-aceptar" onclick="cambiarEstado(${s.id_solicitud}, 'en_proceso')"
                        style="background:linear-gradient(135deg,#0ea5e9,#0284c7);color:white;border:none;">
                    🔧 Iniciar servicio
                </button>
                <a href="/chat/?id_solicitud=${s.id_solicitud}&tipo=trabajador&id_usuario=${idTrabajador}"
                   class="btn btn-llamar" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;">
                    💬 Chat con cliente
                    <span id="badge-chat-${s.id_solicitud}" style="background:rgba(255,255,255,0.35);border-radius:99px;padding:1px 7px;font-size:0.7rem;display:none"></span>
                </a>
            `,
            'en_proceso': `
                <a href="/chat/?id_solicitud=${s.id_solicitud}&tipo=trabajador&id_usuario=${idTrabajador}"
                   class="btn btn-llamar" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;">
                    💬 Chat con cliente
                    <span id="badge-chat-${s.id_solicitud}" style="background:rgba(255,255,255,0.35);border-radius:99px;padding:1px 7px;font-size:0.7rem;display:none"></span>
                </a>
            `,
            'completada': `
                <a href="/chat/?id_solicitud=${s.id_solicitud}&tipo=trabajador&id_usuario=${idTrabajador}"
                   class="btn" style="background:#f1f5f9;color:#64748b;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;">
                    💬 Ver conversación
                </a>
                <button class="btn" onclick="abrirCalificarCliente(${s.id_solicitud},${s.id_cliente || 0},'${(s.nombre_cliente||'').replace(/'/g,"\\'")}')"
                    style="background:linear-gradient(135deg,#f59e0b,#d97706);color:white;display:flex;align-items:center;justify-content:center;gap:6px;">
                    ⭐ Calificar cliente
                </button>
            `
        };

        return `
            <div class="solicitud-card ${s.estado}">
                <div class="solicitud-header">
                    <div class="solicitud-titulo">${s.titulo}</div>
                    <span class="badge badge-${s.estado}">${s.estado.replace('_', ' ')}</span>
                </div>

                <div class="info-row">
                    🏷️ <strong>Categoría:</strong> ${s.nombre_categoria || s.categoria || 'General'}
                </div>

                <div class="info-row">
                    📍 <strong>Dirección:</strong> ${s.direccion_servicio || 'No especificada'}, ${s.ciudad || ''}
                </div>

                ${s.nombre_cliente ? `
                <div class="cliente-info">
                    <div class="info-row" style="margin:0">
                        👤 <strong>Cliente:</strong> ${s.nombre_cliente}
                    </div>
                    ${s.telefono_cliente ? `
                    <div class="info-row" style="margin:4px 0 0 0">
                        📞 <strong>Teléfono:</strong> ${s.telefono_cliente}
                    </div>` : ''}
                </div>` : ''}

                <div class="descripcion">
                    📝 ${s.descripcion || 'Sin descripción'}
                </div>

                <div class="tiempo">📅 ${fecha}</div>

                ${acciones[s.estado] ? `<div class="acciones">${acciones[s.estado]}</div>` : ''}
            </div>
        `;
    }

    async function cambiarEstado(idSolicitud, nuevoEstado) {
        const mensajes = {
            'aceptada':   '¿Aceptar esta solicitud?',
            'cancelada':  '¿Rechazar? La solicitud quedará disponible para otros profesionales.',
            'completada': '¿Marcar como completada?',
            'en_proceso': '¿Iniciar el servicio ahora?'
        };

        if (!confirm(mensajes[nuevoEstado] || '¿Confirmar?')) return;

        try {
            const formData = new FormData();
            formData.append('id_solicitud', idSolicitud);
            formData.append('estado', nuevoEstado);
            formData.append('id_trabajador', idTrabajador);

            const response = await fetch('/trabajador/solicitud/actualizar', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            if (response.ok) {
                const msg = {
                    'aceptada':   '✅ ¡Solicitud aceptada! El cliente fue notificado.',
                    'cancelada':  '❌ Solicitud rechazada.',
                    'completada': '🏆 ¡Servicio completado!',
                    'en_proceso': '🔧 Servicio iniciado.'
                };
                mostrarToast(msg[nuevoEstado] || '✅ Actualizado');
                cargarSolicitudes();
            } else {
                mostrarToast('❌ ' + (data.error || 'No se pudo actualizar'), true);
            }
        } catch (error) {
            mostrarToast('❌ Error de conexión', true);
        }
    }

    function mostrarToast(msg, esError) {
        const t = document.createElement('div');
        t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
            background:${esError ? '#ef4444' : '#1e3a8a'};color:white;
            padding:12px 22px;border-radius:12px;font-size:0.88rem;font-weight:700;
            z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.3);
            animation:fadeIn 0.3s ease;max-width:90vw;text-align:center`;
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }

    function contactarCliente(telefono, nombre) {
        const msg = encodeURIComponent(`Hola ${nombre}, soy el trabajador de TalentHub. Acabo de aceptar tu solicitud de servicio. ¿Cuándo podemos coordinar?`);
        window.open(`https://wa.me/57${telefono}?text=${msg}`, '_blank');
    }

    // ── CALIFICAR CLIENTE ─────────────────────────────────────────
    function abrirCalificarCliente(idSolicitud, idCliente, nombreCliente) {
        // No mostrar si ya calificó
        if (localStorage.getItem('cal_cli_' + idSolicitud)) {
            mostrarToast('Ya calificaste a este cliente', false);
            return;
        }

        let modal = document.getElementById('modalCalCliente');
        if (!modal) {
            modal = document.createElement('div');
            modal.id = 'modalCalCliente';
            modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);display:flex;align-items:flex-end;justify-content:center;';
            modal.innerHTML = `
                <style>
                    @keyframes slideUpCal{from{transform:translateY(100%)}to{transform:translateY(0)}}
                    .cal-sheet{background:white;border-radius:24px 24px 0 0;padding:28px 24px 40px;
                               width:100%;max-width:480px;animation:slideUpCal 0.35s ease;}
                    .cal-star{font-size:2.4rem;cursor:pointer;transition:transform 0.15s;
                              filter:grayscale(1);opacity:0.35;}
                    .cal-star.active{filter:none;opacity:1;transform:scale(1.2);}
                </style>
                <div class="cal-sheet">
                    <div style="text-align:center;margin-bottom:18px">
                        <div style="font-size:2rem;margin-bottom:6px">⭐</div>
                        <div style="font-size:1.1rem;font-weight:800;color:#1e293b" id="calCliNombre"></div>
                        <div style="font-size:0.82rem;color:#64748b;margin-top:4px">¿Cómo fue trabajar con este cliente?</div>
                    </div>
                    <div style="display:flex;justify-content:center;gap:12px;margin-bottom:20px" id="calCliStars">
                        ${[1,2,3,4,5].map(n=>`<span class="cal-star" onclick="selStarCli(${n})">⭐</span>`).join('')}
                    </div>
                    <textarea id="calCliComentario" rows="3"
                        placeholder="Ej: Cliente puntual, explicó bien lo que necesitaba (opcional)..."
                        style="width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:12px;
                               font-family:'Segoe UI',sans-serif;font-size:0.88rem;resize:none;
                               outline:none;color:#1e293b;margin-bottom:14px"
                        onfocus="this.style.borderColor='#1e3a8a'"
                        onblur="this.style.borderColor='#e2e8f0'"></textarea>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                        <button onclick="cerrarCalCli()"
                            style="padding:13px;border:2px solid #e2e8f0;background:white;
                                   color:#64748b;border-radius:12px;font-weight:700;cursor:pointer">
                            Cancelar
                        </button>
                        <button id="btnEnviarCalCli" onclick="enviarCalCliente()"
                            style="padding:13px;background:linear-gradient(135deg,#f59e0b,#d97706);
                                   color:white;border:none;border-radius:12px;font-weight:700;cursor:pointer">
                            ⭐ Enviar
                        </button>
                    </div>
                </div>`;
            document.body.appendChild(modal);
            modal.addEventListener('click', e => { if (e.target === modal) cerrarCalCli(); });
        }

        modal._idSolicitud  = idSolicitud;
        modal._idCliente    = idCliente;
        modal._puntuacion   = 0;
        document.getElementById('calCliNombre').textContent = '👤 ' + nombreCliente;
        document.getElementById('calCliComentario').value   = '';
        [1,2,3,4,5].forEach(i => {
            const s = document.querySelector(`#calCliStars .cal-star:nth-child(${i})`);
            if (s) { s.classList.remove('active'); }
        });
        modal.style.display = 'flex';
    }

    function selStarCli(val) {
        const modal = document.getElementById('modalCalCliente');
        modal._puntuacion = val;
        document.querySelectorAll('#calCliStars .cal-star').forEach((s, i) => {
            s.classList.toggle('active', i < val);
            s.style.transform = i === val - 1 ? 'scale(1.3)' : 'scale(1)';
            setTimeout(() => { s.style.transform = i < val ? 'scale(1.15)' : 'scale(1)'; }, 200);
        });
    }

    function cerrarCalCli() {
        const m = document.getElementById('modalCalCliente');
        if (m) m.style.display = 'none';
    }

    async function enviarCalCliente() {
        const modal = document.getElementById('modalCalCliente');
        if (!modal._puntuacion) { mostrarToast('Selecciona una calificación', true); return; }
        const btn = document.getElementById('btnEnviarCalCli');
        btn.disabled = true; btn.textContent = 'Enviando...';

        const fd = new FormData();
        fd.append('id_solicitud',  modal._idSolicitud);
        fd.append('id_trabajador', idTrabajador);
        fd.append('id_cliente',    modal._idCliente);
        fd.append('puntuacion',    modal._puntuacion);
        fd.append('comentario',    document.getElementById('calCliComentario').value);

        try {
            const res  = await fetch('/trabajador/calificar-cliente', { method:'POST', body:fd });
            const data = await res.json();
            cerrarCalCli();
            if (res.ok) {
                localStorage.setItem('cal_cli_' + modal._idSolicitud, '1');
                mostrarToast('✅ ' + data.mensaje);
            } else {
                mostrarToast('❌ ' + (data.error || 'Error al calificar'), true);
            }
        } catch(e) {
            mostrarToast('❌ Error de conexión', true);
        } finally {
            btn.disabled = false; btn.textContent = '⭐ Enviar';
        }
    }

    // Cargar al iniciar
    cargarSolicitudes();

    // Auto-actualizar cada 30 segundos + badges de chat
    setInterval(async () => {
        await cargarSolicitudes();
        // Actualizar badges de mensajes no leídos
        document.querySelectorAll('[id^="badge-chat-"]').forEach(async badge => {
            const idSol = badge.id.replace('badge-chat-', '');
            try {
                const res  = await fetch(`/chat/no-leidos?id_solicitud=${idSol}&tipo_receptor=trabajador`);
                const data = await res.json();
                if (data.no_leidos > 0) {
                    badge.textContent = data.no_leidos;
                    badge.style.display = 'inline';
                } else {
                    badge.style.display = 'none';
                }
            } catch(e) {}
        });
    }, 30000);

    // Cargar badges inmediatamente al inicio
    setTimeout(async () => {
        document.querySelectorAll('[id^="badge-chat-"]').forEach(async badge => {
            const idSol = badge.id.replace('badge-chat-', '');
            try {
                const res  = await fetch(`/chat/no-leidos?id_solicitud=${idSol}&tipo_receptor=trabajador`);
                const data = await res.json();
                if (data.no_leidos > 0) {
                    badge.textContent = data.no_leidos;
                    badge.style.display = 'inline';
                }
            } catch(e) {}
        });
    }, 1500);

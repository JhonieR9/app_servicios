<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Solicitudes - TalentHub</title>
    <script src="/static/js/confirm.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 50%, #8b5cf6 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container { max-width: 600px; margin: 0 auto; }

        .header {
            background: white;
            border-radius: 20px;
            padding: 20px 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h2 { color: #1e3a8a; font-size: 22px; }

        .back-btn {
            color: #666;
            text-decoration: none;
            font-size: 14px;
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .tabs {
            display: flex;
            background: white;
            border-radius: 15px;
            padding: 5px;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            gap: 5px;
        }

        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            color: #666;
            transition: all 0.3s;
            border: none;
            background: transparent;
        }

        .tab.active {
            background: linear-gradient(135deg, #1e3a8a, #3b82f6);
            color: white;
        }

        .solicitud-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            border-left: 4px solid #3b82f6;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .solicitud-card.urgente { border-left-color: #ef4444; }
        .solicitud-card.aceptada { border-left-color: #22c55e; }
        .solicitud-card.completada { border-left-color: #8b5cf6; }

        .solicitud-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .solicitud-titulo {
            font-size: 17px;
            font-weight: 700;
            color: #1e293b;
            flex: 1;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            white-space: nowrap;
        }

        .badge-pendiente { background: #fef3c7; color: #92400e; }
        .badge-aceptada { background: #d1fae5; color: #065f46; }
        .badge-cotizacion_enviada { background: #fef3c7; color: #92400e; }
        .badge-en_proceso { background: #dbeafe; color: #1e40af; }
        .badge-completada { background: #ede9fe; color: #5b21b6; }
        .badge-cancelada { background: #fee2e2; color: #991b1b; }

        .info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 14px;
            color: #475569;
        }

        .info-row strong { color: #1e293b; }

        .descripcion {
            background: #f8fafc;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #475569;
            margin: 12px 0;
            line-height: 1.5;
        }

        .acciones {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 120px;
        }

        .btn-aceptar {
            background: linear-gradient(135deg, #22c55e, #16a34a);
            color: white;
        }

        .btn-aceptar:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(34,197,94,0.4); }

        .btn-rechazar {
            background: white;
            color: #ef4444;
            border: 2px solid #ef4444;
        }

        .btn-rechazar:hover { background: #fee2e2; }

        .btn-completar {
            background: linear-gradient(135deg, #8b5cf6, #7c3aed);
            color: white;
        }

        .btn-completar:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(139,92,246,0.4); }

        .btn-whatsapp {
            background: linear-gradient(135deg, #25d366, #128c7e);
            color: white;
        }

        .btn-llamar {
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            color: white;
        }

        .empty-state {
            background: white;
            border-radius: 15px;
            padding: 50px 20px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .empty-icon { font-size: 60px; margin-bottom: 15px; }
        .empty-text { color: #64748b; font-size: 16px; }

        .loading {
            text-align: center;
            padding: 40px;
            color: white;
            font-size: 18px;
        }

        .refresh-btn {
            background: white;
            border: none;
            border-radius: 10px;
            padding: 10px 20px;
            font-weight: 600;
            cursor: pointer;
            color: #1e3a8a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .nueva-badge {
            background: #ef4444;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-left: 5px;
        }

        .cliente-info {
            background: #eff6ff;
            padding: 10px 15px;
            border-radius: 8px;
            margin: 10px 0;
        }

        .tiempo {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 5px;
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header">
        <div>
            <h2>📋 Mis Solicitudes</h2>
            <p style="color:#64748b;font-size:13px">Gestiona los servicios que te solicitan</p>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
            <a href="/trabajador/panel" id="btnVolver"
               style="background:white;border:1px solid #e2e8f0;border-radius:10px;padding:8px 14px;
                      font-weight:600;color:#1e3a8a;text-decoration:none;font-size:13px;
                      display:flex;align-items:center;gap:6px;">
                ← Panel
            </a>
            <button class="refresh-btn" onclick="cargarSolicitudes()">
                🔄 Actualizar
            </button>
        </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
        <button class="tab active" onclick="cambiarTab('pendiente', this)">
            🔔 Nuevas <span id="countPendiente" class="nueva-badge" style="display:none">0</span>
        </button>
        <button class="tab" onclick="cambiarTab('aceptada', this)">
            ✅ Aceptadas
        </button>
        <button class="tab" onclick="cambiarTab('completada', this)">
            🏆 Completadas
        </button>
    </div>

    <div id="loading" class="loading">⏳ Cargando solicitudes...</div>
    <div id="solicitudesContainer"></div>

</div>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const idTrabajador = urlParams.get('id') || localStorage.getItem('id_trabajador') || 1;
    let tabActual = 'pendiente';
    let todasLasSolicitudes = [];

    async function cargarSolicitudes() {
        document.getElementById('loading').style.display = 'block';
        document.getElementById('solicitudesContainer').innerHTML = '';

        try {
            const response = await fetch(`/trabajador/mis_solicitudes_api?id_trabajador=${idTrabajador}`);
            const data = await response.json();

            todasLasSolicitudes = data.solicitudes || [];
            document.getElementById('loading').style.display = 'none';

            // Contar pendientes
            const pendientes = todasLasSolicitudes.filter(s => s.estado === 'pendiente').length;
            const badge = document.getElementById('countPendiente');
            if (pendientes > 0) {
                badge.textContent = pendientes;
                badge.style.display = 'inline-flex';
            } else {
                badge.style.display = 'none';
            }

            renderizarSolicitudes(tabActual);

        } catch (error) {
            document.getElementById('loading').innerHTML = '❌ Error al cargar. <button onclick="cargarSolicitudes()" style="background:#3b82f6;color:white;border:none;padding:8px 15px;border-radius:8px;cursor:pointer">Reintentar</button>';
        }
    }

    function cambiarTab(tab, btn) {
        tabActual = tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        btn.classList.add('active');
        renderizarSolicitudes(tab);
    }

    function renderizarSolicitudes(estado) {
        const container = document.getElementById('solicitudesContainer');
        // "aceptada" muestra también en_proceso y cotizacion_enviada
        const filtradas = todasLasSolicitudes.filter(s =>
            estado === 'aceptada'
                ? (s.estado === 'aceptada' || s.estado === 'en_proceso' || s.estado === 'cotizacion_enviada')
                : s.estado === estado
        );

        if (filtradas.length === 0) {
            const mensajes = {
                'pendiente': { icon: '🔔', texto: 'No tienes solicitudes nuevas', sub: 'Activa tu disponibilidad para recibir solicitudes' },
                'aceptada': { icon: '✅', texto: 'No tienes servicios en curso', sub: 'Acepta solicitudes pendientes para verlas aquí' },
                'completada': { icon: '🏆', texto: 'Aún no has completado servicios', sub: 'Los servicios completados aparecerán aquí' }
            };
            const m = mensajes[estado];
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon">${m.icon}</div>
                    <p class="empty-text"><strong>${m.texto}</strong></p>
                    <p style="color:#94a3b8;font-size:14px;margin-top:8px">${m.sub}</p>
                </div>
            `;
            return;
        }

        container.innerHTML = filtradas.map(s => crearCard(s)).join('');
    }

    function crearCard(s) {
        const fecha = new Date(s.fecha_solicitud).toLocaleDateString('es-CO', {
            day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit'
        });

        const acciones = {
            'pendiente': `
                <button class="btn btn-aceptar" onclick="cambiarEstado(${s.id_solicitud}, 'aceptada')">
                    ✅ Aceptar
                </button>
                <button class="btn" onclick="abrirModalCotizacion(${s.id_solicitud})"
                    style="background:linear-gradient(135deg,#f59e0b,#d97706);color:white;border:none;flex:1;padding:10px 20px;border-radius:10px;font-weight:600;font-size:14px;cursor:pointer;">
                    💰 Cotizar
                </button>
                <button class="btn btn-rechazar" onclick="cambiarEstado(${s.id_solicitud}, 'cancelada')">
                    ❌ Rechazar
                </button>
            `,
            'cotizacion_enviada': `
                <div style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 14px;margin-bottom:8px;font-size:0.85rem;">
                    ⏳ <strong>Cotización enviada.</strong> Esperando respuesta del cliente.<br>
                    <span style="color:#92400e;">
                        ${s.cotizacion_horas || '?'}h × tarifa = 
                        <strong>$${s.cotizacion_precio ? Number(s.cotizacion_precio).toLocaleString('es-CO') : '?'}</strong>
                    </span>
                    ${s.cotizacion_nota ? `<br><em style="color:#6b7280">"${s.cotizacion_nota}"</em>` : ''}
                </div>
                <div style="display:flex;gap:8px;flex-wrap:wrap">
                    <a href="/chat/?id_solicitud=${s.id_solicitud}&tipo=trabajador&id_usuario=${idTrabajador}"
                       class="btn btn-llamar" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;flex:1">
                        💬 Chat / Negociar
                    </a>
                    <button class="btn" onclick="abrirModalCotizacion(${s.id_solicitud})"
                        style="background:linear-gradient(135deg,#f59e0b,#d97706);color:white;border:none;flex:1">
                        ✏️ Nueva cotización
                    </button>
                    <button class="btn btn-rechazar" onclick="cambiarEstado(${s.id_solicitud}, 'cancelada')"
                        style="flex:none;min-width:auto;padding:8px 14px;">
                        ✕
                    </button>
                </div>
            `,
            'aceptada': `
                <button class="btn btn-aceptar" onclick="abrirIniciarCodigo(${s.id_solicitud})"
                        style="background:linear-gradient(135deg,#0ea5e9,#0284c7);color:white;border:none;">
                    🔧 Iniciar servicio
                </button>
                <a href="/chat/?id_solicitud=${s.id_solicitud}&tipo=trabajador&id_usuario=${idTrabajador}"
                   class="btn btn-llamar" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;">
                    💬 Chat con cliente
                    <span id="badge-chat-${s.id_solicitud}" style="background:rgba(255,255,255,0.35);border-radius:99px;padding:1px 7px;font-size:0.7rem;display:none"></span>
                </a>
            `,
            'en_proceso': `
                <a href="/chat/?id_solicitud=${s.id_solicitud}&tipo=trabajador&id_usuario=${idTrabajador}"
                   class="btn btn-llamar" style="text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;">
                    💬 Chat con cliente
                    <span id="badge-chat-${s.id_solicitud}" style="background:rgba(255,255,255,0.35);border-radius:99px;padding:1px 7px;font-size:0.7rem;display:none"></span>
                </a>
                <button class="btn btn-completar" onclick="abrirCompletarCodigo(${s.id_solicitud})"
                    style="background:linear-gradient(135deg,#10b981,#059669);color:white;">
                    ✅ Completar servicio
                </button>
            `,
            'completada': `
                <a href="/chat/?id_solicitud=${s.id_solicitud}&tipo=trabajador&id_usuario=${idTrabajador}"
                   class="btn" style="background:#f1f5f9;color:#64748b;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:6px;">
                    💬 Ver conversación
                </a>
                <button class="btn" onclick="abrirCalificarCliente(${s.id_solicitud},${s.id_cliente || 0},'${(s.nombre_cliente||'').replace(/'/g,"\\'")}')"
                    style="background:linear-gradient(135deg,#f59e0b,#d97706);color:white;display:flex;align-items:center;justify-content:center;gap:6px;">
                    ⭐ Calificar cliente
                </button>
            `
        };

        return `
            <div class="solicitud-card ${s.estado}">
                <div class="solicitud-header">
                    <div class="solicitud-titulo">${s.titulo}</div>
                    <span class="badge badge-${s.estado}">${s.estado.replace('_', ' ')}</span>
                </div>

                <div class="info-row">
                    🏷️ <strong>Categoría:</strong> ${s.nombre_categoria || s.categoria || 'General'}
                </div>

                <div class="info-row">
                    📍 <strong>Dirección:</strong> ${s.direccion_servicio || 'No especificada'}, ${s.ciudad || ''}
                </div>

                <div class="info-row">
                    💳 <strong>Pago:</strong> ${({'efectivo':'💵 Efectivo','nequi':'📱 Nequi','daviplata':'📲 Daviplata','transferencia':'🏦 Transferencia','tarjeta':'💳 Tarjeta'})[s.metodo_pago] || '💵 Efectivo'}
                </div>

                ${s.nombre_cliente ? `
                <div class="cliente-info">
                    <div class="info-row" style="margin:0">
                        👤 <strong>Cliente:</strong> ${s.nombre_cliente}
                    </div>
                    ${s.telefono_cliente ? `
                    <div class="info-row" style="margin:4px 0 0 0">
                        📞 <strong>Teléfono:</strong> ${s.telefono_cliente}
                    </div>` : ''}
                </div>` : ''}

                <div class="descripcion">
                    📝 ${s.descripcion || 'Sin descripción'}
                </div>

                <div class="tiempo">📅 ${fecha}</div>

                ${acciones[s.estado] ? `<div class="acciones">${acciones[s.estado]}</div>` : ''}
            </div>
        `;
    }

    async function cambiarEstado(idSolicitud, nuevoEstado) {
        const confirmaciones = {
            'aceptada':   { titulo:'¿Aceptar solicitud?',   mensaje:'El cliente será notificado de inmediato.',                              btnOk:'✅ Aceptar',   tipo:'success' },
            'cancelada':  { titulo:'¿Rechazar solicitud?',  mensaje:'La solicitud quedará disponible para otros profesionales.',              btnOk:'❌ Rechazar',  tipo:'danger'  },
            'completada': { titulo:'¿Completar servicio?',  mensaje:'El cliente deberá confirmar con el código de 4 dígitos.',               btnOk:'✅ Completar', tipo:'success' },
            'en_proceso': { titulo:'¿Iniciar el servicio?', mensaje:'El cliente verá que ya empezaste a trabajar.',                         btnOk:'🔧 Iniciar',   tipo:'default' },
        };
        const conf = confirmaciones[nuevoEstado] || { titulo:'¿Confirmar?', mensaje:'', btnOk:'Confirmar', tipo:'default' };
        const ok = await thConfirm(conf);
        if (!ok) return;

        try {
            const formData = new FormData();
            formData.append('id_solicitud', idSolicitud);
            formData.append('estado', nuevoEstado);
            formData.append('id_trabajador', idTrabajador);

            const response = await fetch('/trabajador/solicitud/actualizar', {
                method: 'POST',
                body: formData
            });

            const data = await response.json();
            if (response.ok) {
                const msg = {
                    'aceptada':   '✅ ¡Solicitud aceptada! El cliente fue notificado.',
                    'cancelada':  '❌ Solicitud rechazada.',
                    'completada': '🏆 ¡Servicio completado!',
                    'en_proceso': '🔧 Servicio iniciado.'
                };
                mostrarToast(msg[nuevoEstado] || '✅ Actualizado');
                cargarSolicitudes();
            } else {
                mostrarToast('❌ ' + (data.error || 'No se pudo actualizar'), true);
            }
        } catch (error) {
            mostrarToast('❌ Error de conexión', true);
        }
    }

    function mostrarToast(msg, esError) {
        const t = document.createElement('div');
        t.style.cssText = `position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
            background:${esError ? '#ef4444' : '#1e3a8a'};color:white;
            padding:12px 22px;border-radius:12px;font-size:0.88rem;font-weight:700;
            z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,0.3);
            animation:fadeIn 0.3s ease;max-width:90vw;text-align:center`;
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3500);
    }

    // ── MODAL INICIAR CON CÓDIGO ──
    function abrirIniciarCodigo(idSolicitud) {
        const viejo = document.getElementById('modalInicio');
        if (viejo) viejo.remove();
        const modal = document.createElement('div');
        modal.id = 'modalInicio';
        modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:20px;';
        modal.innerHTML = `
            <div style="background:white;border-radius:20px;padding:28px;width:100%;max-width:360px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,0.3)">
                <div style="font-size:2.5rem;margin-bottom:12px">🔑</div>
                <h3 style="margin:0 0 8px;color:#0f172a;font-size:1.1rem">Código de inicio</h3>
                <p style="color:#64748b;font-size:0.85rem;margin:0 0 20px">Pídele el código al cliente para confirmar tu llegada</p>
                <div style="display:flex;gap:8px;justify-content:center;margin-bottom:20px">
                    <input id="ci1" maxlength="1" style="width:48px;height:56px;text-align:center;font-size:1.5rem;font-weight:800;border:2px solid #e2e8f0;border-radius:12px;outline:none" oninput="if(this.value.length>=1)document.getElementById('ci2').focus()">
                    <input id="ci2" maxlength="1" style="width:48px;height:56px;text-align:center;font-size:1.5rem;font-weight:800;border:2px solid #e2e8f0;border-radius:12px;outline:none" oninput="if(this.value.length>=1)document.getElementById('ci3').focus()">
                    <input id="ci3" maxlength="1" style="width:48px;height:56px;text-align:center;font-size:1.5rem;font-weight:800;border:2px solid #e2e8f0;border-radius:12px;outline:none" oninput="if(this.value.length>=1)document.getElementById('ci4').focus()">
                    <input id="ci4" maxlength="1" style="width:48px;height:56px;text-align:center;font-size:1.5rem;font-weight:800;border:2px solid #e2e8f0;border-radius:12px;outline:none" oninput="verificarCodigoInicio(${idSolicitud})">
                </div>
                <div id="msgCI" style="display:none;padding:8px;border-radius:8px;font-size:0.82rem;font-weight:600;margin-bottom:12px"></div>
                <button onclick="document.getElementById('modalInicio').remove()"
                    style="padding:10px 20px;background:#f1f5f9;border:none;border-radius:10px;color:#64748b;font-weight:600;cursor:pointer">
                    Cancelar
                </button>
            </div>`;
        document.body.appendChild(modal);
        document.getElementById('ci1').focus();
    }

    async function verificarCodigoInicio(idSolicitud) {
        const codigo = (document.getElementById('ci1').value +
                        document.getElementById('ci2').value +
                        document.getElementById('ci3').value +
                        document.getElementById('ci4').value).trim();
        if (codigo.length < 4) return;
        const fd = new FormData();
        fd.append('id_solicitud', idSolicitud);
        fd.append('id_trabajador', idTrabajador);
        fd.append('codigo_inicio', codigo);
        try {
            const res = await fetch('/trabajador/solicitud/iniciar-con-codigo', { method:'POST', body:fd });
            const data = await res.json();
            if (res.ok && !data.error) {
                document.getElementById('modalInicio').remove();
                mostrarToast('🔧 ¡Servicio iniciado! Código correcto.');
                cargarSolicitudes();
            } else {
                const msg = document.getElementById('msgCI');
                msg.style.display = 'block';
                msg.style.background = '#fee2e2'; msg.style.color = '#dc2626';
                msg.textContent = '❌ ' + (data.error || 'Código incorrecto');
                ['ci1','ci2','ci3','ci4'].forEach(id => document.getElementById(id).value = '');
                document.getElementById('ci1').focus();
            }
        } catch(e) { mostrarToast('❌ Error de conexión'); }
    }

    function contactarCliente(telefono, nombre) {        const msg = encodeURIComponent(`Hola ${nombre}, soy el trabajador de TalentHub. Acabo de aceptar tu solicitud de servicio. ¿Cuándo podemos coordinar?`);
        window.open(`https://wa.me/57${telefono}?text=${msg}`, '_blank');
    }

    // ── MODAL COTIZACIÓN ─────────────────────────────────────────
    function abrirModalCotizacion(idSolicitud) {
        const viejo = document.getElementById('modalCotizacion');
        if (viejo) viejo.remove();

        const modal = document.createElement('div');
        modal.id = 'modalCotizacion';
        modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:20px;';
        modal.innerHTML = `
            <div style="background:white;border-radius:20px;padding:28px 24px;width:100%;max-width:400px;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
                <h3 style="margin:0 0 6px;font-size:1.1rem;color:#0f172a;">💰 Enviar cotización</h3>
                <p style="font-size:0.82rem;color:#64748b;margin:0 0 20px;">Indica cuántas horas estimas. El precio se calcula con tu tarifa registrada.</p>

                <label style="font-size:0.78rem;font-weight:700;color:#374151;display:block;margin-bottom:6px;">⏱ Horas estimadas de trabajo</label>
                <input id="cotHoras" type="number" min="0.5" max="24" step="0.5" value="2"
                    style="width:100%;padding:12px 14px;border:2px solid #e2e8f0;border-radius:10px;font-size:1rem;font-weight:700;outline:none;margin-bottom:4px;"
                    oninput="calcularPrecio()"
                    onfocus="this.style.borderColor='#f59e0b'"
                    onblur="this.style.borderColor='#e2e8f0'">

                <div id="cotPrecioPreview" style="background:#fffbeb;border:1px solid #fde68a;border-radius:10px;padding:12px 14px;margin:10px 0 14px;font-size:0.9rem;color:#92400e;font-weight:700;text-align:center;">
                    Calculando...
                </div>

                <label style="font-size:0.78rem;font-weight:700;color:#374151;display:block;margin-bottom:6px;">🧱 Costo de materiales (opcional)</label>
                <input id="cotMateriales" type="number" min="0" step="1000" value="0" placeholder="Ej: 45000"
                    style="width:100%;padding:12px 14px;border:1px solid #e2e8f0;border-radius:10px;font-size:1rem;font-weight:700;outline:none;margin-bottom:4px;"
                    oninput="calcularPrecio()"
                    onfocus="this.style.borderColor='#f59e0b'"
                    onblur="this.style.borderColor='#e2e8f0'">
                <small style="font-size:0.72rem;color:#94a3b8;display:block;margin-bottom:14px">Si no aplica, déjalo en 0</small>

                <label style="font-size:0.78rem;font-weight:700;color:#374151;display:block;margin-bottom:6px;">📝 Nota para el cliente (opcional)</label>
                <textarea id="cotNota" rows="2" placeholder="Ej: Los materiales corren por cuenta del cliente..."
                    style="width:100%;padding:10px 14px;border:1px solid #e2e8f0;border-radius:10px;font-size:0.85rem;outline:none;resize:none;margin-bottom:16px;font-family:inherit;"
                    onfocus="this.style.borderColor='#f59e0b'"
                    onblur="this.style.borderColor='#e2e8f0'"></textarea>

                <div style="display:flex;gap:10px;">
                    <button onclick="enviarCotizacion(${idSolicitud})"
                        style="flex:1;padding:13px;background:linear-gradient(135deg,#f59e0b,#d97706);color:white;border:none;border-radius:12px;font-weight:700;font-size:0.95rem;cursor:pointer;">
                        💰 Enviar cotización
                    </button>
                    <button onclick="document.getElementById('modalCotizacion').remove()"
                        style="padding:13px 18px;background:#f1f5f9;border:none;border-radius:12px;font-weight:600;color:#64748b;cursor:pointer;">
                        Cancelar
                    </button>
                </div>
            </div>
        `;
        document.body.appendChild(modal);
        modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });

        // Cargar tarifa del trabajador para preview
        fetch('/trabajador/perfil_completo?id=' + idTrabajador)
            .then(r => r.json())
            .then(data => {
                const tarifa = data.servicios && data.servicios[0] ? data.servicios[0].valor_hora : 50000;
                modal._tarifa = parseFloat(tarifa) || 50000;
                calcularPrecio();
            }).catch(() => { modal._tarifa = 50000; calcularPrecio(); });
    }

    function calcularPrecio() {
        const modal = document.getElementById('modalCotizacion');
        if (!modal) return;
        const horas = parseFloat(document.getElementById('cotHoras').value) || 0;
        const tarifa = modal._tarifa || 50000;
        const materiales = parseFloat(document.getElementById('cotMateriales').value) || 0;
        const manoObra = horas * tarifa;
        const total = manoObra + materiales;
        let html = `${horas}h × $${tarifa.toLocaleString('es-CO')}/h = <strong>$${manoObra.toLocaleString('es-CO')}</strong> (mano de obra)`;
        if (materiales > 0) {
            html += `<br>+ $${materiales.toLocaleString('es-CO')} (materiales)`;
            html += `<br><span style="font-size:1.1rem">Total: $${total.toLocaleString('es-CO')}</span>`;
        }
        document.getElementById('cotPrecioPreview').innerHTML = html;
    }

    async function enviarCotizacion(idSolicitud) {
        const horas = parseFloat(document.getElementById('cotHoras').value);
        const nota  = document.getElementById('cotNota').value.trim();
        const materiales = parseFloat(document.getElementById('cotMateriales').value) || 0;

        if (!horas || horas <= 0) {
            mostrarToast('❌ Ingresa las horas estimadas', true);
            return;
        }

        const fd = new FormData();
        fd.append('id_solicitud',   idSolicitud);
        fd.append('id_trabajador',  idTrabajador);
        fd.append('horas_estimadas', horas);
        fd.append('materiales', materiales);
        if (nota) fd.append('nota', nota);

        try {
            const res  = await fetch('/trabajador/solicitud/cotizar', { method:'POST', body:fd });
            const data = await res.json();
            if (res.ok && data.ok) {
                document.getElementById('modalCotizacion').remove();
                mostrarToast('💰 ' + data.mensaje);
                cargarSolicitudes();
            } else {
                mostrarToast('❌ ' + (data.error || 'Error al enviar'), true);
            }
        } catch(e) {
            mostrarToast('❌ Error de conexión', true);
        }
    }

    // ── COMPLETAR CON CÓDIGO ─────────────────────────────────────
    function abrirCompletarCodigo(idSolicitud) {
        const viejo = document.getElementById('modalCodigo');
        if (viejo) viejo.remove();

        const modal = document.createElement('div');
        modal.id = 'modalCodigo';
        modal.style.cssText = 'position:fixed;inset:0;z-index:9999;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;padding:20px;';
        modal.innerHTML = `
            <div style="background:white;border-radius:20px;padding:28px 24px;width:100%;max-width:360px;text-align:center">
                <div style="font-size:2.5rem;margin-bottom:12px">🔐</div>
                <div style="font-size:1.1rem;font-weight:800;color:#1e293b;margin-bottom:6px">Código del cliente</div>
                <div style="font-size:0.82rem;color:#64748b;margin-bottom:20px">Pídele al cliente el código de 4 dígitos</div>
                <input type="text" id="codigoInput" maxlength="4" inputmode="numeric"
                    style="width:100%;padding:16px;text-align:center;font-size:2rem;font-weight:900;
                           letter-spacing:12px;border:2px solid #e2e8f0;border-radius:14px;outline:none;
                           color:#059669;font-family:'Segoe UI',sans-serif"
                    placeholder="····"
                    oninput="this.value=this.value.replace(/[^0-9]/g,'')">
                <div id="codigoError" style="display:none;margin-top:10px;padding:8px;background:#fee2e2;color:#dc2626;border-radius:8px;font-size:0.82rem;font-weight:600"></div>
                <div style="display:flex;gap:10px;margin-top:18px">
                    <button onclick="document.getElementById('modalCodigo').remove()"
                        style="flex:1;padding:13px;border:2px solid #e2e8f0;background:white;color:#64748b;
                               border-radius:12px;font-weight:700;cursor:pointer;font-size:0.88rem">
                        Cancelar
                    </button>
                    <button onclick="enviarCodigo(${idSolicitud})" id="btnEnviarCodigo"
                        style="flex:2;padding:13px;background:linear-gradient(135deg,#10b981,#059669);
                               color:white;border:none;border-radius:12px;font-weight:700;cursor:pointer;font-size:0.88rem">
                        ✅ Confirmar
                    </button>
                </div>
            </div>`;
        document.body.appendChild(modal);
        modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
        document.getElementById('codigoInput').focus();
    }

    async function enviarCodigo(idSolicitud) {
        const codigo = document.getElementById('codigoInput').value.trim();
        if (codigo.length < 4) { document.getElementById('codigoError').textContent = 'Ingresa 4 dígitos'; document.getElementById('codigoError').style.display = 'block'; return; }
        const btn = document.getElementById('btnEnviarCodigo');
        btn.disabled = true; btn.textContent = 'Verificando...';

        const fd = new FormData();
        fd.append('id_solicitud', idSolicitud);
        fd.append('codigo', codigo);

        try {
            const res = await fetch('/trabajador/servicio/completar', { method:'POST', body:fd });
            const data = await res.json();
            if (res.ok) {
                document.getElementById('modalCodigo').remove();
                mostrarToast('🎉 ' + data.mensaje);
                cargarSolicitudes();
            } else {
                document.getElementById('codigoError').textContent = data.error || 'Código incorrecto';
                document.getElementById('codigoError').style.display = 'block';
                document.getElementById('codigoInput').value = '';
                document.getElementById('codigoInput').focus();
                btn.disabled = false; btn.textContent = '✅ Confirmar';
            }
        } catch(e) {
            document.getElementById('codigoError').textContent = 'Error de conexión';
            document.getElementById('codigoError').style.display = 'block';
            btn.disabled = false; btn.textContent = '✅ Confirmar';
        }
    }

    // ── CALIFICAR CLIENTE — Tags rápidos ─────────────────────────
    const TAGS_CLIENTE = {
        5: ['⚡ Muy puntual','💬 Explicó bien lo que necesitaba','😊 Muy amable','💰 Pagó sin problema','🔁 Volvería a trabajar con él/ella','🏠 Lugar en buen estado'],
        4: ['👍 Buen cliente','⏰ Llegó a tiempo','🗣️ Comunicativo','💵 Pagó a tiempo','✅ Claro con lo que quería'],
        3: ['🕐 Un poco impuntual','📞 Podría comunicarse mejor','🔧 Cambió el alcance del trabajo','✅ Trato correcto'],
        2: ['⏳ Nos hizo esperar','😕 Poco claro en las instrucciones','📵 Difícil de contactar','💸 Regateo excesivo'],
        1: ['❌ No estaba disponible','😤 Mala actitud','🚫 Cambió todo a último momento','💔 No lo recomiendo']
    };

    const HINT_CLI = {
        1:'Muy mala experiencia 😞',
        2:'Experiencia difícil 😕',
        3:'Experiencia regular 😐',
        4:'Buen cliente 😊',
        5:'¡Excelente cliente! 🎉'
    };

    function abrirCalificarCliente(idSolicitud, idCliente, nombreCliente) {
        if (localStorage.getItem('cal_cli_' + idSolicitud)) {
            mostrarToast('Ya calificaste a este cliente', false);
            return;
        }

        // Siempre destruir y recrear para evitar estado sucio
        const viejo = document.getElementById('modalCalCliente');
        if (viejo) viejo.remove();

        const modal = document.createElement('div');
        modal.id = 'modalCalCliente';
        modal.style.cssText = `
            position:fixed;inset:0;z-index:9999;
            background:rgba(0,0,0,0.55);
            display:flex;align-items:flex-end;justify-content:center;
        `;
        modal.innerHTML = `
            <style>
                @keyframes slideUpCli {
                    from { transform:translateY(100%); opacity:0 }
                    to   { transform:translateY(0);    opacity:1 }
                }
                .cal-cli-sheet {
                    background:white; border-radius:24px 24px 0 0;
                    width:100%; max-width:500px;
                    padding:24px 20px 38px;
                    animation:slideUpCli 0.28s cubic-bezier(0.34,1.56,0.64,1);
                    max-height:92vh; overflow-y:auto;
                }
                .cli-drag {
                    width:40px; height:4px; border-radius:99px;
                    background:#e2e8f0; margin:0 auto 20px; cursor:pointer;
                }
                .cli-nombre { font-size:1rem; font-weight:800; color:#1e293b; margin-bottom:2px; }
                .cli-sub    { font-size:0.78rem; color:#94a3b8; margin-bottom:18px; }
                .cli-stars  { display:flex; gap:6px; justify-content:center; margin-bottom:6px; }
                .cli-star   {
                    font-size:2.4rem; cursor:pointer; line-height:1;
                    user-select:none; transition:transform 0.15s, filter 0.15s;
                }
                .cli-star:hover { transform:scale(1.15); }
                .cli-hint   {
                    text-align:center; font-size:0.78rem; color:#94a3b8;
                    min-height:20px; margin-bottom:16px; transition:all 0.2s;
                }
                .cli-chips-section { margin-bottom:16px; }
                .cli-chips-label {
                    font-size:0.72rem; font-weight:700; color:#94a3b8;
                    text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;
                }
                .cli-chips-wrap { display:flex; flex-wrap:wrap; gap:8px; }
                .cli-chip {
                    padding:7px 13px; border-radius:99px; font-size:0.8rem; font-weight:600;
                    cursor:pointer; transition:all 0.18s;
                    border:2px solid #e2e8f0; background:#f8fafc; color:#64748b;
                    user-select:none;
                }
                .cli-chip:hover  { border-color:#93c5fd; color:#1d4ed8; background:#eff6ff; }
                .cli-chip.selected { border-color:#1d4ed8; background:#1d4ed8; color:white; transform:scale(1.04); }
                .cli-textarea {
                    width:100%; padding:12px 14px; border:2px solid #e2e8f0;
                    border-radius:12px; font-family:'Segoe UI',sans-serif;
                    font-size:0.88rem; outline:none; resize:none;
                    margin-bottom:16px; transition:border-color 0.2s; color:#1e293b;
                }
                .cli-textarea:focus { border-color:#1e3a8a; }
                .cli-btns { display:grid; grid-template-columns:1fr 2fr; gap:10px; }
                .cli-btn-cancel {
                    padding:14px; border:2px solid #e2e8f0; background:white; color:#64748b;
                    border-radius:12px; font-weight:700; cursor:pointer;
                    font-family:'Segoe UI',sans-serif; font-size:0.88rem;
                }
                .cli-btn-send {
                    padding:14px;
                    background:linear-gradient(135deg,#f59e0b,#d97706);
                    color:white; border:none; border-radius:12px; font-weight:800;
                    cursor:pointer; font-family:'Segoe UI',sans-serif; font-size:0.88rem;
                    box-shadow:0 4px 14px rgba(245,158,11,0.4); transition:all 0.2s;
                }
                .cli-btn-send:disabled { opacity:0.6; cursor:not-allowed; }
                .cli-btn-send:not(:disabled):hover { transform:translateY(-2px); }
            </style>
            <div class="cal-cli-sheet">
                <div class="cli-drag" onclick="cerrarCalCli()"></div>
                <div class="cli-nombre" id="calCliNombre"></div>
                <div class="cli-sub">¿Cómo fue trabajar con este cliente?</div>

                <!-- Estrellas -->
                <div class="cli-stars" id="calCliStars">
                    ${[1,2,3,4,5].map(n =>
                        `<span class="cli-star" id="cliStar${n}" onclick="selStarCli(${n})" aria-label="${n} estrella${n>1?'s':''}">☆</span>`
                    ).join('')}
                </div>
                <div class="cli-hint" id="calCliHint">Toca las estrellas para calificar</div>

                <!-- Chips -->
                <div class="cli-chips-section" id="calCliChips" style="display:none">
                    <div class="cli-chips-label">¿Qué destacas? (elige los que quieras)</div>
                    <div class="cli-chips-wrap" id="calCliChipsWrap"></div>
                </div>

                <!-- Comentario -->
                <textarea class="cli-textarea" id="calCliComentario" rows="2"
                    placeholder="Comentario adicional (opcional)..."
                ></textarea>

                <!-- Botones -->
                <div class="cli-btns">
                    <button class="cli-btn-cancel" onclick="cerrarCalCli()">Cancelar</button>
                    <button class="cli-btn-send" id="btnEnviarCalCli" onclick="enviarCalCliente()">
                        ⭐ Enviar calificación
                    </button>
                </div>
            </div>`;

        document.body.appendChild(modal);
        modal.addEventListener('click', e => { if (e.target === modal) cerrarCalCli(); });

        modal._idSolicitud = idSolicitud;
        modal._idCliente   = idCliente;
        modal._puntuacion  = 0;
        modal._tags        = new Set();

        document.getElementById('calCliNombre').textContent = '👤 Calificar a ' + nombreCliente;
        modal.style.display = 'flex';
    }

    function selStarCli(n) {
        const modal = document.getElementById('modalCalCliente');
        modal._puntuacion = n;
        modal._tags = new Set();

        [1,2,3,4,5].forEach(i => {
            const s = document.getElementById('cliStar'+i);
            s.textContent = i <= n ? '★' : '☆';
            s.style.color  = i <= n ? '#f59e0b' : '#cbd5e1';
            s.style.filter = i <= n ? 'drop-shadow(0 2px 4px rgba(245,158,11,0.4))' : 'none';
            s.style.transform = i === n ? 'scale(1.4)' : i < n ? 'scale(1.1)' : 'scale(1)';
        });

        document.getElementById('calCliHint').textContent = HINT_CLI[n] || '';

        const chips = TAGS_CLIENTE[n] || [];
        const wrap  = document.getElementById('calCliChipsWrap');
        wrap.innerHTML = chips.map(tag =>
            `<span class="cli-chip" onclick="toggleChipCli(this,'${tag.replace(/'/g,"\\'")}')">
                ${tag}
            </span>`
        ).join('');
        document.getElementById('calCliChips').style.display = chips.length ? 'block' : 'none';
    }

    function toggleChipCli(el, tag) {
        const modal = document.getElementById('modalCalCliente');
        if (modal._tags.has(tag)) {
            modal._tags.delete(tag);
            el.classList.remove('selected');
        } else {
            modal._tags.add(tag);
            el.classList.add('selected');
        }
    }

    function cerrarCalCli() {
        const modal = document.getElementById('modalCalCliente');
        if (modal) {
            modal.style.opacity = '0';
            modal.style.transition = 'opacity 0.18s';
            setTimeout(() => modal.remove(), 180);
        }
    }

    async function enviarCalCliente() {
        const modal = document.getElementById('modalCalCliente');
        if (!modal._puntuacion) { mostrarToast('Toca las estrellas para calificar ⭐', true); return; }
        const btn = document.getElementById('btnEnviarCalCli');
        btn.disabled = true; btn.textContent = 'Enviando...';

        const fd = new FormData();
        fd.append('id_solicitud',  modal._idSolicitud);
        fd.append('id_trabajador', idTrabajador);
        fd.append('id_cliente',    modal._idCliente);
        fd.append('puntuacion',    modal._puntuacion);
        fd.append('comentario',    document.getElementById('calCliComentario').value);
        fd.append('tags',          [...modal._tags].join(','));

        try {
            const res  = await fetch('/trabajador/calificar-cliente', { method:'POST', body:fd });
            const data = await res.json();
            cerrarCalCli();
            if (res.ok) {
                localStorage.setItem('cal_cli_' + modal._idSolicitud, '1');
                mostrarToast('✅ ' + data.mensaje);
                cargarSolicitudes();
            } else {
                mostrarToast('❌ ' + (data.error || 'Error al calificar'), true);
            }
        } catch(e) {
            mostrarToast('❌ Error de conexión', true);
        } finally {
            btn.disabled = false; btn.textContent = '⭐ Enviar calificación';
        }
    }

    // Cargar al iniciar
    cargarSolicitudes();

    // Auto-actualizar cada 30 segundos + badges de chat
    setInterval(async () => {
        await cargarSolicitudes();
        // Actualizar badges de mensajes no leídos
        document.querySelectorAll('[id^="badge-chat-"]').forEach(async badge => {
            const idSol = badge.id.replace('badge-chat-', '');
            try {
                const res  = await fetch(`/chat/no-leidos?id_solicitud=${idSol}&tipo_receptor=trabajador`);
                const data = await res.json();
                if (data.no_leidos > 0) {
                    badge.textContent = data.no_leidos;
                    badge.style.display = 'inline';
                } else {
                    badge.style.display = 'none';
                }
            } catch(e) {}
        });
    }, 30000);

    // Cargar badges inmediatamente al inicio
    setTimeout(async () => {
        document.querySelectorAll('[id^="badge-chat-"]').forEach(async badge => {
            const idSol = badge.id.replace('badge-chat-', '');
            try {
                const res  = await fetch(`/chat/no-leidos?id_solicitud=${idSol}&tipo_receptor=trabajador`);
                const data = await res.json();
                if (data.no_leidos > 0) {
                    badge.textContent = data.no_leidos;
                    badge.style.display = 'inline';
                }
            } catch(e) {}
        });
    }, 1500);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Contraseña - TalentHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.4);
            animation: fadeUp 0.4s ease;
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(20px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .icon-wrap {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem;
            margin: 0 auto 20px;
        }
        h2 { font-size: 1.4rem; font-weight: 700; color: #0f172a; text-align: center; margin-bottom: 6px; }
        .sub { color: #64748b; font-size: 0.85rem; text-align: center; margin-bottom: 28px; }
        .success-box {
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 24px;
            font-size: 0.85rem;
            color: #166534;
        }
        .success-box strong { display: block; margin-bottom: 4px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.82rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .input-wrap { position: relative; }
        input[type="password"], input[type="text"] {
            width: 100%;
            padding: 12px 44px 12px 14px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        input:focus { border-color: #2563eb; }
        .toggle-pw {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: #94a3b8; cursor: pointer; font-size: 1rem;
        }
        .strength-bar {
            height: 4px; border-radius: 2px;
            background: #e2e8f0; margin-top: 8px;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%; border-radius: 2px;
            transition: width 0.3s, background 0.3s;
            width: 0%;
        }
        .strength-text { font-size: 0.75rem; color: #94a3b8; margin-top: 4px; }
        .alert {
            padding: 12px 14px; border-radius: 10px;
            font-size: 0.85rem; margin-bottom: 16px; display: none;
        }
        .alert.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .alert.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        .btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            transition: all 0.2s; margin-top: 8px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,99,235,0.35); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    </style>
</head>
<body>
<div class="card">
    <div class="icon-wrap">🔐</div>
    <h2>¡Registro Exitoso!</h2>
    <p class="sub">Crea tu contraseña para acceder a tu cuenta</p>

    <div class="success-box">
        <strong>✅ Tu perfil fue registrado correctamente</strong>
        Ahora crea una contraseña para poder iniciar sesión en el futuro.
    </div>

    <div id="alert" class="alert"></div>

    <form id="formPassword">
        <input type="hidden" id="id_persona" name="id_persona" value="">

        <div class="form-group">
            <label>Nueva Contraseña</label>
            <div class="input-wrap">
                <input type="password" id="password" name="password" placeholder="Mínimo 6 caracteres" required oninput="checkStrength()">
                <button type="button" class="toggle-pw" onclick="togglePw('password', this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
            <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
            <div class="strength-text" id="strengthText"></div>
        </div>

        <div class="form-group">
            <label>Confirmar Contraseña</label>
            <div class="input-wrap">
                <input type="password" id="confirmar" name="confirmar_password" placeholder="Repite tu contraseña" required>
                <button type="button" class="toggle-pw" onclick="togglePw('confirmar', this)">
                    <i class="bi bi-eye"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn" id="btnGuardar">
            <i class="bi bi-shield-check"></i> Guardar Contraseña
        </button>
    </form>
</div>

<script>
    // Obtener id_persona de la URL
    const params = new URLSearchParams(window.location.search);
    document.getElementById('id_persona').value = params.get('id_persona') || '';

    function togglePw(id, btn) {
        const input = document.getElementById(id);
        const isText = input.type === 'text';
        input.type = isText ? 'password' : 'text';
        btn.innerHTML = isText ? '<i class="bi bi-eye"></i>' : '<i class="bi bi-eye-slash"></i>';
    }

    function checkStrength() {
        const pw = document.getElementById('password').value;
        const fill = document.getElementById('strengthFill');
        const text = document.getElementById('strengthText');
        let score = 0;
        if (pw.length >= 6) score++;
        if (pw.length >= 10) score++;
        if (/[A-Z]/.test(pw)) score++;
        if (/[0-9]/.test(pw)) score++;
        if (/[^A-Za-z0-9]/.test(pw)) score++;

        const levels = [
            { w: '20%', c: '#ef4444', t: 'Muy débil' },
            { w: '40%', c: '#f97316', t: 'Débil' },
            { w: '60%', c: '#eab308', t: 'Regular' },
            { w: '80%', c: '#22c55e', t: 'Fuerte' },
            { w: '100%', c: '#16a34a', t: 'Muy fuerte' },
        ];
        const lvl = levels[Math.min(score, 4)];
        fill.style.width = pw ? lvl.w : '0%';
        fill.style.background = lvl.c;
        text.textContent = pw ? lvl.t : '';
        text.style.color = lvl.c;
    }

    const alertEl = document.getElementById('alert');

    document.getElementById('formPassword').addEventListener('submit', async (e) => {
        e.preventDefault();
        const pw = document.getElementById('password').value;
        const conf = document.getElementById('confirmar').value;
        const id = document.getElementById('id_persona').value;

        if (pw !== conf) {
            alertEl.className = 'alert error';
            alertEl.textContent = '❌ Las contraseñas no coinciden';
            alertEl.style.display = 'block';
            return;
        }
        if (pw.length < 6) {
            alertEl.className = 'alert error';
            alertEl.textContent = '❌ La contraseña debe tener al menos 6 caracteres';
            alertEl.style.display = 'block';
            return;
        }

        const btn = document.getElementById('btnGuardar');
        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Guardando...';

        const fd = new FormData();
        fd.append('id_persona', id);
        fd.append('password', pw);
        fd.append('confirmar_password', conf);

        const res = await fetch('/trabajador/configurar-password', { method: 'POST', body: fd });
        const data = await res.json();

        if (res.ok) {
            alertEl.className = 'alert success';
            alertEl.textContent = '✅ Contraseña guardada. Redirigiendo al login...';
            alertEl.style.display = 'block';
            setTimeout(() => window.location.href = '/trabajador/login', 1500);
        } else {
            alertEl.className = 'alert error';
            alertEl.textContent = '❌ ' + (data.error || 'Error al guardar');
            alertEl.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-shield-check"></i> Guardar Contraseña';
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Trabajadores - Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link href='https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css' rel='stylesheet' />
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;height:100vh;display:flex;flex-direction:column}
        .topbar{background:#1e293b;padding:14px 20px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #334155;flex-shrink:0}
        .topbar a{width:36px;height:36px;border-radius:50%;background:#334155;display:flex;align-items:center;justify-content:center;color:#94a3b8;text-decoration:none;font-size:0.9rem}
        .topbar a:hover{background:#475569;color:white}
        .topbar h1{font-size:1rem;font-weight:700;flex:1}
        .topbar .badge{background:rgba(16,185,129,.2);color:#10b981;padding:4px 12px;border-radius:99px;font-size:0.75rem;font-weight:700}
        #mapa{flex:1;width:100%}
        .info-panel{position:absolute;bottom:20px;left:20px;right:20px;background:rgba(30,41,59,0.95);backdrop-filter:blur(12px);border:1px solid #334155;border-radius:16px;padding:16px;z-index:10;display:none;max-width:400px}
        .info-panel h3{font-size:0.95rem;font-weight:700;margin-bottom:6px}
        .info-panel p{font-size:0.82rem;color:#94a3b8;margin-bottom:4px}
        .info-panel .close-btn{position:absolute;top:10px;right:14px;background:none;border:none;color:#64748b;font-size:1.2rem;cursor:pointer}
        .stats-bar{display:flex;gap:16px;align-items:center}
        .stat-item{font-size:0.75rem;color:#94a3b8}
        .stat-item strong{color:#f1f5f9;font-size:0.88rem}
        .mapboxgl-popup-content{background:#1e293b!important;color:#f1f5f9!important;border-radius:12px!important;padding:12px 16px!important;box-shadow:0 8px 24px rgba(0,0,0,.4)!important;border:1px solid #334155!important}
        .mapboxgl-popup-tip{border-top-color:#1e293b!important}
        .mapboxgl-popup-close-button{color:#94a3b8!important;font-size:1.2rem!important}
    </style>
</head>
<body>
<div class="topbar">
    <a href="/trabajador/registros"><i class="bi bi-arrow-left"></i></a>
    <h1><i class="bi bi-geo-alt-fill" style="color:#10b981"></i> Mapa de Trabajadores</h1>
    <span class="badge" id="contadorOnline">0 conectados</span>
</div>

<div id="mapa"></div>

<div class="info-panel" id="infoPanel">
    <button class="close-btn" onclick="document.getElementById('infoPanel').style.display='none'">&times;</button>
    <h3 id="infoNombre">—</h3>
    <p id="infoCategoria"></p>
    <p id="infoUbicacion"></p>
    <p id="infoActualizado"></p>
</div>

<script src='https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js'></script>
<script>
    mapboxgl.accessToken = 'pk.eyJ1IjoiamhvbmllcmNlc3BlZGVzMTItIiwiYSI6ImNtb25qeGJ1dTBtNGoycnB2NWZtb3V1ZDcifQ.oWycZCkDrln9HOGRaWT8Xg';

    const map = new mapboxgl.Map({
        container: 'mapa',
        style: 'mapbox://styles/mapbox/dark-v11',
        center: [-74.07, 4.65], // Bogotá
        zoom: 11
    });

    map.addControl(new mapboxgl.NavigationControl(), 'top-right');

    let markers = [];

    async function cargarTrabajadores() {
        try {
            const res = await fetch('/trabajador/admin/mapa-data');
            const data = await res.json();
            const trabajadores = data.trabajadores || [];

            // Limpiar marcadores anteriores
            markers.forEach(m => m.remove());
            markers = [];

            document.getElementById('contadorOnline').textContent = trabajadores.length + ' conectados';

            trabajadores.forEach(t => {
                if (!t.latitud || !t.longitud) return;

                // Crear marcador personalizado
                const el = document.createElement('div');
                el.style.cssText = `
                    width:32px;height:32px;border-radius:50%;
                    background:linear-gradient(135deg,#10b981,#059669);
                    border:3px solid #064e3b;
                    display:flex;align-items:center;justify-content:center;
                    font-size:0.7rem;font-weight:800;color:white;
                    cursor:pointer;box-shadow:0 4px 12px rgba(16,185,129,.4);
                `;
                const iniciales = (t.nombre || '').split(' ').slice(0,2).map(p=>p[0]).join('').toUpperCase();
                el.textContent = iniciales || '?';

                const marker = new mapboxgl.Marker(el)
                    .setLngLat([parseFloat(t.longitud), parseFloat(t.latitud)])
                    .addTo(map);

                el.addEventListener('click', () => {
                    const panel = document.getElementById('infoPanel');
                    document.getElementById('infoNombre').textContent = t.nombre || 'Sin nombre';
                    document.getElementById('infoCategoria').innerHTML = `<i class="bi bi-briefcase"></i> ${t.categorias || 'Sin categoría'}`;
                    document.getElementById('infoUbicacion').innerHTML = `<i class="bi bi-geo-alt"></i> ${t.ciudad || 'Sin ciudad'}`;
                    document.getElementById('infoActualizado').innerHTML = `<i class="bi bi-clock"></i> Última actualización: ${t.ultima_actualizacion || 'Desconocida'}`;
                    panel.style.display = 'block';

                    map.flyTo({ center: [parseFloat(t.longitud), parseFloat(t.latitud)], zoom: 14 });
                });

                markers.push(marker);
            });

            // Ajustar vista si hay trabajadores
            if (trabajadores.length > 0) {
                const bounds = new mapboxgl.LngLatBounds();
                trabajadores.forEach(t => {
                    if (t.latitud && t.longitud) {
                        bounds.extend([parseFloat(t.longitud), parseFloat(t.latitud)]);
                    }
                });
                map.fitBounds(bounds, { padding: 60, maxZoom: 13 });
            }

        } catch(e) {
            console.error('Error cargando mapa:', e);
        }
    }

    map.on('load', () => {
        cargarTrabajadores();
        // Refrescar cada 30s
        setInterval(cargarTrabajadores, 30000);
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Trabajador - TalentHub</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .bg-circles { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
        .bg-circles span {
            position: absolute; border-radius: 50%; opacity: 0.05;
            animation: drift 10s ease-in-out infinite;
        }
        .bg-circles span:nth-child(1) { width:400px;height:400px;background:#2563eb;top:-150px;right:-100px; }
        .bg-circles span:nth-child(2) { width:300px;height:300px;background:#7c3aed;bottom:-100px;left:-80px;animation-delay:4s; }
        @keyframes drift { 0%,100%{transform:translateY(0)} 50%{transform:translateY(18px)} }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px 32px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.4);
            position: relative; z-index: 1;
            animation: fadeUp 0.4s ease;
        }
        @keyframes fadeUp {
            from { opacity:0; transform:translateY(20px); }
            to   { opacity:1; transform:translateY(0); }
        }
        .logo { text-align: center; margin-bottom: 24px; }
        .logo-icon {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.6rem; margin: 0 auto 12px;
        }
        .logo h2 { font-size: 1.4rem; font-weight: 700; color: #0f172a; }
        .logo p { color: #64748b; font-size: 0.85rem; margin-top: 4px; }

        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 0.82rem; font-weight: 600; color: #374151; margin-bottom: 6px; }
        .input-wrap { position: relative; }
        .input-wrap i {
            position: absolute; left: 12px; top: 50%;
            transform: translateY(-50%); color: #94a3b8; font-size: 1rem;
        }
        input {
            width: 100%;
            padding: 12px 14px 12px 38px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            font-family: inherit;
        }
        input:focus { border-color: #2563eb; }
        .toggle-pw {
            position: absolute; right: 12px; top: 50%;
            transform: translateY(-50%);
            background: none; border: none;
            color: #94a3b8; cursor: pointer; font-size: 1rem;
        }
        .alert {
            padding: 12px 14px; border-radius: 10px;
            font-size: 0.85rem; margin-bottom: 16px; display: none;
        }
        .alert.error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .alert.success { background: #f0fdf4; color: #16a34a; border: 1px solid #bbf7d0; }
        .btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            color: white; border: none; border-radius: 12px;
            font-size: 1rem; font-weight: 700; cursor: pointer;
            transition: all 0.2s; margin-top: 4px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(37,99,235,0.35); }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .links {
            margin-top: 20px; text-align: center;
            font-size: 0.82rem; color: #64748b;
        }
        .links a { color: #2563eb; text-decoration: none; font-weight: 600; }
        .links a:hover { text-decoration: underline; }
        .divider { border: none; border-top: 1px solid #f1f5f9; margin: 20px 0; }
    </style>
</head>
<body>
<div class="bg-circles"><span></span><span></span></div>

<div class="card">
    <div class="logo">
        <div class="logo-icon">💼</div>
        <h2>Acceso Trabajador</h2>
        <p>Ingresa con tu número de documento</p>
    </div>

    <div id="alert" class="alert"></div>

    <form id="formLogin">
        <div class="form-group">
            <label>Número de Documento</label>
            <div class="input-wrap">
                <i class="bi bi-person-badge"></i>
                <input type="text" id="documento" name="documento" placeholder="Ej: 1234567890" required>
            </div>
        </div>

        <div class="form-group">
            <label>Contraseña</label>
            <div class="input-wrap">
                <i class="bi bi-lock"></i>
                <input type="password" id="password" name="password" placeholder="Tu contraseña" required>
                <button type="button" class="toggle-pw" onclick="togglePw()">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>

        <button type="submit" class="btn" id="btnLogin">
            <i class="bi bi-box-arrow-in-right"></i> Ingresar
        </button>
    </form>

    <hr class="divider">
    <div class="links">
        ¿Primera vez? <a href="/trabajador/registro">Regístrate aquí</a><br><br>
        <a href="/">← Volver al inicio</a>
    </div>
    <a href="/trabajador/registro" style="display:block;width:100%;padding:13px;margin-top:12px;background:#f1f5f9;color:#1e293b;border:none;border-radius:12px;font-size:0.95rem;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;">
        <i class="bi bi-person-plus"></i> Registrarme por primera vez
    </a>
</div>

<script>
    function togglePw() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        const isText = input.type === 'text';
        input.type = isText ? 'password' : 'text';
        icon.className = isText ? 'bi bi-eye' : 'bi bi-eye-slash';
    }

    const alertEl = document.getElementById('alert');

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnLogin');
        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Verificando...';

        const fd = new FormData();
        fd.append('numero_documento', document.getElementById('documento').value);
        fd.append('password', document.getElementById('password').value);

        try {
            const res = await fetch('/trabajador/login', { method: 'POST', body: fd });
            const data = await res.json();

            if (res.ok) {
                alertEl.className = 'alert success';
                alertEl.textContent = '✅ ' + data.mensaje;
                alertEl.style.display = 'block';
                setTimeout(() => window.location.href = data.redirect || '/trabajador/panel', 1000);
            } else {
                alertEl.className = 'alert error';
                alertEl.textContent = '❌ ' + (data.error || 'Error al iniciar sesión');
                alertEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Ingresar';
            }
        } catch(err) {
            alertEl.className = 'alert error';
            alertEl.textContent = '❌ Error de conexión';
            alertEl.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Ingresar';
        }
    });
</script>
</body>
</html>

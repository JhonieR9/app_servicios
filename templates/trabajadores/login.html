<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Trabajador - TalentHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .bg {
            position: fixed; inset: 0; z-index: 0; pointer-events: none;
            background:
                radial-gradient(ellipse 70% 50% at 10% 20%, rgba(99,102,241,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 60% 50% at 90% 80%, rgba(139,92,246,0.1) 0%, transparent 60%);
        }
        .card {
            position: relative; z-index: 1;
            background: #111118;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 36px 28px;
            width: 100%; max-width: 400px;
            box-shadow: 0 32px 64px rgba(0,0,0,0.5);
            animation: fadeUp .4s ease;
        }
        @keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
        .logo-wrap { text-align: center; margin-bottom: 28px; }
        .logo-icon {
            width: 56px; height: 56px; border-radius: 16px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; margin: 0 auto 12px;
            box-shadow: 0 8px 24px rgba(99,102,241,0.3);
        }
        .logo-title { font-size: 1.3rem; font-weight: 800; color: #f1f5f9; }
        .logo-sub { font-size: 0.82rem; color: #64748b; margin-top: 3px; }
        .form-group { margin-bottom: 14px; }
        .form-label { display: block; font-size: 0.78rem; font-weight: 600; color: #94a3b8; margin-bottom: 7px; letter-spacing: 0.5px; }
        .input-wrap { position: relative; }
        .input-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #475569; font-size: 0.95rem; }
        input {
            width: 100%; padding: 13px 14px 13px 40px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #f1f5f9;
            font-size: 0.92rem; font-family: 'Inter', sans-serif;
            outline: none; transition: all 0.2s;
        }
        input:focus { border-color: rgba(99,102,241,0.5); background: rgba(99,102,241,0.04); box-shadow: 0 0 0 3px rgba(99,102,241,0.1); }
        input::placeholder { color: #334155; }
        .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #475569; cursor: pointer; font-size: 0.95rem; padding: 4px; }
        .alert { padding: 12px 14px; border-radius: 10px; font-size: 0.82rem; margin-bottom: 14px; display: none; }
        .alert.error   { background: rgba(239,68,68,0.1); color: #fca5a5; border: 1px solid rgba(239,68,68,0.2); }
        .alert.success { background: rgba(16,185,129,0.1); color: #6ee7b7; border: 1px solid rgba(16,185,129,0.2); }
        .btn {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #4f46e5, #7c3aed);
            color: white; border: none; border-radius: 12px;
            font-size: 0.95rem; font-weight: 700; font-family: 'Inter', sans-serif;
            cursor: pointer; margin-top: 6px; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            box-shadow: 0 4px 16px rgba(99,102,241,0.25);
        }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(99,102,241,0.35); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .divider { display: flex; align-items: center; gap: 12px; margin: 20px 0; color: #334155; font-size: 0.75rem; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,255,255,0.06); }
        .btn-register {
            width: 100%; padding: 13px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.1);
            color: #94a3b8; border-radius: 12px;
            font-size: 0.88rem; font-weight: 600; font-family: 'Inter', sans-serif;
            cursor: pointer; text-decoration: none;
            display: flex; align-items: center; justify-content: center; gap: 8px;
            transition: all 0.2s;
        }
        .btn-register:hover { background: rgba(255,255,255,0.07); border-color: rgba(255,255,255,0.15); color: #f1f5f9; }
        .back { display: block; text-align: center; margin-top: 16px; color: #334155; font-size: 0.78rem; text-decoration: none; }
        .back:hover { color: #64748b; }
    </style>
</head>
<body>
<div class="bg"></div>
<div class="card">
    <div class="logo-wrap">
        <div class="logo-icon">💼</div>
        <div class="logo-title">Acceso Trabajador</div>
        <div class="logo-sub">Ingresa con tu número de documento</div>
    </div>

    <div id="alert" class="alert"></div>

    <form id="formLogin">
        <div class="form-group">
            <label class="form-label">NÚMERO DE DOCUMENTO</label>
            <div class="input-wrap">
                <i class="bi bi-person-badge input-icon"></i>
                <input type="text" name="numero_documento" placeholder="Ej: 1234567890" required>
            </div>
        </div>
        <div class="form-group">
            <label class="form-label">CONTRASEÑA</label>
            <div class="input-wrap">
                <i class="bi bi-lock input-icon"></i>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
                <button type="button" class="toggle-pw" onclick="togglePw()">
                    <i class="bi bi-eye" id="eyeIcon"></i>
                </button>
            </div>
        </div>
        <button type="submit" class="btn" id="btnLogin">
            <i class="bi bi-box-arrow-in-right"></i> Ingresar
        </button>
    </form>

    <div class="divider">o</div>
    <a href="/trabajador/registro" class="btn-register">
        <i class="bi bi-person-plus"></i> Registrarme por primera vez
    </a>
    <a href="/" class="back">← Volver al inicio</a>
</div>

<script>
    function togglePw() {
        const input = document.getElementById('password');
        const icon = document.getElementById('eyeIcon');
        const isText = input.type === 'text';
        input.type = isText ? 'password' : 'text';
        icon.className = isText ? 'bi bi-eye' : 'bi bi-eye-slash';
    }

    const alertEl = document.getElementById('alert');

    document.getElementById('formLogin').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('btnLogin');
        btn.disabled = true;
        btn.innerHTML = '<i class="bi bi-hourglass-split"></i> Verificando...';

        const fd = new FormData(e.target);
        try {
            const res = await fetch('/trabajador/login', { method: 'POST', body: fd });
            const data = await res.json();
            if (res.ok) {
                alertEl.className = 'alert success';
                alertEl.textContent = '✅ ' + data.mensaje;
                alertEl.style.display = 'block';
                setTimeout(() => window.location.href = data.redirect || '/trabajador/panel', 1000);
            } else {
                alertEl.className = 'alert error';
                alertEl.textContent = '❌ ' + (data.error || 'Error al iniciar sesión');
                alertEl.style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Ingresar';
            }
        } catch(err) {
            alertEl.className = 'alert error';
            alertEl.textContent = '❌ Error de conexión';
            alertEl.style.display = 'block';
            btn.disabled = false;
            btn.innerHTML = '<i class="bi bi-box-arrow-in-right"></i> Ingresar';
        }
    });
</script>
</body>
</html>
